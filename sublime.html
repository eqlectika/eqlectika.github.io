<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="data:;base64,iVBORw0KGgo=">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest-sublime.json">
<title>Bismuth Laboratory Persistent</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Ubuntu:wght@700&display=swap');
* { -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; box-sizing: border-box; }
body { margin: 0; overflow: hidden; background: #000; touch-action: none; font-family: 'Ubuntu', monospace; }
canvas { display: block; }
.interface { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 10; pointer-events: none; }
.mode-toggle { background: none; border: none; color: #00ff00; padding: 10px; font-size: 1.2rem; letter-spacing: 1px; cursor: pointer; pointer-events: auto; outline: none; min-width: 80px; font-family: 'Ubuntu', cursive; }
#basement { position: absolute; bottom: 0; width: 100%; height: 120px; overflow-y: scroll; scroll-snap-type: y mandatory; z-index: 10; pointer-events: auto; scrollbar-width: none; -ms-overflow-style: none; }
#basement::-webkit-scrollbar { display: none; }
.scroll-container { display: flex; flex-direction: column; width: 100%; }
.snap-section { height: 120px; width: 100%; scroll-snap-align: start; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.logo-container { display: flex; flex-direction: column; align-items: center; width: 100%; }
.logo-container img { height: 44px; width: auto; pointer-events: auto; }
.donate-btn { color: #fff; border: 1px solid #fff; padding: 5px 15px; background: transparent; cursor: pointer; font-family: 'Ubuntu', cursive; }
.crypto-info { display: none; flex-direction: column; gap: 5px; margin-top: 10px; padding: 0 20px; align-items: center; }
.crypto-label { font-size: 10px; color: #fff; margin-bottom: 2px; display: block; }
.crypto-address-display { font-size: 10px; color: #00ff00; background: #0a0a0a; padding: 8px; border: 1px dashed #999; cursor: copy; word-break: break-all; max-width: 90%; }
.instruction-text { display: block; font-size: 1.0rem; color: #ffffff; letter-spacing: 1px; margin-bottom: 10px; pointer-events: none; }
</style>
</head>
<body>
<div class="interface">
<button id="undoBtn" class="mode-toggle">Undo</button>
<button id="ritzBtn" class="mode-toggle">Demo</button>
</div>
<div id="basement">
<div class="scroll-container">
<div class="snap-section"><div class="logo-container"><span class="instruction-text">Tap any side and speak</span><a href="index.html"><img src="logo.png" alt="Logo"></a></div></div>
<div class="snap-section"><footer><div class="donate-box"><button class="donate-btn" onclick="toggleDonate()">Support</button><div id="cryptoInfo" class="crypto-info"><span class="crypto-label">Quantum Resistant Ledger (QRL)</span><div id="cryptoAddr" class="crypto-address-display" onclick="copyToClipboard()">Q0105000f1ce7bb4e86c2adcc4a5795d63e70d3e0ca788518348780cfe0d6d4ad943a89f873f84c</div><span class="crypto-label" style="font-size: 8px;">Tap address to copy</span></div></div></footer></div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
let recognition, isListening = false, activeVoiceMesh = null, wakeLock = null;
const requestWakeLock = async () => {
try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
};
let audioContext, audioAnalyser, dataArray, activeAudio = null, history = [];
let lastBeatTime = 0, beatCooldown = 350, polarity = 1, isRotating = true, isPlaying = false;
const scene = new THREE.Scene(), camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000), renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
const group = new THREE.Group();
scene.add(group);

const dirLight = [
{ color: 0xff0000, pos: [20, 20, 20] },
{ color: 0x00ff00, pos: [-20, 20, 20] },
{ color: 0x00ffff, pos: [20, -20, 20] },
{ color: 0x00ff00, pos: [-20, -20, -20] },
{ color: 0x00ffff, pos: [0, 30, 0] }
].map(l => {
const pl = new THREE.PointLight(l.color, 1, 100);
pl.position.set(...l.pos);
scene.add(pl);
return pl;
});


  

camera.position.set(12, 12, 12);
// Замените существующую строку material на эту:
const material = new THREE.MeshStandardMaterial({ 
    metalness: 0.7, 
    roughness: 0.1, 
    transparent: true, 
    opacity: 0.4, // Немного уменьшил для лучшей видимости слоев
    side: THREE.DoubleSide, 
    flatShading: true,
    depthWrite: false // Позволяет видеть объекты друг за другом без багов прозрачности
});const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2();


  
let stream = null;
async function initAudio() {
if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
if (audioContext.state === 'suspended') await audioContext.resume();
if (!stream) {
stream = await navigator.mediaDevices.getUserMedia({ audio: true });
}
await requestWakeLock();
}

function toggleRitz() {
if (!audioContext) audioContext = new (window.AudioContext || window.webkitAudioContext)();
if (audioContext.state === 'suspended') audioContext.resume();
if (!activeAudio) {
activeAudio = new Audio('Ritz.mp3');
activeAudio.crossOrigin = "anonymous";
const source = audioContext.createMediaElementSource(activeAudio);
audioAnalyser = audioContext.createAnalyser();
audioAnalyser.fftSize = 256;
source.connect(audioAnalyser);
audioAnalyser.connect(audioContext.destination);
dataArray = new Uint8Array(audioAnalyser.frequencyBinCount);
}
if (isPlaying) {
activeAudio.pause();
isPlaying = false;
document.getElementById('ritzBtn').innerText = 'Demo';
} else {
activeAudio.play().catch(console.error);
isPlaying = true;
document.getElementById('ritzBtn').innerText = 'Pause';
}
}

async function startVoiceAction(mesh) {
if (isListening) {
resetListening();
if (recognition) recognition.stop();
return;
}
try {
await initAudio();
isListening = true;
activeVoiceMesh = mesh;
activeVoiceMesh.material.emissive.setHex(0x00ff00);
const SpeechRecognition = window.webkitSpeechRecognition || window.SpeechRecognition;
if (!SpeechRecognition) return;
if (!recognition) {
recognition = new SpeechRecognition();
recognition.lang = 'en-US';
recognition.continuous = false;
recognition.interimResults = false;
recognition.onresult = (event) => {
const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase().trim();
applyVoiceGrow(transcript, activeVoiceMesh);
};
recognition.onend = () => { if (isListening) recognition.start(); };
}
if (recognition.state !== 'listening') recognition.start();
} catch (err) { resetListening(); }
}



let baseSides = [];
const oppositeMap = { 0: 2, 1: 3, 2: 0, 3: 1, 4: 5, 5: 4 };
let lastBaseSideIndex = 0;

async function applyVoiceGrow(text, startMesh) {
let currentActiveMesh = startMesh;
const totalSteps = 10;
const vPolarity = (text.includes('big') || text.includes('long')) ? 2 : ((text.includes('small') || text.includes('inner')) ? -1 : 1);
for (let i = 0; i < totalSteps; i++) {
if (!isListening || !currentActiveMesh) break;
const nextBatch = grow(currentActiveMesh, vPolarity);
group.children.forEach(m => m.material.emissive.setHex(0x000000));
if (nextBatch.length > 0) {
currentActiveMesh = nextBatch[Math.floor(Math.random() * nextBatch.length)];
currentActiveMesh.material.emissive.setHex(0x00ff00);
} else {
break;
}
await new Promise(r => setTimeout(r, 120));
}
resetListening();
if (recognition) recognition.stop();
}

  
function resetListening() {
isListening = false;
if (activeVoiceMesh) activeVoiceMesh.material.emissive.setHex(0x000000);
activeVoiceMesh = null;
}




  
function grow(mesh, forcePolarity = null) {
    const c = mesh.userData.corners, d = mesh.userData.depth + 1; 
    if (d > 14) return [];

    const center = new THREE.Vector3().add(c[0]).add(c[1]).add(c[2]).add(c[3]).divideScalar(4);
    
    // Вычисляем вектор от центра меша к центру всей группы
    // Если меш снаружи, нормаль будет направлена внутрь
    const v1 = new THREE.Vector3().subVectors(c[1], c[0]);
    const v2 = new THREE.Vector3().subVectors(c[3], c[0]);
    let normal = new THREE.Vector3().crossVectors(v1, v2).normalize();
    
    // Проверка: направлена ли нормаль внутрь?
    // Если dot product с вектором к центру отрицательный — меняем направление
    if (normal.dot(center) > 0) normal.multiplyScalar(-1);

    let p = forcePolarity !== null ? forcePolarity : 1; 
    
    const randomLength = forcePolarity !== null ? (forcePolarity > 0 ? 1.5 : 0.8) : (0.8 + Math.random() * 1.5);
    const offset = normal.clone().multiplyScalar(randomLength * p);
    const lerpFactor = 0.15 + Math.random() * 0.15;
    const inner = c.map(pt => pt.clone().lerp(center, lerpFactor).add(offset));
    
    const newMeshes = [];
    newMeshes.push(createRect(c[0], c[1], inner[1], inner[0], d, false));
    newMeshes.push(createRect(c[1], c[2], inner[2], inner[1], d, false));
    newMeshes.push(createRect(c[2], c[3], inner[3], inner[2], d, false));
    newMeshes.push(createRect(c[3], c[0], inner[0], inner[3], d, false));
    newMeshes.push(createRect(inner[0], inner[1], inner[2], inner[3], d, false));
    
    saveState();
    return newMeshes;
}


function createRect(p1, p2, p3, p4, depth, save = true) {
const geo = new THREE.BufferGeometry();
const v = [p1.x,p1.y,p1.z, p2.x,p2.y,p2.z, p3.x,p3.y,p3.z, p3.x,p3.y,p3.z, p4.x,p4.y,p4.z, p1.x,p1.y,p1.z];
geo.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
geo.computeVertexNormals();
const mesh = new THREE.Mesh(geo, material.clone());
mesh.material.color.setHex(0xffd700);
mesh.userData = { depth: depth, corners: [p1.clone(), p2.clone(), p3.clone(), p4.clone()] };
group.add(mesh);
if (save) saveState();
return mesh;
}


  
function saveState() {
const data = group.children.map(m => ({ depth: m.userData.depth, corners: m.userData.corners.map(c => ({x:c.x, y:c.y, z:c.z})) }));
const snapshot = JSON.stringify(data);
if (history.length === 0 || history[history.length - 1] !== snapshot) {
history.push(snapshot);
if (history.length > 70) history.shift();
}
localStorage.setItem('bismuth_state', snapshot);
}


  
function loadState() {
const saved = localStorage.getItem('bismuth_state');
if (!saved) return initBase();
history = [saved];
while(group.children.length > 0) { group.remove(group.children[0]); }
baseSides = [];
JSON.parse(saved).forEach(d => {
const c = d.corners.map(p => new THREE.Vector3(p.x, p.y, p.z));
const mesh = createRect(c[0], c[1], c[2], c[3], d.depth, false);
if (d.depth === 0) baseSides.push(mesh);
});
}


  
function undo() {
if (history.length <= 1) return;
history.pop();
const previousState = JSON.parse(history[history.length - 1]);
while(group.children.length > 0) { group.remove(group.children[0]); }
baseSides = [];
previousState.forEach(d => {
const c = d.corners.map(p => new THREE.Vector3(p.x, p.y, p.z));
const mesh = createRect(c[0], c[1], c[2], c[3], d.depth, false);
if (d.depth === 0) baseSides.push(mesh);
});
}



  
function reset() {
if (activeAudio) { activeAudio.pause(); activeAudio.currentTime = 0; isPlaying = false; document.getElementById('ritzBtn').innerText = 'Demo'; }
resetListening();
while(group.children.length > 0) { group.remove(group.children[0]); }
history = [];
group.scale.set(1, 1, 1);
group.rotation.set(0,0,0);
localStorage.removeItem('bismuth_state');
initBase();
}



  
function initBase() {
const s = 4;
const pts = [new THREE.Vector3(-s,s,s), new THREE.Vector3(s,s,s), new THREE.Vector3(s,-s,s), new THREE.Vector3(-s,-s,s), new THREE.Vector3(-s,s,-s), new THREE.Vector3(s,s,-s), new THREE.Vector3(s,-s,-s), new THREE.Vector3(-s,-s,-s)];
baseSides = [];
while(group.children.length > 0) { group.remove(group.children[0]); }
[[pts[0],pts[1],pts[2],pts[3]], [pts[1],pts[5],pts[6],pts[2]], [pts[5],pts[4],pts[7],pts[6]], [pts[4],pts[0],pts[3],pts[7]], [pts[4],pts[5],pts[1],pts[0]], [pts[3],pts[2],pts[6],pts[7]]].forEach(f => {
const mesh = createRect(f[0], f[1], f[2], f[3], 0, false);
baseSides.push(mesh);
});
saveState();
}


  
window.addEventListener('pointerdown', (e) => {
if (e.target.tagName === 'BUTTON' || e.target.closest('#basement')) return;
initAudio();
mouse.x = (e.clientX / window.innerWidth) * 2 - 1; mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
raycaster.setFromCamera(mouse, camera);
const hits = raycaster.intersectObjects(group.children);
if (hits.length > 0) startVoiceAction(hits[0].object);
});
function toggleDonate() { const info = document.getElementById("cryptoInfo"); info.style.display = info.style.display !== "flex" ? "flex" : "none"; }
function copyToClipboard() { const addr = document.getElementById("cryptoAddr"); navigator.clipboard.writeText(addr.innerText); const original = addr.innerText; addr.innerText = "Copied!"; setTimeout(() => addr.innerText = original, 1500); }
document.getElementById('ritzBtn').addEventListener('click', toggleRitz);
let undoTimer = null, isLongPress = false;
const undoBtn = document.getElementById('undoBtn');
const startUndoTimer = (e) => { e.stopPropagation(); isLongPress = false; undoTimer = setTimeout(() => { reset(); isLongPress = true; }, 1800); };
const clearUndoTimer = () => { if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; } };
undoBtn.addEventListener('mousedown', startUndoTimer);
undoBtn.addEventListener('touchstart', startUndoTimer, { passive: true });
window.addEventListener('mouseup', clearUndoTimer);
window.addEventListener('touchend', clearUndoTimer);
undoBtn.addEventListener('click', (e) => { e.stopPropagation(); if (!isLongPress) undo(); isLongPress = false; });


  
let branchCounter = 0; // Счетчик блоков в текущей ветке

function animate() {
    requestAnimationFrame(animate);
    const now = Date.now();
    if (isRotating) { group.rotation.y += 0.002; group.rotation.x += 0.001; }
    
    if (isPlaying && audioAnalyser) {
        audioAnalyser.getByteFrequencyData(dataArray);
        const bass = dataArray[2] / 255.0;
        group.scale.set(1 + bass * 0.1, 1 + bass * 0.1, 1 + bass * 0.1);

      if (bass > 0.85 && now - lastBeatTime > beatCooldown) {
            if (group.children.length > 1200) { 
                undo(); 
                window.currentBranchMesh = null;
                branchCounter = 0;
            } else {
                // Если ветка достигла 10 блоков или еще не создана
                if (!window.currentBranchMesh || branchCounter >= 10) {
                    // Выбираем новую базу с противоположной стороны
                    lastBaseSideIndex = oppositeMap[lastBaseSideIndex];
                    window.currentBranchMesh = baseSides[lastBaseSideIndex];
                    branchCounter = 0;
                }

                const nextBatch = grow(window.currentBranchMesh);
                if (nextBatch && nextBatch.length > 0) {
                    window.currentBranchMesh = nextBatch[Math.floor(Math.random() * nextBatch.length)];
                    branchCounter++;
                } else {
                    // Если расти некуда, прыгаем на случайное место
                    window.currentBranchMesh = group.children[Math.floor(Math.random() * group.children.length)];
                    branchCounter = 0;
                }
            }
            lastBeatTime = now;
        }
    }
    controls.update();
    renderer.render(scene, camera);
}

loadState();
animate();

window.addEventListener('resize', () => {
camera.aspect = window.innerWidth / window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
