<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event City: Glass Monolith</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #header-link {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.7s;
        }
        #header-link:hover { opacity: 0.5; }
        #header-logo {
            opacity: 0.7; 
            max-height: 60px;
            display: block;
        }
        #logo-caption {
            color: rgba(255, 255, 255, 0.7);
            font-family: sans-serif;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<a href="index.html" id="header-link" target="_blank" rel="noopener noreferrer">
    <img src="logo.png" alt="Logo" id="header-logo">
    <span id="logo-caption">Event City</span>
</a>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    const loader = new THREE.CubeTextureLoader();
    const envTexture = loader.setPath('https://threejs.org/examples/textures/cube/Park2/').load([
        'posx.jpg', 'negx.jpg', 'posy.jpg', 'negy.jpg', 'posz.jpg', 'negz.jpg'
    ]);
    scene.environment = envTexture;

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    camera.position.set(15, 20, 15);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 0.4));
    const pointLight = new THREE.PointLight(0xffffff, 1.5, 50);
    pointLight.position.set(10, 20, 10);
    scene.add(pointLight);

    const goldMat = new THREE.MeshStandardMaterial({ color: 0xCCAC00, metalness: 0.9, roughness: 0.2 });
    const platMat = new THREE.MeshStandardMaterial({ color: 0xCCCCCC, metalness: 0.9, roughness: 0.1 });
    
    const h = [[4, 3, 2, 1], [5, 4, 3, 2], [6, 5, 4, 3], [7, 6, 5, 4]];
    const cubes = [];
    for (let x = 0; x < 8; x++) {
        cubes[x] = [];
        for (let z = 0; z < 8; z++) {
            let sx = x < 4 ? x : 7 - x;
            let sz = z < 4 ? z : 7 - z;
            const height = h[sx][sz];
            const cube = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1, 0.9), (x + z) % 2 === 0 ? goldMat : platMat);
            cube.scale.y = height;
            cube.position.set(x - 3.5, height / 2, z - 3.5);
            scene.add(cube);
            cubes[x][z] = { mesh: cube, h: height };
        }
    }

    const pieces = [];
    const pGeom = new THREE.ConeGeometry(0.3, 0.8, 8);
    for (let i = 0; i < 12; i++) {
        const p = new THREE.Mesh(pGeom, i < 6 ? goldMat : platMat);
        p.userData = { gx: Math.floor(Math.random()*8), gz: Math.floor(Math.random()*8) };
        scene.add(p);
        pieces.push(p);
    }

    const glassMat = new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        metalness: 0,
        roughness: 0,
        transmission: 1,
        ior: 1.5,
        thickness: 10,
        transparent: true,
        opacity: 0.5
    });
    const glassBlock = new THREE.Mesh(new THREE.BoxGeometry(8.5, 8, 8.5), glassMat);
    glassBlock.position.y = 3.5;
    scene.add(glassBlock);

    function animate(time) {
        requestAnimationFrame(animate);
        pieces.forEach(p => {
            const c = cubes[p.userData.gx][p.userData.gz];
            p.position.set(c.mesh.position.x, c.h + 0.4, c.mesh.position.z);
        });
        if (Math.random() > 0.98) {
            const p = pieces[Math.floor(Math.random()*pieces.length)];
            p.userData.gx = Math.floor(Math.random()*8);
            p.userData.gz = Math.floor(Math.random()*8);
        }
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
