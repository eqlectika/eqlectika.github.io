<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event City: Living Monolith</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        #header-link {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: opacity 0.7s;
        }
        #header-link:hover { opacity: 0.5; }
        #header-logo {
            opacity: 0.7; 
            max-height: 60px;
            display: block;
        }
        #logo-caption {
            color: rgba(255, 255, 255, 0.7);
            font-family: sans-serif;
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<a href="index.html" id="header-link" target="_blank" rel="noopener noreferrer">
    <img src="logo.png" alt="Logo" id="header-logo">
    <span id="logo-caption">Event City</span>
</a>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);
    const loader = new THREE.CubeTextureLoader();
    const envTexture = loader.setPath('https://threejs.org/examples/textures/cube/Park2/').load([
        'posx.jpg', 'negx.jpg', 'posy.jpg', 'negy.jpg', 'posz.jpg', 'negz.jpg'
    ]);
    scene.environment = envTexture;
    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    camera.position.set(0, 27, 0); 
    controls.target.set(0, 0, 0);
    controls.enableDamping = true;
    controls.update();
    scene.add(new THREE.AmbientLight(0xffffff, 0.3));
    const movingLight = new THREE.PointLight(0xffffff, 2, 50);
    scene.add(movingLight);
    const goldMat = new THREE.MeshStandardMaterial({ color: 0xCCAC00, metalness: 0.9, roughness: 0.2, emissive: 0x221100, emissiveIntensity: 0.1 });
    const platMat = new THREE.MeshStandardMaterial({ color: 0xCCCCCC, metalness: 0.9, roughness: 0.1, emissive: 0x111111, emissiveIntensity: 0.1 });
    
    const rubyMat = new THREE.MeshStandardMaterial({ 
    color: 0xff0000, 
    transparent: true, 
    opacity: 0.6, 
    metalness: 0.3, 
    roughness: 0.2 
});
const emeraldMat = new THREE.MeshStandardMaterial({ 
    color: 0x00ff00, 
    transparent: true, 
    opacity: 0.6, 
    metalness: 0.3, 
    roughness: 0.2 
});

    
    const h = [[4, 3, 2, 1], [5, 4, 3, 2], [6, 5, 4, 3], [7, 6, 5, 4]];
    const cubes = [];
    const boardGroup = new THREE.Group();
    scene.add(boardGroup);
    for (let x = 0; x < 8; x++) {
        cubes[x] = [];
        for (let z = 0; z < 8; z++) {
            let sx = x < 4 ? x : 7 - x;
            let sz = z < 4 ? z : 7 - z;
            const height = h[sx][sz];
            const cube = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1, 0.9), (x + z) % 2 === 0 ? goldMat : platMat);
            cube.scale.y = height;
            cube.position.set(x - 3.5, height / 2, z - 3.5);
            boardGroup.add(cube);
            cubes[x][z] = { mesh: cube, h: height };
        }
    }
    const pieces = [];
    const pGeom = new THREE.ConeGeometry(0.3, 0.8, 8);
    for (let i = 0; i < 16; i++) {
        const p = new THREE.Mesh(pGeom, i < 8 ? goldMat : platMat);
        p.userData = { gx: Math.floor(Math.random()*8), gz: Math.floor(Math.random()*8) };
        boardGroup.add(p);
        pieces.push(p);
    }
    const glassMat = new THREE.MeshPhysicalMaterial({
        color: 0xffffff,
        metalness: 0.1,
        roughness: 0.05,
        transmission: 1,
        ior: 1.5,
        thickness: 4,
        transparent: true,
        opacity: 0.3
    });
    const glassBlock = new THREE.Mesh(new THREE.BoxGeometry(8.5, 9, 8.5), glassMat);
    glassBlock.position.y = 3.5;
    scene.add(glassBlock);
    function animate(time) {
        requestAnimationFrame(animate);
        const t = time * 0.001;
        movingLight.position.set(Math.sin(t) * 12, 18, Math.cos(t) * 12);
        pieces.forEach(p => {
            const c = cubes[p.userData.gx][p.userData.gz];
            p.position.set(c.mesh.position.x, c.h + 0.4, c.mesh.position.z);
        });
        if (Math.random() > 0.985) {
            const p = pieces[Math.floor(Math.random()*pieces.length)];
            const nx = Math.floor(Math.random()*8);
            const nz = Math.floor(Math.random()*8);
            const conflict = pieces.find(other => other !== p && other.userData.gx === nx && other.userData.gz === nz);
            if (conflict) {
                cubes[nx][nz].mesh.material.emissiveIntensity = 1.0;
                setTimeout(() => { if(cubes[nx][nz]) cubes[nx][nz].mesh.material.emissiveIntensity = 0.1; }, 500);
            }
            p.userData.gx = nx;
            p.userData.gz = nz;
        }
        controls.update();
        renderer.render(scene, camera);
    }
    animate();
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
