<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest-matrix.json">
    <title>Neural Matrix</title>
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --bg: #000; --text: #fff; --accent: #00ff00; --tension: #ff1493; --dim: #111; }
        * { box-sizing: border-box; font-family: 'Ubuntu', monospace; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; background: var(--bg); color: var(--text); overflow: auto; display: flex; flex-direction: column; }
        .pane-wrap { position: relative; height: 100%; width: 100%; overflow: hidden; }
        .pane { border: none; padding: 10px; font-size: 0.85rem; background: var(--bg); color: var(--text); outline: none; resize: none; width: 100%; height: 100%; }
        .pane-l { color: #fff; border-right: 1px solid var(--dim); }
        #save-btn { position: absolute; bottom: 5px; right: 5px; background: var(--accent); color: #000; padding: 4px 10px; font-size: 0.6rem; font-weight: bold; cursor: pointer; display: none; z-index: 150; }
        #gateway { display: grid; grid-template-columns: 50% 50%; height: 45vh; width: 100%; position: relative; border-bottom: 1px solid var(--dim); flex-shrink: 0; }
        #flash-zone { height: 20vh; display: flex; visibility: hidden; flex-direction: column; justify-content: center; align-items: center; background: #050505; position: relative; border-bottom: 1px solid var(--dim); flex-shrink: 0; }
        #basement { flex-grow: 1; width: 100%; background: #000; display: flex; flex-direction: column; border-top: 1px solid var(--dim); overflow-y: auto; min-height: 0; }
        #flash-zone.visible { visibility: visible; }
        #gate-btn { position: absolute; left: 50%; top: 0; bottom: 0; width: 22px; transform: translateX(-50%); z-index: 200; cursor: pointer; background: var(--accent); display: flex; align-items: center; justify-content: center; }
        #digText { padding-left: 20px; color: #00ff00; }
        #word-stream { transition: none; opacity: 1; font-size: 2.8rem; font-weight: bold; text-align: center; cursor: pointer; width: 95%; color: var(--text); }
        #gate-btn span { writing-mode: vertical-rl; text-orientation: upright; color: #000; font-weight: 900; font-size: 0.8rem; letter-spacing: 3px; }
        #gate-btn.active { background: var(--tension); }
        #control-hub { height: 40px; width: 100%; display: none; justify-content: space-around; align-items: center; background: #000; flex-shrink: 0; }
        .u-btn { color: var(--accent); font-size: 0.8rem; cursor: pointer; font-weight: bold; }
        #index-row { width: 100%; min-height: 25px; display: flex; align-items: center; justify-content: center; color: var(--accent); font-size: 0.8rem; letter-spacing: 12px; padding-left: 12px; font-weight: bold; background: #000; }
        #monitor { min-height: 60px; width: 100%; position: relative; }
        #db-tools { min-height: 45px; display: flex; justify-content: center; align-items: center; gap: 20px; padding: 5px; }
        .db-btn { font-size: 0.7rem; color: var(--accent); cursor: pointer; border: 1px solid var(--accent); padding: 5px 10px; text-transform: uppercase; font-weight: bold; transition: 0.3s; }
        video { position: fixed; width: 1px; height: 1px; opacity: 0; }
    </style>
</head>
<body>
    <script src="pwa-init.js"></script>
    <video id="video" autoplay playsinline muted></video>
    <div id="gateway">
        <div class="pane-wrap"><textarea id="srcText" class="pane pane-l" placeholder="SOURCE"></textarea></div>
        <div class="pane-wrap">
            <textarea id="digText" class="pane" placeholder="DIGEST" oninput="exportDB()"></textarea>

        </div>
<div id="gate-btn" onclick="toggleSystem()"><span>ENTRY</span></div>


    </div>
    <div id="flash-zone">
        <div id="word-stream" onclick="captureWord()">READY</div>
    </div>
    <div id="control-hub">
        <div class="u-btn" onclick="move(-1)">PREV</div>
        <div class="u-btn" onclick="adjSpd(-50)">SLOWER</div>
        <div class="u-btn" id="run-btn" onclick="toggleRun()">RUN</div>
        <div class="u-btn" onclick="adjSpd(50)">FASTER</div>
        <div class="u-btn" onclick="move(1)">NEXT</div>
    </div>
    <div id="basement">
        <div id="index-row">RQ:85</div>
        <div id="monitor"><canvas id="sparkChart"></canvas></div>
        <div id="db-tools" style="flex-direction: column; gap: 10px;">
            <div style="display: flex; gap: 20px;">
                <div class="db-btn" onclick="downloadDB()">EXPORT DB</div>
                <div class="db-btn" onclick="document.getElementById('importInput').click()">IMPORT DB</div>
            </div>
            <input type="file" id="importInput" style="display:none" onchange="importDB(event)">
        </div>
        <div style="margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; margin-bottom: 20px;">
            <div class="db-btn" onclick="toggleInfo()" style="border: none; width: fit-content;">INFO</div>
            <div id="info-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.98); z-index:2000; padding:25px; overflow-y:auto; font-size:0.75rem; color:var(--text); line-height:1.6;">
                <h2 style="color:var(--accent); border-bottom:1px solid var(--accent); letter-spacing: 2px;">NEURAL MATRIX PROTOCOL</h2>
                <button onclick="toggleInfo()" style="background:var(--accent); border:none; padding:12px; width:100%; margin-top:30px; font-weight:900; color:#000; cursor:pointer; font-family:inherit; text-transform:uppercase;">Return to Matrix</button>
            </div>
        </div>
            <a href="index.html" style="display: flex; justify-content: center; text-decoration: none; opacity: 1; margin-top: 20px; margin-bottom: 20px;">
        <img src="logo.png" alt="Matrix Logo" style="height: 44px; width: auto;">
    </a>

    </div>
    <script>
        let isRunning = false, isPaused = true, words = [], currentIdx = 0, speed = 300, rq = 85, timer = null;
        const chart = new Chart(document.getElementById('sparkChart').getContext('2d'), {
            type: 'line',
            data: { labels: Array(40).fill(''), datasets: [{ borderColor: '#00ff00', borderWidth: 1, data: Array(40).fill(85), pointRadius: 0, fill: false, tension: 0.4 }] },
            options: { responsive: true, maintainAspectRatio: false, scales: { y: { display: false, max: 100, min: 0 }, x: { display: false } }, plugins: { legend: { display: false } } }
        });

function toggleSystem() {
    const flash = document.getElementById('flash-zone');
    const btn = document.getElementById('gate-btn');
    const hub = document.getElementById('control-hub');
    const span = btn.querySelector('span');

    if (!isRunning) {
        words = document.getElementById('srcText').value.split(/\s+/).filter(w => w.length > 0);
        if (words.length === 0) return alert("Введите текст в SOURCE");
        
        navigator.mediaDevices.getUserMedia({video: true}).then(s => { document.getElementById('video').srcObject = s; }).catch(() => {});
        flash.classList.add('visible'); hub.style.display = 'flex'; btn.classList.add('active');
        span.innerText = 'GATE'; // Теперь кнопка сигнализирует, что можно остановить
        isRunning = true; currentIdx = 0; isPaused = true; update();
    } else {
        isRunning = false; isPaused = true; clearTimeout(timer);
        flash.classList.remove('visible'); hub.style.display = 'none'; btn.classList.remove('active');
        span.innerText = 'ENTRY'; // Возвращаем исходное состояние
        exportDB(); // Сохраняем при остановке
    }
}



        function toggleRun() {
            if (!isRunning) return;
            if (isPaused && currentIdx >= words.length - 1) currentIdx = 0;
            isPaused = !isPaused;
            document.getElementById('run-btn').innerText = isPaused ? 'RUN' : 'STOP';
            document.getElementById('run-btn').style.color = isPaused ? '' : 'var(--tension)';
            if (!isPaused) { update(); timer = setTimeout(loop, 60000 / (speed * (rq/100))); }
        }

        function update() {
            const el = document.getElementById('word-stream');
            if (!words[currentIdx]) return;
            el.innerText = words[currentIdx];
            const scale = Math.min(1, 8 / Math.max(8, words[currentIdx].length));
            el.style.fontSize = (2.8 * scale) + 'rem';
            document.getElementById('index-row').innerText = `RQ: ${Math.round(rq)}`;
        }

        function loop() {
            if (isRunning && !isPaused) {
                if (currentIdx < words.length - 1) {
                    currentIdx++;
                    update();
                    let rawTxt = words[currentIdx];
                    let extraPause = /[.!?—]/.test(rawTxt) ? 300 : (/[;,:]/.test(rawTxt) ? 150 : 0);
                    if (rawTxt.length > 13) extraPause += 500;
                    timer = setTimeout(loop, 60000 / (speed * (rq / 100)) + extraPause);
                } else { isPaused = true; document.getElementById('run-btn').innerText = 'RUN'; }
            }
        }

        function adjSpd(d) { speed = Math.max(50, speed + d); update(); }
        function move(d) { currentIdx = Math.max(0, Math.min(words.length-1, currentIdx + d)); update(); }

        function captureWord() {
            if (!words[currentIdx]) return;
            let raw = words[currentIdx].replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"").trim();
            if (!raw) return;
            const w = raw.charAt(0).toUpperCase() + raw.slice(1).toLowerCase();
            const dig = document.getElementById('digText');
            if (dig.value.toLowerCase().includes(w.toLowerCase() + ':')) return;
            dig.value += (dig.value.trim().length > 0 ? '\n' : '') + w + ': ';
            checkDigest();
        }

        function checkDigest() { document.getElementById('save-btn').style.display = document.getElementById('digText').value.trim().length > 0 ? 'block' : 'none'; }

        function exportDB() {
            const data = { src: document.getElementById('srcText').value, dig: document.getElementById('digText').value };
            localStorage.setItem('matrix_cache', JSON.stringify(data));
        }

        function downloadDB() {
            const data = JSON.stringify({ src: document.getElementById('srcText').value, dig: document.getElementById('digText').value });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([data], {type: 'application/json'}));
            a.download = 'matrix_backup.json';
            a.click();
        }

        function importDB(event) {
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    document.getElementById('srcText').value = data.src || '';
                    document.getElementById('digText').value = data.dig || '';
                    localStorage.setItem('matrix_cache', JSON.stringify(data));
                    checkDigest();
                } catch (err) { console.error("Import failed."); }
            };
            reader.readAsText(event.target.files[0]);
        }

        function toggleInfo() { const modal = document.getElementById('info-modal'); modal.style.display = modal.style.display === 'none' ? 'block' : 'none'; }

        setInterval(() => {
            rq = Math.max(10, Math.min(100, rq + (Math.random() - 0.5) * 6));
            chart.data.datasets[0].data.push(rq); chart.data.datasets[0].data.shift();
            chart.update('none');
            const c = rq > 50 ? '#00ff00' : '#ff1493';
            document.getElementById('index-row').style.color = c;
            chart.data.datasets[0].borderColor = c;
        }, 1000);

        window.addEventListener('DOMContentLoaded', () => {
            try {
                const cached = localStorage.getItem('matrix_cache');
                if (cached) {
                    const data = JSON.parse(cached);
                    document.getElementById('srcText').value = data.src || '';
                    document.getElementById('digText').value = data.dig || '';
                    checkDigest();
                }
            } catch (e) { localStorage.removeItem('matrix_cache'); }
        });
    </script>
</body>
</html>
