<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Outside-in Planet VR</title>
    <style>
html, body {
        margin: 0; padding: 0; 
        width: 100vw; height: 100vh; 
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        -webkit-tap-highlight-color: transparent; /* Убирает серый фон при тапе на iPhone */
        touch-action: none; /* Запрещает браузеру "дергать" экран */
    }

        canvas { display: block; }
#throttleArea {
    position: fixed; top: 0; left: 0; width: 50vw; height: 100vh;
    z-index: 2000; touch-action: none; pointer-events: auto;
}
#controlArea {
    position: fixed; top: 0; right: 0; width: 50vw; height: 100vh;
    z-index: 2000; touch-action: none; pointer-events: auto;
}
#logoLink {
    position: fixed;
    bottom: 50px; 
    left: 50%;
    transform: translateX(-50%); /* Центрирует элемент относительно левой точки 50% */
    z-index: 4000;
    pointer-events: auto;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
}
/* Добавьте контейнер-центровщик */
#vr-button-container {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    display: flex !important;
    justify-content: center !important;
    align-items: center !important;
    pointer-events: none !important; /* Чтобы клики проходили сквозь контейнер */
    z-index: 10000 !important;
}

#VRButton {
    /* Сбрасываем все позиционирование */
    position: static !important;
    pointer-events: auto !important; /* Кнопка должна реагировать на клик */
    
    /* Стили */
    width: auto !important;
    height: auto !important;
    padding: 15px 30px !important;
    opacity: 0.3 !important;
    border: 1px solid white !important;
}

    #VRButton:hover, #VRButton:active {
        opacity: 0.8 !important; /* Становится ярче при взаимодействии */
    }
    </style>
</head>
<body>
<div id="throttleArea"></div> 
<div id="controlArea"></div>
    <a href="index.html" id="logoLink">
    <img src="logo.png" alt="Logo" draggable="false" style="margin-bottom: 20px; width: 42px; height: 42px; opacity: 0.2;">
</a>
<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    const PLANET_RADIUS = 1500;
    const PLAYER_HEIGHT = 2;
    const FLY_SPEED = 0.0057;
    const GRAVITY = 0.0043333;
    const DAMPING_MOVE = 0.99;
    const TURN_SPEED = 0.015;
    const RAMP_UP_TIME = 2.0;
    const RAMP_DOWN_TIME = 3.0;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a12);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 12000);
    const player = new THREE.Group();
player.position.set(0, -(PLANET_RADIUS - (PLAYER_HEIGHT + 0.5)), 0);    scene.add(player); player.add(camera);
camera.position.set(0, PLAYER_HEIGHT, 0);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(VRButton.createButton(renderer));

// 1. Создаем кнопку
const vrButton = VRButton.createButton(renderer);
// Создаем контейнер-центровщик
const container = document.createElement('div');
container.id = 'vr-button-container';
document.body.appendChild(container);

// Вставляем кнопку ВНУТРЬ контейнера
container.appendChild(vrButton);
// 2. Проверяем поддержку WebXR
if (navigator.xr) {
    navigator.xr.isSessionSupported('immersive-vr').then((supported) => {
        if (supported) {
            // Если VR поддерживается, добавляем кнопку
            document.body.appendChild(vrButton);
        } else {
            // Если не поддерживается (десктоп), просто не добавляем её
            console.log("VR не поддерживается на этом устройстве");
        }
    });
} else {

    // Если браузер вообще не знает, что такое XR
    console.log("WebXR не доступен");
}

    // Сетка
    const planetMaterial = new THREE.ShaderMaterial({
        transparent: true, side: THREE.DoubleSide,
        uniforms: { uSize: { value: 0.02 } },
        vertexShader: `varying vec3 vWorldPosition; void main() { vec4 w = modelMatrix * vec4(position, 1.0); vWorldPosition = w.xyz; gl_Position = projectionMatrix * viewMatrix * w; }`,
        fragmentShader: `varying vec3 vWorldPosition; uniform float uSize; void main() { vec2 g = abs(fract(vWorldPosition.xy * uSize) - 0.5) / fwidth(vWorldPosition.xy * uSize); vec2 g2 = abs(fract(vWorldPosition.zy * uSize) - 0.5) / fwidth(vWorldPosition.zy * uSize); float l = min(min(g.x, g.y), min(g2.x, g2.y)); if (1.0 - min(l, 1.0) < 0.5) discard; gl_FragColor = vec4(0.26, 0.26, 1.0, 0.4); }`
    });
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(PLANET_RADIUS, 64, 64), planetMaterial));

    // Генерация структур и арок 
    function positionOnSphere(mesh, distance) {
        const u = Math.random(), v = Math.random();
        const theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
        mesh.position.set(distance * Math.sin(phi) * Math.cos(theta), distance * Math.sin(phi) * Math.sin(theta), distance * Math.cos(phi));
        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), mesh.position.clone().normalize());
    }

    for(let i=0; i<25; i++) {
        const archGroup = new THREE.Group();
        const mat = new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff });
        const h = 30, span = 25;
        const left = new THREE.Mesh(new THREE.BoxGeometry(4, h, 4), mat); left.position.set(-span/2, -h/2, 0);
        const right = new THREE.Mesh(new THREE.BoxGeometry(4, h, 4), mat); right.position.set(span/2, -h/2, 0);
        const top = new THREE.Mesh(new THREE.BoxGeometry(span + 4, 4, 4), mat); top.position.set(0, -h - 2, 0);
        archGroup.add(left, right, top);
        positionOnSphere(archGroup, PLANET_RADIUS);
        scene.add(archGroup);
    }

    scene.add(new THREE.DirectionalLight(0xffffff, 2.5), new THREE.AmbientLight(0x888888));

// Переменные состояния сенсора
let currentThrottle = 0;
let touchJoystick = { active: false, startX: 0, startY: 0, moveX: 0, moveY: 0 };
const activeTouches = { throttle: null, control: null };

// Обработка газа (левая часть)
document.getElementById('throttleArea').addEventListener('pointerdown', (e) => {
    activeTouches.throttle = e.pointerId;
    updateThrottle(e);
}, { passive: false });

function updateThrottle(e) {
    const rect = document.getElementById('throttleArea').getBoundingClientRect();
    let val = 1 - ((e.clientY - rect.top) / rect.height);
    currentThrottle = Math.max(0, Math.min(1, val));
}

// Обработка джойстика (правая часть)
document.getElementById('controlArea').addEventListener('pointerdown', (e) => {
    activeTouches.control = e.pointerId;
    touchJoystick.active = true;
    touchJoystick.startX = e.clientX;
    touchJoystick.startY = e.clientY;
}, { passive: false });

window.addEventListener('pointermove', (e) => {
    if (e.pointerId === activeTouches.throttle) updateThrottle(e);
    if (e.pointerId === activeTouches.control && touchJoystick.active) {
        touchJoystick.moveX = Math.max(-1, Math.min(1, (e.clientX - touchJoystick.startX) / 100));
        touchJoystick.moveY = Math.max(-1, Math.min(1, (e.clientY - touchJoystick.startY) / 100));
    }
});

window.addEventListener('pointerup', (e) => {
    if (e.pointerId === activeTouches.throttle) { activeTouches.throttle = null; currentThrottle = 0; }
    if (e.pointerId === activeTouches.control) { 
        activeTouches.control = null; touchJoystick.active = false; 
        touchJoystick.moveX = 0; touchJoystick.moveY = 0;
    }
});

    // Управление
    const keys = { w: false, s: false, a: false, d: false, q: false, e: false, shift: false };
    window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

    let velocity = new THREE.Vector3(0, 0, 0);
    let angularVelocity = new THREE.Vector3(0, 0, 0);
    let targetVelocity = new THREE.Vector3(0, 0, 0);

    renderer.setAnimationLoop(() => {
        const session = renderer.xr.getSession();
let thrust = 0;
        let tX = 0, tY = 0; // Теперь используем только tX и tY
if (currentThrottle > 0.05) {
    // Возведение в квадрат (Math.pow) дает более быстрый прирост мощности
    const powerCurve = Math.pow(currentThrottle, 2); 
    thrust += powerCurve * FLY_SPEED * 15; // 15 — коэффициент максимальной мощности
}
// 2. Управление поворотом/креном (добавьте это к блоку с tX и tY)
if (touchJoystick.active) {
    // moveY отвечает за тангаж (tX), moveX - за поворот (tY)
    tX -= touchJoystick.moveY; 
    tY -= touchJoystick.moveX;
}    
        // 1. Считывание ввода
        if (keys.w) tX -= 1; if (keys.s) tX += 1;
        if (keys.d) tY += 1; if (keys.a) tY -= 1; // A/D теперь отвечают за связку Поворот+Крен
        if (keys.shift) thrust = FLY_SPEED * 2;

        if (session && session.inputSources) {
            for (const source of session.inputSources) {
                const gp = source.gamepad;
                if (!gp) continue;
                if (Math.abs(gp.axes[1]) > 0.2) tX = gp.axes[1];
                if (Math.abs(gp.axes[0]) > 0.2) tY = gp.axes[0]; // Стик X управляет обоими
                if (gp.buttons[0]?.pressed) thrust = FLY_SPEED * 2;
            }
        }

        // 2. АВТОМАТИЧЕСКАЯ ПРИВЯЗКА: tZ зависит от tY
        // Коэффициент 2.0 регулирует силу крена (чем больше, тем сильнее наклон)
        let tZ = -tY * 2.0; 

        // 3. Установка целевой скорости
        targetVelocity.set(tX * TURN_SPEED, tY * TURN_SPEED, tZ * TURN_SPEED);
        ['x', 'y', 'z'].forEach(axis => {
            const step = (targetVelocity[axis] - angularVelocity[axis]) / ((Math.abs(targetVelocity[axis] - angularVelocity[axis]) > 0.001 ? RAMP_UP_TIME : RAMP_DOWN_TIME) / 0.016);
            angularVelocity[axis] += step;
        });

        player.rotateOnAxis(new THREE.Vector3(1, 0, 0), angularVelocity.x);
        player.rotateOnAxis(new THREE.Vector3(0, 1, 0), angularVelocity.y);
        player.rotateOnAxis(new THREE.Vector3(0, 0, 1), angularVelocity.z);

        const localUp = new THREE.Vector3(0, 1, 0).applyQuaternion(player.quaternion);
        if (thrust > 0) velocity.add(localUp.multiplyScalar(thrust));
        velocity.addScaledVector(player.position.clone().normalize(), GRAVITY);
        player.position.add(velocity);
        velocity.multiplyScalar(DAMPING_MOVE);
// 1. Применяем физику движения
        const gravDir = player.position.clone().normalize();
        velocity.addScaledVector(gravDir, GRAVITY);
        player.position.add(velocity); 
        velocity.multiplyScalar(DAMPING_MOVE);

        // 2. БЕТОННАЯ ГРАНИЦА (Safety Check)
        // Если улетели слишком далеко - возвращаем на радиус
        const surfaceLimit = PLANET_RADIUS - PLAYER_HEIGHT;
        if (player.position.length() > surfaceLimit) {
            player.position.setLength(surfaceLimit);
            
            // Гасим вертикальную скорость, чтобы не "прыгать" бесконечно
            const normal = player.position.clone().normalize();
            const dot = velocity.dot(normal);
            if (dot > 0) {
                velocity.addScaledVector(normal, -dot);
            }
        }
        renderer.render(scene, camera);
    });
</script>
</body>
</html>
