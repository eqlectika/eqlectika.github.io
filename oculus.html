<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Outside-in Planet VR Complete</title>
    <style>body { margin: 0; overflow: hidden; background: #0a0a12; }</style>
</head>
<body>
<script type="importmap">
  { "imports": { 
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  } }
</script>
<script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    // 1. ИНИЦИАЛИЗАЦИЯ СЦЕНЫ
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a12);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 12000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(VRButton.createButton(renderer));

    // Параметры
    const PLANET_RADIUS = 1500;
    const PLAYER_HEIGHT = 2;
    const FLY_SPEED = 0.0057;
    const GRAVITY = 0.0043333;
    const DAMPING_TURN = 0.99;
    const DAMPING_MOVE = 0.99;

    const player = new THREE.Group();
    player.position.set(0, -(PLANET_RADIUS - PLAYER_HEIGHT), 0);
    scene.add(player);
    player.add(camera);

    // Освещение
    scene.add(new THREE.DirectionalLight(0xffffff, 2.5).position.set(50, 200, 50));
    scene.add(new THREE.AmbientLight(0x888888));

    // 2. ГЕНЕРАЦИЯ ОБЪЕКТОВ (Ваша логика из оригинала)
    const collidableObjects = [];
    function positionOnSphere(mesh, dist) {
        const u = Math.random(), v = Math.random();
        const theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
        mesh.position.set(dist * Math.sin(phi) * Math.cos(theta), dist * Math.sin(phi) * Math.sin(theta), dist * Math.cos(phi));
        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), mesh.position.clone().normalize());
    }

    // Сфера
    const planetGeometry = new THREE.SphereGeometry(PLANET_RADIUS, 64, 64);
    const planetMaterial = new THREE.MeshBasicMaterial({ color: 0x2626ff, wireframe: true, side: THREE.BackSide });
    scene.add(new THREE.Mesh(planetGeometry, planetMaterial));

    // Столбы
    for(let i=0; i<40; i++) {
        const box = new THREE.Mesh(new THREE.BoxGeometry(20, 10, 20), new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff }));
        positionOnSphere(box, PLANET_RADIUS);
        scene.add(box);
        collidableObjects.push(box);
    }

    // Арки
    for(let i=0; i<25; i++) {
        const arch = new THREE.Group();
        const mat = new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff });
        arch.add(new THREE.Mesh(new THREE.BoxGeometry(4, 30, 4), mat).position.set(-12, -15, 0));
        arch.add(new THREE.Mesh(new THREE.BoxGeometry(4, 30, 4), mat).position.set(12, -15, 0));
        arch.add(new THREE.Mesh(new THREE.BoxGeometry(30, 4, 4), mat).position.set(0, -30, 0));
        positionOnSphere(arch, PLANET_RADIUS);
        scene.add(arch);
    }

    // 3. ФИЗИКА И ЦИКЛ
    let velocity = new THREE.Vector3(0, 0, 0);
    let angX = 0, angZ = 0;

    renderer.setAnimationLoop(() => {
        const session = renderer.xr.getSession();
        let throttle = 0;
        if (session) {
            for (const source of session.inputSources) {
                if (source.gamepad) {
                    angX += source.gamepad.axes[1] * 0.001; 
                    angZ += source.gamepad.axes[0] * 0.001;
                    if (source.gamepad.buttons[0].pressed) throttle = 1.0;
                }
            }
        }

        angX *= DAMPING_TURN;
        angZ *= DAMPING_TURN;
        player.quaternion.multiply(new THREE.Quaternion().setFromEuler(new THREE.Euler(angX, 0, angZ, 'YXZ')));

        let localUp = new THREE.Vector3(0, 1, 0).applyQuaternion(player.quaternion).negate();
        if (throttle > 0) velocity.addScaledVector(localUp, -FLY_SPEED * 2);

        const playerDir = player.position.clone().normalize();
        velocity.addScaledVector(playerDir, GRAVITY);
        player.position.add(velocity);
        velocity.multiplyScalar(DAMPING_MOVE);

        if (player.position.length() > PLANET_RADIUS - PLAYER_HEIGHT) {
            player.position.copy(playerDir.multiplyScalar(PLANET_RADIUS - PLAYER_HEIGHT));
        }

        renderer.render(scene, camera);
    });
</script>
</body>
</html>
