<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Outside-in Planet VR</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #0a0a12; }
        canvas { display: block; }
    </style>
</head>
<body>

<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    const PLANET_RADIUS = 1500;
    const PLAYER_HEIGHT = 2;
    const FLY_SPEED = 0.0057;
    const GRAVITY = 0.0043333;
    const DAMPING_MOVE = 0.99;
    const TURN_SPEED = 0.015; // Чувствительность джойстика

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a12);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 12000);
    const player = new THREE.Group();
    player.position.set(0, -(PLANET_RADIUS - PLAYER_HEIGHT), 0);
    scene.add(player);
    player.add(camera);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(VRButton.createButton(renderer));

    // Сетка
    const planetMaterial = new THREE.ShaderMaterial({
        wireframe: false, transparent: true, side: THREE.DoubleSide,
        uniforms: { uSize: { value: 0.05 } },
        vertexShader: `varying vec3 vWorldPosition; void main() { vec4 w = modelMatrix * vec4(position, 1.0); vWorldPosition = w.xyz; gl_Position = projectionMatrix * viewMatrix * w; }`,
        fragmentShader: `varying vec3 vWorldPosition; uniform float uSize; void main() { vec2 g = abs(fract(vWorldPosition.xy * uSize) - 0.5) / fwidth(vWorldPosition.xy * uSize); vec2 g2 = abs(fract(vWorldPosition.zy * uSize) - 0.5) / fwidth(vWorldPosition.zy * uSize); float l = min(min(g.x, g.y), min(g2.x, g2.y)); if (1.0 - min(l, 1.0) < 0.1) discard; gl_FragColor = vec4(0.26, 0.26, 1.0, 0.4); }`
    });
    scene.add(new THREE.Mesh(new THREE.SphereGeometry(PLANET_RADIUS, 64, 64), planetMaterial));

    scene.add(new THREE.DirectionalLight(0xffffff, 2.5));
    scene.add(new THREE.AmbientLight(0x888888));
    const backLight = new THREE.DirectionalLight(0xabcdef, 0.8);
    backLight.position.set(-50, 100, -50);
    scene.add(backLight);

    // Генерация (без изменений)
    function positionOnSphere(mesh, distanceToCenter) {
        const u = Math.random(), v = Math.random();
        const theta = u * 2.0 * Math.PI, phi = Math.acos(2.0 * v - 1.0);
        mesh.position.set(distanceToCenter * Math.sin(phi) * Math.cos(theta), distanceToCenter * Math.sin(phi) * Math.sin(theta), distanceToCenter * Math.cos(phi));
        mesh.quaternion.setFromUnitVectors(new THREE.Vector3(0, 1, 0), mesh.position.clone().normalize());
    }

    for(let i=0; i<40; i++) {
        const sizeY = 4 + Math.random() * 15;
        const box = new THREE.Mesh(new THREE.BoxGeometry(10 + Math.random()*20, sizeY, 10 + Math.random()*20), new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff }));
        box.geometry.translate(0, -sizeY / 2, 0);
        positionOnSphere(box, PLANET_RADIUS);
        scene.add(box);
    }

    const backgroundPlanets = [];
    [{r: 500, c: 0xe27b58, x: 3500, y: 1500, z: -2000}, {r: 800, c: 0x47637c, x: -4500, y: -2000, z: -3000}].forEach(d => {
        const m = new THREE.Mesh(new THREE.SphereGeometry(d.r, 32, 32), new THREE.MeshPhongMaterial({ color: d.c }));
        m.position.set(d.x, d.y, d.z);
        scene.add(m);
        backgroundPlanets.push(m);
    });

    let velocity = new THREE.Vector3(0, 0, 0);
let angularVelocity = new THREE.Vector3(0, 0, 0); // Новая переменная для инерции
    
renderer.setAnimationLoop(() => {
        const session = renderer.xr.getSession();
        let thrust = 0;
        const deadzone = 0.2;
        const SMOOTHING = 0.05; // Коэффициент плавности (0.01 - очень медленно, 0.1 - быстрее)
        
        if (session && session.inputSources) {
            for (const source of session.inputSources) {
                const gp = source.gamepad;
                if (!gp) continue;

                // 1. Целевые значения на основе джойстика
                let targetX = Math.abs(gp.axes[1]) > deadzone ? gp.axes[1] * TURN_SPEED : 0;
                let targetY = Math.abs(gp.axes[0]) > deadzone ? gp.axes[0] * TURN_SPEED : 0;
                let targetZ = Math.abs(gp.axes[0]) > deadzone ? -gp.axes[0] * TURN_SPEED : 0;

                // 2. Плавная интерполяция (Lerp) к целевым значениям
                angularVelocity.x += (targetX - angularVelocity.x) * SMOOTHING;
                angularVelocity.y += (targetY - angularVelocity.y) * SMOOTHING;
                angularVelocity.z += (targetZ - angularVelocity.z) * SMOOTHING;

                if (gp.buttons[0]?.pressed) thrust = FLY_SPEED * 2;
            }
        }

        // Применяем вращение
        player.rotateOnAxis(new THREE.Vector3(1, 0, 0), angularVelocity.x);
        player.rotateOnAxis(new THREE.Vector3(0, 1, 0), angularVelocity.y);
        player.rotateOnAxis(new THREE.Vector3(0, 0, 1), angularVelocity.z);
        
        // --- Физика движения без изменений ---
        const localUp = new THREE.Vector3(0, 1, 0).applyQuaternion(player.quaternion);
        if (thrust > 0) velocity.add(localUp.multiplyScalar(thrust));
        
        const gravDir = player.position.clone().normalize();
        velocity.addScaledVector(gravDir, GRAVITY);
        player.position.add(velocity);
        velocity.multiplyScalar(DAMPING_MOVE);

        if (player.position.length() > PLANET_RADIUS - PLAYER_HEIGHT) {
            player.position.setLength(PLANET_RADIUS - PLAYER_HEIGHT);
            velocity.multiplyScalar(0);
        }

        backgroundPlanets.forEach(p => { p.rotation.y += 0.002; });
        renderer.render(scene, camera);
    });
</script>
</body>
</html>
