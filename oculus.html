<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Outside-in Planet VR</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0a0a12; }
    </style>
</head>
<body>

<script type="importmap">
  { "imports": { 
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    // 1. Инициализация (как у вас)
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a12);
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 12000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(VRButton.createButton(renderer));

    // Параметры (ваши)
    const PLANET_RADIUS = 1500;
    const PLAYER_HEIGHT = 2;
    const FLY_SPEED = 0.0057;
    const TURN_SPEED = 0.0003;
    const GRAVITY = 0.0043333;
    const DAMPING_TURN = 0.99;
    const DAMPING_MOVE = 0.99;

    const player = new THREE.Group();
    player.position.set(0, -(PLANET_RADIUS - PLAYER_HEIGHT), 0);
    scene.add(player);
    player.add(camera);

    // Ваши переменные состояния
    let velocity = new THREE.Vector3(0, 0, 0);
    let angularVelocityX = 0;
    let angularVelocityZ = 0;
    let currentThrottle = 0; // Теперь управляется контроллером

    // 2. ЦИКЛ VR (Сюда перенесена вся логика)
    renderer.setAnimationLoop(function () {
        
        // --- БЛОК УПРАВЛЕНИЯ КОНТРОЛЛЕРОМ ---
        const session = renderer.xr.getSession();
        if (session) {
            for (const source of session.inputSources) {
                if (source.gamepad) {
                    const axes = source.gamepad.axes;
                    angularVelocityX += axes[1] * 0.001; // Наклон
                    angularVelocityZ += axes[0] * 0.001; // Крен
                    currentThrottle = source.gamepad.buttons[0].pressed ? 1 : 0;
                }
            }
        }

        // --- БЛОК ФИЗИКИ (Ваш) ---
        angularVelocityX *= DAMPING_TURN;
        angularVelocityZ *= DAMPING_TURN;

        const deltaQuaternion = new THREE.Quaternion().setFromEuler(
            new THREE.Euler(angularVelocityX, 0, angularVelocityZ, 'YXZ')
        );
        player.quaternion.multiply(deltaQuaternion);

        let localUp = new THREE.Vector3(0, 1, 0).applyQuaternion(player.quaternion).negate();
        if (currentThrottle > 0) velocity.addScaledVector(localUp, -FLY_SPEED * 2);

        const playerDirection = player.position.clone().normalize();
        velocity.addScaledVector(playerDirection, GRAVITY);
        player.position.add(velocity);
        velocity.multiplyScalar(DAMPING_MOVE);

        // --- БЛОК КОЛЛИЗИЙ (Ваш) ---
        // Если игрок улетел слишком далеко, возвращаем назад
        if (player.position.length() > PLANET_RADIUS - PLAYER_HEIGHT) {
            player.position.copy(playerDirection.multiplyScalar(PLANET_RADIUS - PLAYER_HEIGHT));
        }

        renderer.render(scene, camera);
    });
</script>
</body>
</html>
