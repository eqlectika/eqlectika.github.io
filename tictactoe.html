<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>TicTacToe</title>
    <link rel="manifest" href="manifest.json">
<style>
    body {
        margin: 0;
        width: 100vw;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #222;
        overflow: hidden;
        touch-action: none;
        font-family: sans-serif;
    }

    .board {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        width: calc(100vw - 40px);
        max-width: 400px;
    }

    .cell {
        width: 100%;
        aspect-ratio: 1 / 1;
        border: 4px solid white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 15vw;
        color: white;
        background: #333;
        box-sizing: border-box;
        line-height: 1; /* Важно: отключает лишние отступы шрифта */
        overflow: hidden; /* Предотвращает выход текста за границы */
    }

    button {
        padding: 10px 25px;
        font-size: 1.2em;
        cursor: pointer;
        background: #000;
        color: white;
        border: 2px solid white;
        border-radius: 5px;
        font-weight: bold;
        margin-top: 30px;
    }
</style>
</head>
<body>

<a href="index.html">
    <img src="logo.png" alt="Logo" style="width: 64px; margin-bottom: 20px;">
</a>

<div class="board" id="board">
    <div class="cell" onclick="makeMove(this, 0)"></div>
    <div class="cell" onclick="makeMove(this, 1)"></div>
    <div class="cell" onclick="makeMove(this, 2)"></div>
    <div class="cell" onclick="makeMove(this, 3)"></div>
    <div class="cell" onclick="makeMove(this, 4)"></div>
    <div class="cell" onclick="makeMove(this, 5)"></div>
    <div class="cell" onclick="makeMove(this, 6)"></div>
    <div class="cell" onclick="makeMove(this, 7)"></div>
    <div class="cell" onclick="makeMove(this, 8)"></div>
</div>

<button onclick="resetGame()">Reset</button>

<script>
    let currentPlayer = 'X';
    let board = ['', '', '', '', '', '', '', '', ''];

    function makeMove(element, index) {
        if (!board[index]) {
            board[index] = currentPlayer;
            element.innerText = currentPlayer;
            checkWinner();
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }
    }

    function checkWinner() {
        const wins = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];
        for (let combo of wins) {
            const [a, b, c] = combo;
            if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                alert(board[a] + ' win!');
                resetGame();
                return;
            }
        }
        if (!board.includes('')) {
            alert('Tie!');
            resetGame();
        }
    }

    function resetGame() {
        board = ['', '', '', '', '', '', '', '', ''];
        currentPlayer = 'X';
        document.querySelectorAll('.cell').forEach(cell => cell.innerText = '');
    }
</script>

</body>
</html>
