<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <title>TicTacToe</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { 
            background: #222; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: sans-serif;
            margin: 0;
            padding-top: 50px;
            touch-action: none; /* Запрещает жесты браузера (зум, панорамирование) */
            overflow: hidden;   /* Убирает скролл */
            height: 100vh;      /* Высота на весь экран */
        }

        .board { 
            margin-bottom: 30px;
            display: grid; 
            grid-template-columns: repeat(3, 1fr); /* 1fr занимает доступное место */
            gap: 10px;
            width: 90vw;       /* 90% ширины экрана */
            max-width: 400px;  /* Чтобы не растягивалось на планшетах */
        }
        .cell { 
            width: 120px; 
            height: 120px; 
            border: 4px solid white; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 4em; 
            cursor: pointer; 
            color: white;
            background: #333;
            aspect-ratio: 1 / 1; /* Квадратная форма при любой ширине */
            width: 100%;
            font-size: 15vw;     /* Размер шрифта зависит от ширины экрана */
        }

        button {
            padding: 10px 25px;
            font-size: 1.2em;
            cursor: pointer;
            background: #000000;
            border: 2px;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<a href="index.html">
    <img src="logo.png" alt="Logo" style="width: 100px; margin-bottom: 20px;">
</a>

<div class="board" id="board">
    <div class="cell" onclick="makeMove(this, 0)"></div>
    <div class="cell" onclick="makeMove(this, 1)"></div>
    <div class="cell" onclick="makeMove(this, 2)"></div>
    <div class="cell" onclick="makeMove(this, 3)"></div>
    <div class="cell" onclick="makeMove(this, 4)"></div>
    <div class="cell" onclick="makeMove(this, 5)"></div>
    <div class="cell" onclick="makeMove(this, 6)"></div>
    <div class="cell" onclick="makeMove(this, 7)"></div>
    <div class="cell" onclick="makeMove(this, 8)"></div>
</div>

<button onclick="resetGame()">Reset</button>

<script>
    let currentPlayer = 'X';
    let board = ['', '', '', '', '', '', '', '', ''];

    function makeMove(element, index) {
        if (!board[index]) {
            board[index] = currentPlayer;
            element.innerText = currentPlayer;
            checkWinner();
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }
    }

    function checkWinner() {
        const wins = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];
        for (let combo of wins) {
            const [a, b, c] = combo;
            if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                alert(board[a] + ' победил!');
                resetGame();
                return;
            }
        }
        if (!board.includes('')) {
            alert('Ничья!');
            resetGame();
        }
    }

    function resetGame() {
        board = ['', '', '', '', '', '', '', '', ''];
        currentPlayer = 'X';
        document.querySelectorAll('.cell').forEach(cell => cell.innerText = '');
    }
</script>

</body>
</html>
