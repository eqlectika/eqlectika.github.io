<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Крестики-нолики</title>
    <link rel="manifest" href="manifest.json">
    <style>
        .board { display: grid; grid-template-columns: repeat(3, 120px); gap: 10px; }
        .cell { 
            width: 120px; height: 120px; 
            border: 4px solid white; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 4em; cursor: pointer; color: white;
            background: #333;
        }
        body { background: #222; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>

<a href="index.html">
    <img src="logo.png" alt="Logo" style="width: 100px; margin-bottom: 20px;">
</a>

<div class="board" id="board">
    <div class="cell" onclick="makeMove(0)"></div>
    <div class="cell" onclick="makeMove(1)"></div>
    <div class="cell" onclick="makeMove(2)"></div>
    <div class="cell" onclick="makeMove(3)"></div>
    <div class="cell" onclick="makeMove(4)"></div>
    <div class="cell" onclick="makeMove(5)"></div>
    <div class="cell" onclick="makeMove(6)"></div>
    <div class="cell" onclick="makeMove(7)"></div>
    <div class="cell" onclick="makeMove(8)"></div>
</div>

<script>
    let currentPlayer = 'X';
    let board = ['', '', '', '', '', '', '', '', ''];
    const cells = document.querySelectorAll('.cell');

    function makeMove(index) {
        if (!board[index]) {
            board[index] = currentPlayer;
            cells[index].innerText = currentPlayer;
            checkWinner();
            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        }
    }

    function checkWinner() {
        const wins = [[0,1,2], [3,4,5], [6,7,8], [0,3,6], [1,4,7], [2,5,8], [0,4,8], [2,4,6]];
        for (let combo of wins) {
            const [a, b, c] = combo;
            if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                alert(board[a] + ' Win!');
                location.reload();
            }
        }
        if (!board.includes('')) alert('Tie!');
    }
</script>

</body>
</html>
