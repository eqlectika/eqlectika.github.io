<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bismuth Ortho Touch</title>
<style>
body { margin: 0; overflow: hidden; background: #000; touch-action: none; -webkit-tap-highlight-color: transparent; }
canvas { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
const group = new THREE.Group();
scene.add(group);
const materialBase = new THREE.MeshStandardMaterial({ 
    metalness: 0.4, 
    roughness: 0.3, 
    transparent: true, 
    opacity: 0.5, 
    side: THREE.DoubleSide,
    flatShading: true
});
function createRect(p1, p2, p3, p4, depth) {
    const geo = new THREE.BufferGeometry();
    const vertices = new Float32Array([
        p1.x,p1.y,p1.z, p2.x,p2.y,p2.z, p3.x,p3.y,p3.z,
        p3.x,p3.y,p3.z, p4.x,p4.y,p4.z, p1.x,p1.y,p1.z
    ]);
    geo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
    geo.computeVertexNormals();
    const mesh = new THREE.Mesh(geo, materialBase.clone());
    mesh.material.color.setHSL((depth * 0.1) % 1.0, 0.8, 0.5);
    mesh.userData = { isBismuth: true, depth: depth, corners: [p1.clone(), p2.clone(), p3.clone(), p4.clone()] };
    group.add(mesh);
}
const s = 4;
const pts = [
    new THREE.Vector3(-s,s,s), new THREE.Vector3(s,s,s), new THREE.Vector3(s,-s,s), new THREE.Vector3(-s,-s,s),
    new THREE.Vector3(-s,s,-s), new THREE.Vector3(s,s,-s), new THREE.Vector3(s,-s,-s), new THREE.Vector3(-s,-s,-s)
];
createRect(pts[0], pts[1], pts[2], pts[3], 0);
createRect(pts[1], pts[5], pts[6], pts[2], 0);
createRect(pts[5], pts[4], pts[7], pts[6], 0);
createRect(pts[4], pts[0], pts[3], pts[7], 0);
createRect(pts[4], pts[5], pts[1], pts[0], 0);
createRect(pts[3], pts[2], pts[6], pts[7], 0);
function grow(mesh) {
    const c = mesh.userData.corners;
    const d = mesh.userData.depth + 1;
    if (d > 12) return;
    const v1 = new THREE.Vector3().subVectors(c[1], c[0]);
    const v2 = new THREE.Vector3().subVectors(c[3], c[0]);
    const normal = new THREE.Vector3().crossVectors(v1, v2).normalize();
    const center = new THREE.Vector3().add(c[0]).add(c[1]).add(c[2]).add(c[3]).divideScalar(4);
    const offset = normal.clone().multiplyScalar(1.2);
    const inner = c.map(p => p.clone().lerp(center, 0.2).sub(offset));
    createRect(c[0], c[1], inner[1], inner[0], d);
    createRect(c[1], c[2], inner[2], inner[1], d);
    createRect(c[2], c[3], inner[3], inner[2], d);
    createRect(c[3], c[0], inner[0], inner[3], d);
    createRect(inner[0], inner[1], inner[2], inner[3], d);
    group.remove(mesh);
}
const pLight = new THREE.PointLight(0xffffff, 5, 100);
pLight.position.set(15, 15, 15);
scene.add(pLight);
scene.add(new THREE.AmbientLight(0xffffff, 0.5));
camera.position.set(12, 12, 12);
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let touchStartTime = 0;
function onTouchStart(e) {
    touchStartTime = Date.now();
}
function onTouchEnd(e) {
    if (Date.now() - touchStartTime > 200) return;
    const t = e.changedTouches[0];
    mouse.x = (t.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(t.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(group.children);
    if (intersects.length > 0) grow(intersects[0].object);
}
window.addEventListener('touchstart', onTouchStart, { passive: false });
window.addEventListener('touchend', onTouchEnd, { passive: false });
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
