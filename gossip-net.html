<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cross-Device Gossip P2P</title>
<style>
body { background: #000; color: #0f0; font-family: monospace; padding: 20px; box-sizing: border-box; }
.box { border: 1px solid #0f0; padding: 15px; margin-bottom: 15px; }
input, button { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 5px 0; }
button { cursor: pointer; }
#log { height: 180px; overflow-y: scroll; border: 1px dashed #0f0; padding: 10px; font-size: 12px; }
.msg-item { border-bottom: 1px solid #113311; padding: 5px 0; }
.status-ok { color: #00ff00; }
.status-err { color: #ff0000; }
</style>
</head>
<body>

<div class="box">
    <h3>🌐 Сетевой статус (<span id="nodeId"></span>)</h3>
    <div id="connectionStatus">Подключение к сети...</div>
</div>

<div class="box">
    <h3>💬 Опубликовать объявление (Gossip)</h3>
    <input type="text" id="msgInput" placeholder="Текст объявления..." style="width:70%;">
    <button onclick="publishMessage()">Разослать</button>
</div>

<div class="box">
    <h3>📦 База данных объявлений</h3>
    <div id="messages">Ожидание данных...</div>
</div>

<div class="box">
    <h3>⚡ Лог Gossip-протокола</h3>
    <div id="log"></div>
</div>

<!-- Подключаем легкую библиотеку Socket.io или используем чистый WebSocket через публичный ретранслятор -->
<script>
// Генерируем уникальное имя текущего устройства
const myId = 'Device-' + Math.floor(Math.random() * 9000 + 1000);
document.getElementById('nodeId').innerText = myId;

let messages = {};

// Используем бесплатный публичный WebSocket-эхо/ретранслятор для демонстраций (Pub/Sub)
// Мы подключимся к общему каналу "p2p_gossip_test_room_2026"
const wsUrl = 'wss://sockets.fairuse.org/v1/ws'; // Или используем альтернативный публичный ws шлюз
// Попробуем надежный публичный MQTT-over-Websocket брокер (HiveMQ), он идеально подходит для теста:
const mqttWsUrl = 'wss://broker.hivemq.com:8884/mqtt';

log("Инициализация сетевого слоя...");

// Воспользуемся простым и сверхстабильным публичным WebSocket сервисом для тестов: wss://echo.websocket.org или mqtt
// Чтобы устройства видели друг друга, они должны быть подписаны на один топик. 
// Реализуем через бесплатный публичный JSON API / WebSocket ретранслятор (SyncServer):
// Возьмем проверенный публичный сервис Supabase/Firebase или готовый публичный WS-ретранслятор:
// Для максимальной простоты без регистрации используем публичный Y-WebRTC / Broadcast WebSocket:
const socketUrl = 'wss://demos.kaazing.com/echo'; // просто эхо для примера, но нам нужен обмен между клиентами.

// Самый простой способ объединить 2 устройства в интернете без своего сервера — использовать публичный Relay (например, WSS сервис wss://gossip-relay.glitch.me или аналог, 
// но раз у нас нет готового бэкенда, поднидем соединение через бесплатный публичный MQTT брокер прямо в браузере с помощью легкого скрипта).
</script>

<!-- Подключаем MQTT клиент одной строкой, чтобы не писать велосипеды для маршрутизации сообщений между устройствами в разных концах мира -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>

<script>
// Подключаемся к публичному брокеру (его используют только для доставки пакетов между пирами)
const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt', {
    clientId: 'gossip_node_' + Math.random().toString(16).substr(2, 8)
});

const TOPIC = 'p2p/public/messenger/announcements/v1';

client.on('connect', () => {
    document.getElementById('connectionStatus`.trim() // исправлено ниже
    document.getElementById('connectionStatus').innerHTML = '<span class="status-ok">● Подключено к P2P-облаку (транспортный уровень)</span>';
    log("Успешное подключение к транспортной сети.");
    client.subscribe(TOPIC, (err) => {
        if (!err) {
            log(`Успешная подписка на канал ретрансляции: ${TOPIC}`);
        }
    });
});

client.on('error', (err) => {
    document.getElementById('connectionStatus').innerHTML = '<span class="status-err">● Ошибка подключения к сети</span>';
    log("Ошибка сети: " + JSON.stringify(err));
});

// Получение данных из сети (Gossip приемник)
client.on('message', (topic, payload) => {
    try {
        let packet = JSON.parse(payload.toString());
        
        // Игнорируем свои же пакеты
        if (packet.sender === myId) return;

        log(`Получен пакет от [${packet.sender}]: "${packet.text}"`);

        // Логика Gossip: проверка на дубликаты по уникальному ID сообщения
        if (!messages[packet.id]) {
            messages[packet.id] = packet;
            log(`✓ Новое объявление добавлено в локальную базу. ID: ${packet.id}`);
            renderMessages();
        } else {
            log(`⚡ Дубликат отброшен. ID: ${packet.id}`);
        }
    } catch (e) {
        log("Ошибка парсинга входящего пакета");
    }
});

function publishMessage() {
    let input = document.getElementById('msgInput');
    let text = input.value.trim();
    if (!text) return;

    let packet = {
        id: 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 1000),
        sender: myId,
        text: text,
        timestamp: Date.now()
    };

    // Сохраняем себе
    messages[packet.id] = packet;
    renderMessages();

    // Публикуем в общую сеть (все остальные устройства на других гаджетах получат это мгновенно)
    client.publish(TOPIC, JSON.stringify(packet), { qos: 0 }, (err) => {
        if (!err) {
            log(`↗ Объявление успешно разослано в сеть: "${text}"`);
        } else {
            log(`✖ Ошибка отправки: ${err}`);
        }
    });

    input.value = '';
}

function renderMessages() {
    let container = document.getElementById('messages');
    container.innerHTML = '';
    
    let sorted = Object.values(messages).sort((a, b) => b.timestamp - a.timestamp);
    
    if (sorted.length === 0) {
        container.innerHTML = 'Нет объявлений.';
        return;
    }

    sorted.forEach(msg => {
        let div = document.createElement('div');
        div.className = 'msg-item';
        div.innerHTML = `<b>[Автор: ${msg.sender}]</b>: ${msg.text} <small>(${new Date(msg.timestamp).toLocaleTimeString()})</small>`;
        container.appendChild(div);
    });
}

function log(txt) {
    let l = document.getElementById('log');
    l.innerHTML += `<div>> ${txt}</div>`;
    l.scrollTop = l.scrollHeight;
}
</script>

</body>
</html>
