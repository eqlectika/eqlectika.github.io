<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest-gossip.json">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cross-Device Gossip P2P</title>
<style>
body { background: #000; color: #0f0; font-family: monospace; padding: 0px; box-sizing: border-box; }
.app-container {
    max-width: 1024px;
    margin: 0 auto;
    background-color: #000;
    min-height: 100vh;
    box-sizing: border-box;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
}
.box { border: 1px solid #0f0; padding: 10px; margin-bottom: 15px; }
input, button { background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; margin: 5px 0; }
button { cursor: pointer; }
#log { height: 180px; overflow-y: scroll; border: 1px dashed #0f0; padding: 10px; font-size: 12px; }
.msg-item { border-bottom: 1px solid #113311; padding: 5px 0; }
.status-ok { color: #00ff00; }
.status-err { color: #ff0000; }
a { color: #448aff; text-decoration: none; }

</style>
</head>
<body>
<div class="app-container">
<a href="index.html" id="logoLink" style="text-decoration: none;"><img src="logo.png" alt="Logo" style="max-width: 48px; opacity: 0.9;"></a> 
<div class="box">
    <h3>Сетевой статус (<span id="nodeId"></span>)</h3>
    <div id="connectionStatus">Подключение к сети...</div>
</div>

<div class="box">
    <h3>Опубликовать объявление (Gossip)</h3>
    <input type="text" id="msgInput" placeholder="Текст объявления..." style="width:70%;">
    <button onclick="publishMessage()">Разослать</button>
</div>

<div class="box">
    <h3>База данных объявлений</h3>
    <div id="messages">Ожидание данных...</div>
</div>

<div class="box">
    <h3>Лог Gossip-протокола</h3>
    <div id="log"></div>
</div>
<div style=" text-align: left; font-size: 14px; color: #999; margin: 20px 0 0 0; text-decoration: none; ">
Made by <a href="https://eugenebox.t.me/" target="_blank" id="author-link">@eugenebox</a>
</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax5/libs/mqtt/4.3.7/mqtt.min.js"></script>
<script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>

<script>
const myId = 'Device-' + Math.floor(Math.random() * 9000 + 1000);
document.getElementById('nodeId').innerText = myId;

let messages = {};

function log(txt) {
    let l = document.getElementById('log');
    l.innerHTML += `<div>> ${txt}</div>`;
    l.scrollTop = l.scrollHeight;
}

log("Инициализация сетевого слоя...");

let client;
try {
    client = mqtt.connect('wss://test.mosquitto.org:8081/mqtt', {
        clientId: 'gossip_node_' + Math.random().toString(16).substr(2, 8)
    });
} catch(e) {
    log("Ошибка инициализации MQTT: " + e.message);
}

const TOPIC = 'p2p/public/messenger/announcements/v2';

if (client) {
    client.on('connect', () => {
        document.getElementById('connectionStatus').innerHTML = '<span class="status-ok">● Подключено к P2P-облаку</span>';
        log("Успешное подключение к транспортной сети.");
        client.subscribe(TOPIC, (err) => {
            if (!err) {
                log(`Подписка оформлена: ${TOPIC}`);
            } else {
                log(`Ошибка подписки: ${err}`);
            }
        });
    });

    client.on('error', (err) => {
        document.getElementById('connectionStatus').innerHTML = '<span class="status-err">● Ошибка подключения к сети</span>';
        log("Ошибка сети: " + JSON.stringify(err));
    });

    client.on('message', (topic, payload) => {
        try {
            let packet = JSON.parse(payload.toString());
            if (packet.sender === myId) return;

            log(`Получен пакет от [${packet.sender}]: "${packet.text}"`);

            if (!messages[packet.id]) {
                messages[packet.id] = packet;
                log(`✓ Новое объявление добавлено. ID: ${packet.id}`);
                renderMessages();
            } else {
                log(`⚡ Дубликат отброшен. ID: ${packet.id}`);
            }
        } catch (e) {
            log("Ошибка парсинга входящего пакета");
        }
    });
}

function publishMessage() {
    let input = document.getElementById('msgInput');
    let text = input.value.trim();
    if (!text) return;
    if (!client || !client.connected) {
        alert("Нет подключения к сети!");
        return;
    }

    let packet = {
        id: 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 1000),
        sender: myId,
        text: text,
        timestamp: Date.now()
    };

    messages[packet.id] = packet;
    renderMessages();

    client.publish(TOPIC, JSON.stringify(packet), { qos: 0 }, (err) => {
        if (!err) {
            log(`↗ Объявление разослано: "${text}"`);
        } else {
            log(`✖ Ошибка отправки: ${err}`);
        }
    });

    input.value = '';
}

function renderMessages() {
    let container = document.getElementById('messages');
    container.innerHTML = '';
    
    let sorted = Object.values(messages).sort((a, b) => b.timestamp - a.timestamp);
    
    if (sorted.length === 0) {
        container.innerHTML = 'Нет объявлений.';
        return;
    }

    sorted.forEach(msg => {
        let div = document.createElement('div');
        div.className = 'msg-item';
        div.innerHTML = `<b>[Автор: ${msg.sender}]</b>: ${msg.text} <small>(${new Date(msg.timestamp).toLocaleTimeString()})</small>`;
        container.appendChild(div);
    });
}
</script>

</body>
</html>
