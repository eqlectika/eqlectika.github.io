<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-content">
  <meta name="description" content="Simple Code Editor" />
<link rel="manifest" href="manifest.json">
    <title>Code Viewer</title>
  <style>
html, body {
  height: 100%;
  margin: 0;
  overflow: hidden;
}



body {
  display: flex; 
  flex-direction: row;
  font-family: Arial, sans-serif; 
  background-color: black; 
  color: white; 
  height: 100%;
      position: relative;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }

    #editorContainer { flex: 38; display: flex; position: relative; background-color: black; min-width: 0; overscroll-behavior: contain; }
    #preview { flex: 62; border: none; background-color: #333333; overflow: auto; min-width: 0; overscroll-behavior: contain; }
    
    #controlPanel { 
      flex: 0 0 auto; 
      background-color: black; 
      border-left: 1px solid #222; 
    }
    
    #controlPanel > div {
      display: flex; 
      flex-direction: column; 
      gap: 12px; 
      align-items: center; 
      justify-content: flex-start; 
      padding: 15px 10px; 
      box-sizing: border-box; 
      height: 100%;
    }

    #lineNumbering {
      width: 40px; padding: 10px 5px; text-align: right; font-family: monospace;
      font-size: 14px; line-height: 1.2; color: #666; background-color: #111;
      user-select: none; white-space: pre; overflow: hidden; box-sizing: border-box; flex-shrink: 0;
    }

    #editor {
      flex: 1; padding: 10px; border: none; resize: none; font-family: monospace;
      font-size: 14px; line-height: 1.2; background-color: black; color: white; 
      outline: none; caret-color: white; position: relative; box-sizing: border-box; 
      overflow: auto; white-space: pre; min-width: 0;
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
    }

    /* Расширенная многоцветная палитра для подсветки кода */
    .hl-keyword { color: #ff79c6; font-weight: bold; }
    .hl-tag { color: #8be9fd; }
    .hl-attr { color: #50fa7b; }
    .hl-string { color: #f1fa8c; }
    .hl-comment { color: #6272a4; font-style: italic; }
    .hl-special { color: #bd93f9; }
    .hl-number { color: #ffb86c; }
    .hl-boolean { color: #ff5555; }

    #searchField {
      padding: 5px; font-size: 14px; border: 1px solid #555; background-color: #333333;
      color: white; height: 35px; box-sizing: border-box; border-radius: 5px; width: 100px }

#prevMatchButton, #nextMatchButton {
  width: 40px; 
  height: 40px; 
  background-color: #333333; 
  color: white;
  border: none; 
  cursor: pointer; 
  font-size: 18px; 
  border-radius: 5px; 
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

    #fileFormat { font-size: 14px; padding: 5px; width: 100px; height: 35px; }
    #saveButton {
      width: 80px; height: 40px; background-color: #007bff; color: white;
      border: none; cursor: pointer; font-size: 14px; border-radius: 5px;
    }

    @media (orientation: portrait) {
      body { flex-direction: column; }
      #editorContainer { flex: 40; min-height: 0; }
      #preview { flex: 50; min-height: 0; }
      #controlPanel { border-left: none; border-top: 1px solid #222; }
      #controlPanel > div {
        flex-direction: row; 
        justify-content: space-evenly; 
        padding: 10px; 
        height: auto; 
        width: 100%;
        flex-wrap: wrap;
      }
      #searchField { width: 100px; flex-grow: 1; }
    }
  </style>
</head>
<body>
<script src="pwa-init.js"></script>
  <div id="editorContainer">
    <div id="lineNumbering">1</div>
    <div id="editor" contenteditable="true" spellcheck="false" placeholder="Type to see your code here..."></div>
  </div>

  <iframe id="preview" title="Preview"></iframe>

  <div id="controlPanel">
    <div>
      <input type="text" id="searchField" placeholder="Search">
      <button id="prevMatchButton" title="Previous Match">▲</button>
      <button id="nextMatchButton" title="Next Match">▼</button>
      
      <select id="fileFormat">
        <option value="html">HTML</option>
        <option value="json">JSON</option>
        <option value="txt">TXT</option>
        <option value="js">JS</option>
        <option value="css">CSS</option>
      </select>
      
      <button id="saveButton">Save</button>

      <a href="index.html" style="display: flex; align-items: center;">
        <img src="logo.png" alt="Feedback" style="height: 40px; opacity: 0.9; width: auto;">
      </a>
    </div>
  </div>

  <script>
    const editor = document.getElementById("editor");
    const preview = document.getElementById("preview");
    const saveButton = document.getElementById("saveButton");
    const fileFormat = document.getElementById("fileFormat");
    const searchField = document.getElementById("searchField");
    const prevMatchButton = document.getElementById("prevMatchButton");
    const nextMatchButton = document.getElementById("nextMatchButton");
    const lineNumbering = document.getElementById("lineNumbering");
    let searchMatches = [];
    let currentMatchIndex = -1;
    let currentSearchTerm = "";
    const mimeTypes = {
      html: "text/html", json: "application/json", txt: "text/plain",
      js: "application/javascript", css: "text/css",
    };

    function getEditorText() {
        return editor.innerText || editor.textContent || "";
    }

    function applyHighlighting(text) {
        let html = text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");

        // 1. Теги HTML (Голубой)
        html = html.replace(/(&lt;\/?[a-zA-Z0-9:-]+)/g, '<span class="hl-tag">$1</span>');
        
        // 2. Атрибуты (Зеленый)
        html = html.replace(/(\s[a-zA-Z0-9:-]+=)/g, '<span class="hl-attr">$1</span>');
        
        // 3. Строки в кавычках (Желтый)
        html = html.replace(/(&quot;.*?&quot;|'.*?')/g, '<span class="hl-string">$1</span>');
        
        // 4. Комментарии (Серо-синий)
        html = html.replace(/(&lt;!--.*?--&gt;|\/\*.*?\*\/|\/\/.*)/g, '<span class="hl-comment">$1</span>');
        
        // 5. Специальные символы и фигурные скобки (Фиолетовый)
        html = html.replace(/([{}::[\]])/g, '<span class="hl-special">$1</span>');

        // 6. Числа (Оранжевый)
        html = html.replace(/\b(\d+)\b/g, '<span class="hl-number">$1</span>');

        // 7. Булевые значения (Красный)
        html = html.replace(/\b(true|false|null|undefined)\b/g, '<span class="hl-boolean">$1</span>');
        
        // 8. Ключевые слова программирования (Розовый)
        const keywords = /\b(const|let|var|function|return|if|else|for|while|do|switch|case|break|continue|document|window|class|import|export|from)\b/g;
        html = html.replace(keywords, '<span class="hl-keyword">$1</span>');

        return html;
    }

    function updateLineNumbers() {
        const lines = getEditorText().split('\n');
        const totalLines = lines.length === 0 ? 1 : lines.length;
        lineNumbering.textContent = Array.from({ length: totalLines }, (_, i) => i + 1).join('\n');
    }

    function saveCaretPosition(context) {
        const selection = window.getSelection();
        if (selection.rangeCount === 0) return null;
        const range = selection.getRangeAt(0);
        const preCaretRange = range.cloneRange();
        preCaretRange.selectNodeContents(context);
        preCaretRange.setEnd(range.endContainer, range.endOffset);
        return preCaretRange.toString().length;
    }

    function restoreCaretPosition(context, savedPosition) {
        if (savedPosition === null) return;
        const selection = window.getSelection();
        const range = document.createRange();
        range.setStart(context, 0);
        range.collapse(true);
        
        const nodeStack = [context];
        let currentNode = null;
        let currentPosition = 0;
        let stop = false;

        while (!stop && (currentNode = nodeStack.pop())) {
            if (currentNode.nodeType === 3) {
                const nextPosition = currentPosition + currentNode.length;
                if (savedPosition >= currentPosition && savedPosition <= nextPosition) {
                    range.setStart(currentNode, savedPosition - currentPosition);
                    range.collapse(true);
                    stop = true;
                }
                currentPosition = nextPosition;
            } else {
                let i = currentNode.childNodes.length;
                while (i--) {
                    nodeStack.push(currentNode.childNodes[i]);
                }
            }
        }
        selection.removeAllRanges();
        selection.addRange(range);
    }

    // Безопасное обновление превью: удаляет исполняемые скрипты, ломающие DOM
    function updatePreview(text) {
        let cleanText = text.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, "");
        preview.srcdoc = cleanText;
    }

    let isHighlighting = false;
    editor.addEventListener('input', () => {
        const text = getEditorText();
        updatePreview(text);
        updateLineNumbers();

        if (!isHighlighting) {
            isHighlighting = true;
            const caretPos = saveCaretPosition(editor);
            editor.innerHTML = applyHighlighting(text);
            restoreCaretPosition(editor, caretPos);
            isHighlighting = false;
        }
    });

    editor.addEventListener('scroll', () => { lineNumbering.scrollTop = editor.scrollTop; });
    updateLineNumbers();

    saveButton.addEventListener("click", () => {
      const format = fileFormat.value;
      const blob = new Blob([getEditorText()], { type: mimeTypes[format] || "text/plain" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `code.${format}`;
      a.click();
    });

    function highlightMatch(index) {
        if (index === -1 || searchMatches.length === 0) return;
        
        const textContent = getEditorText();
        const start = searchMatches[index];
        const end = start + currentSearchTerm.length;
        
        editor.focus();

        const selection = window.getSelection();
        const range = document.createRange();
        
        const nodeStack = [editor];
        let currentNode = null;
        let currentPosition = 0;
        let startNode = null, startOffset = 0;
        let endNode = null, endOffset = 0;

        while ((currentNode = nodeStack.pop())) {
            if (currentNode.nodeType === 3) {
                const nextPosition = currentPosition + currentNode.length;
                if (!startNode && start >= currentPosition && start <= nextPosition) {
                    startNode = currentNode;
                    startOffset = start - currentPosition;
                }
                if (!endNode && end >= currentPosition && end <= nextPosition) {
                    endNode = currentNode;
                    endOffset = end - currentPosition;
                    break;
                }
                currentPosition = nextPosition;
            } else {
                let i = currentNode.childNodes.length;
                while (i--) {
                    nodeStack.push(currentNode.childNodes[i]);
                }
            }
        }

        if (startNode && endNode) {
            range.setStart(startNode, startOffset);
            range.setEnd(endNode, endOffset);
            selection.removeAllRanges();
            selection.addRange(range);
        }
        
        const linesBefore = textContent.substring(0, start).split('\n').length - 1;
        editor.scrollTop = Math.max(0, (linesBefore - 2) * 16.8);
    }

    function startSearch(searchText) {
        const trimmed = searchText.trim();
        if (trimmed === "") { searchMatches = []; currentSearchTerm = ""; return; }
        
        searchMatches = [];
        currentSearchTerm = trimmed;
        const content = getEditorText().toLowerCase();
        const term = trimmed.toLowerCase();
        let index = content.indexOf(term, 0);
        
        while (index !== -1) {
            searchMatches.push(index);
            index = content.indexOf(term, index + term.length);
        }

        if (searchMatches.length > 0) {
            currentMatchIndex = 0;
            highlightMatch(currentMatchIndex);
        }
    }

    searchField.addEventListener("keydown", (e) => { 
        if (e.key === "Enter") {
            e.preventDefault(); 
            startSearch(searchField.value); 
        }
    });
    nextMatchButton.addEventListener("click", () => {
        if (searchField.value !== currentSearchTerm) startSearch(searchField.value);
        else if (searchMatches.length) { currentMatchIndex = (currentMatchIndex + 1) % searchMatches.length; highlightMatch(currentMatchIndex); }
    });
    prevMatchButton.addEventListener("click", () => {
        if (searchField.value !== currentSearchTerm) startSearch(searchField.value);
        else if (searchMatches.length) { currentMatchIndex = (currentMatchIndex - 1 + searchMatches.length) % searchMatches.length; highlightMatch(currentMatchIndex); }
    });
document.addEventListener('selectionchange', () => {
  if (document.activeElement === editor) {
    const rect = editor.getBoundingClientRect();
    const cursor = window.getSelection(); 
  }
});

editor.addEventListener('touchmove', (e) => {
  const touchY = e.touches[0].clientY;
  const rect = editor.getBoundingClientRect();
  if (touchY > rect.top + 20 && touchY < rect.bottom - 20) {
    e.stopPropagation(); 
  }
}, { passive: false });


function stopGlobalScroll(e) {
  // Функция заглушка
}


editor.addEventListener('pointerdown', () => {
  window.addEventListener('wheel', stopGlobalScroll, { passive: false });
  window.addEventListener('touchmove', stopGlobalScroll, { passive: false });
});

window.addEventListener('pointerup', () => {
  window.removeEventListener('wheel', stopGlobalScroll);
  window.removeEventListener('touchmove', stopGlobalScroll);
});
  </script>
</body>
</html>
