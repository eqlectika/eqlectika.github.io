<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest-flash.json">
  <title>Fast Reading Converter</title>
  <style>
    * { box-sizing: border-box; }
    
    html, body {
      overscroll-behavior: none;
      margin: 0; padding: 0;
      background-color: #000000; color: #fff; font-family: Arial, sans-serif;
      overflow: hidden;
      -webkit-user-select: none; user-select: none;
      position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
    }

    /* Единый жесткий контейнер на весь экран, защищающий от сдвигов */
    #appWrapper {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column;
      justify-content: space-between; align-items: center;
      padding: env(safe-area-inset-top, 10px) 10px calc(env(safe-area-inset-bottom, 0px) + 10px) 10px;
      overflow: hidden;
    }

    #container {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      z-index: 10; perspective: 1000px; pointer-events: none;
    }

    #inputContainer { 
      width: 100%; max-width: 650px;
      flex: 1; display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      z-index: 100; transition: opacity 0.3s ease;
      min-height: 0; /* Важно для flex-дочерних элементов */
    }

    #inputText {
      -webkit-user-select: text !important; user-select: text !important; pointer-events: auto !important;
      width: 100%; height: 100%; max-height: 40vh; min-height: 120px;
      padding: 12px; background: rgba(255,255,255,0.05); 
      color: #fff; border: 2px solid rgba(255,255,255,0.38); 
      outline: none; display: block; font-family: Arial, sans-serif; font-size: 16px;
      resize: none; overflow-y: auto; touch-action: pan-y !important;
    }

    #inputText::placeholder { color: rgba(255, 255, 255, 0.5); opacity: 1; }

    #middleBlock {
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      z-index: 110; transition: opacity 0.3s ease; margin: auto 0;
    }

    #logoContainer img { max-width: 40px; opacity: 0.9; display: block; }

    #settingsContainer { display: flex; flex-direction: column; align-items: center; gap: 5px; }

    .setting-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: auto; min-width: 150px; padding: 6px; font-size: 14px;
      cursor: pointer; color: rgba(255, 255, 255, 0.62); background: transparent;
    }

    .footer-block { 
      width: 100%; display: flex; flex-direction: column; align-items: center;
      z-index: 120; background: transparent; pointer-events: none;
    }
    .footer-block > * { pointer-events: auto; }

    #mainButtons { 
      display: flex; flex-direction: column; align-items: center; gap: 5px; width: 100%;
      position: relative;
    }

    .button-row { 
      display: flex; align-items: center; justify-content: center; gap: 8px; 
      width: 90%; max-width: 400px; height: 45px;
    }

    .button-row button { flex: 1; min-width: 90px; white-space: nowrap; text-align: center; }

    #backBtn { display: none; margin-bottom: 10px; background: rgba(255,255,255,0.1); z-index: 210; }
    body.is-paused #backBtn { display: block; }

    #editBtn { display: none; }
    body.is-paused #editBtn { 
      display: block !important; position: absolute; top: -50px; left: 50%;
      transform: translateX(-50%); z-index: 210 !important; width: auto; min-width: 100px;
      background: rgba(255,255,255,0.1); border: 2px solid #fff;
    }

    #startBtn { background: #fff; color: #000; font-weight: bold; border: none; min-width: 100px; }
    body.is-reading #startBtn, body.is-reading #slowerBtn, body.is-reading #fasterBtn, body.is-reading #accelBtn { 
      opacity: 0.38; background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.38); 
    }
    body.is-paused #startBtn { background: #fff; color: #000; opacity: 1; }

    #accelBtn {
      display: inline-flex; margin-top: 5px; border-radius: 4px; width: auto; padding: 8px;
      min-width: 150px; border: 2px solid rgba(255, 255, 255, 0.38); font-size: 12px; color: #fff;
    }

    /* Анимация слов */
    .word-layer {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      text-align: center; font-weight: 700; white-space: nowrap; width: 90%; z-index: 60; pointer-events: none;
    }
    .word-enter { opacity: 0; transform: translate(-50%, -50%) translateZ(500px); filter: blur(12px); }
    .word-active { opacity: 1; transform: translate(-50%, -50%); transition: all 0.1s cubic-bezier(0.23, 1, 0.32, 1); filter: blur(0); }
    .word-exit { opacity: 0; transform: translate(-50%, -50%) scale(0); filter: blur(10px); transition: transform 0.2s ease-in, opacity 0.5s linear, filter 0.4s 0.2s ease-in; }
    .word-exit-long { opacity: 0; transform: translate(-50%, -50%) scale(1); filter: blur(20px); transition: transform 0.4s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 1.0s linear, filter 0.7s 0.8s ease-in; }

    /* Переключение состояний */
    body.is-reading #inputContainer, 
    body.is-reading #middleBlock { opacity: 0 !important; pointer-events: none !important; }
    body.is-reading .footer-block { pointer-events: none; }

    button {
      font-size: 14px; background: transparent; color: white; border-radius: 25px; 
      border: 2px solid rgba(255,255,255,0.38); padding: 10px 20px; cursor: pointer; touch-action: manipulation;
    }

    /* Стили для горизонтального режима (компактный вид, чтобы всё влезало) */
    @media screen and (orientation: landscape) {
      #inputText { max-height: 28vh; min-height: 70px; }
      #middleBlock { gap: 4px; }
      #logoContainer img { max-width: 30px; }
      .setting-btn { padding: 3px; font-size: 12px; }
      #accelBtn { margin-top: 2px; padding: 5px; }
      .button-row { height: 38px; }
      button { padding: 6px 14px; font-size: 12px; }
      body.is-paused #editBtn { top: -42px; }
    }
  </style>
</head>
<body>
  <script src="pwa-init.js"></script>

  <div id="container"></div>

  <div id="appWrapper">
    <div id="inputContainer">
      <textarea id="inputText" placeholder="Paste your text here and press Start..."></textarea>
    </div>

    <div id="middleBlock">
      <div id="logoContainer">
        <a href="index.html" style="text-decoration: none;">
          <img src="logo.png" alt="Logo">
        </a>
      </div>
      <div id="settingsContainer">
          <div id="colorControl" class="setting-btn">Background Color</div>
          <div id="textColorControl" class="setting-btn">Text Color</div>
      </div>
    </div>

    <div class="footer-block">
      <div id="mainButtons">
        <button id="backBtn">One item back</button>
        <div class="button-row">
          <button id="slowerBtn">Slower</button>
          <button id="startBtn">Start</button>
          <button id="fasterBtn">Faster</button>
        </div>
        <button id="editBtn">Edit</button>
        <button id="accelBtn" class="setting-btn">Dynamic Accel: OFF</button>
      </div>
    </div>
  </div>

<script>
    const container = document.getElementById('container');
    const inputText = document.getElementById('inputText');
    const startBtn = document.getElementById('startBtn');
    const backBtn = document.getElementById('backBtn');
    const fasterBtn = document.getElementById('fasterBtn');
    const slowerBtn = document.getElementById('slowerBtn');
    const colorControl = document.getElementById('colorControl');
    const textColorControl = document.getElementById('textColorControl');
    const accelBtn = document.getElementById('accelBtn');
    const editBtn = document.getElementById('editBtn');

    const colors = ['#000000', '#2a0505', '#05052a', '#052a05', '#1a1a1a'];
    const textColors = ['#ffffff', '#ffeb3b', '#00ff00', '#ff4444', '#80cbc4', '#ffa726'];
    
    let colorIndex = parseInt(localStorage.getItem('reading_colorIndex')) || 0;
    let textColorIndex = parseInt(localStorage.getItem('reading_textColorIndex')) || 0;
    let wakeLock = null;
    
    let words = [], index = 0, timer = null, isPaused = false, isReading = false;
    let interval = parseInt(localStorage.getItem('reading_interval')) || 600;
    let isDynamicAccel = false;

    document.body.style.backgroundColor = colors[colorIndex];
    inputText.value = localStorage.getItem('reading_text') || "";

    function updateFontSize(text, el) {
        const maxWidth = window.innerWidth * 0.9;
        const standardSize = 36;
        el.style.fontSize = standardSize + 'px';
        let currentWidth = text.length * (standardSize * 0.6); 
        if (currentWidth > maxWidth) {
            const reducedSize = (maxWidth / text.length) / 0.6;
            el.style.fontSize = reducedSize + 'px';
        }
    }

    function clearOldWord(isLongExit = false) {
        const oldEl = container.querySelector('.word-active');
        if (oldEl) {
            const exitClass = isLongExit ? 'word-exit-long' : 'word-exit';
            oldEl.classList.replace('word-active', exitClass);
            setTimeout(() => oldEl.remove(), isLongExit ? 400 : 200);
        }
    }

    function showNext() {
        if (index >= words.length || isPaused || !isReading) {
            if (index >= words.length) stopReading();
            return;
        }

        let rawTxt = words[index];
        let displayTxt = rawTxt;
        let isLongHold = displayTxt.includes('/');
        if (isLongHold) displayTxt = displayTxt.replace(/\//g, '');

        clearOldWord(isLongHold);

        if (displayTxt !== " " && !displayTxt.includes('|')) {
            const newEl = document.createElement('div');
            newEl.className = 'word-layer word-enter';
            newEl.textContent = displayTxt;
            newEl.style.color = textColors[textColorIndex];
            updateFontSize(displayTxt, newEl);
            container.appendChild(newEl);
            requestAnimationFrame(() => setTimeout(() => newEl.classList.replace('word-enter', 'word-active'), 20));
        }

        let pauses = 1;
        if (rawTxt.match(/\n{2,}/)) { pauses = 5.0; } 
        // Добавлен явный разбор одиночного переноса \n для поддержки корректного маппинга
        else if (rawTxt.match(/\n/)) { pauses = 2.5; }
        else if (rawTxt.includes('|')) { pauses = 5.0; } 
        else if (rawTxt === " " || rawTxt.match(/\s+/)) { pauses = 1.0; } 
        else {
            if (/[;,]/.test(rawTxt)) pauses = 3.0;
            else if (/:/.test(rawTxt)) pauses = 3.0;
            else if (/[.!?—]/.test(rawTxt)) pauses = 4.5;
            if (rawTxt.length > 8) pauses += 0.38;
            if (isLongHold) pauses += 2.0;
        }

        let currentInterval = interval;
        if (isDynamicAccel && words.length > 1) {
            let progress = index / (words.length - 1);
            const phi = 0.618; const intensity = 0.382; 
            let factor = progress <= phi ? (1 - (progress / phi) * intensity) : ((1 - intensity) + ((progress - phi) / (1 - phi)) * intensity);
            currentInterval = interval * factor;
        }

        index++;
        timer = setTimeout(showNext, currentInterval * pauses);
    }

    function stopReading() {
        releaseWakeLock(); clearTimeout(timer);
        isReading = false; isPaused = false;
        document.body.classList.remove('is-reading', 'is-paused');
        startBtn.textContent = 'Start'; container.innerHTML = '';
    }
    
    accelBtn.onclick = (e) => { e.preventDefault(); e.stopPropagation(); isDynamicAccel = !isDynamicAccel; accelBtn.textContent = `Dynamic Accel: ${isDynamicAccel ? 'ON' : 'OFF'}`; };

    startBtn.onclick = (e) => {
        e.preventDefault(); e.stopPropagation();
        if (!isReading) {
            const text = inputText.value.trim();
            if (!text) return;
            localStorage.setItem('reading_text', text);
            words = text
              .replace(/([,;:.!?])(?!\s|$)/g, '$1 ')
              .split(/(\n{1,}|\s+)/) // Модифицировано для фиксации одиночных переносов строк
              .filter(w => w !== undefined && w !== "")
              .map(w => w.replace(/_/g, ' '));
          
            index = 0; isReading = true; isPaused = false;
            document.body.classList.add('is-reading');
            startBtn.textContent = 'Pause';
            requestWakeLock(); showNext();
        } else {
            isPaused = !isPaused;
            document.body.classList.toggle('is-paused', isPaused);
            startBtn.textContent = isPaused ? 'Continue' : 'Pause';
            if (!isPaused) showNext(); else clearTimeout(timer);
        }
    };

    backBtn.onclick = (e) => {
        e.preventDefault(); e.stopPropagation();
        index = Math.max(0, index - 2); clearOldWord();
        if (isPaused) { const wasPaused = isPaused; isPaused = false; showNext(); clearTimeout(timer); isPaused = wasPaused; }
    };

    fasterBtn.onclick = (e) => { e.preventDefault(); e.stopPropagation(); interval = Math.max(50, interval - 50); localStorage.setItem('reading_interval', interval); };
    slowerBtn.onclick = (e) => { e.preventDefault(); e.stopPropagation(); interval += 50; localStorage.setItem('reading_interval', interval); };
    colorControl.onclick = (e) => { e.preventDefault(); e.stopPropagation(); colorIndex = (colorIndex + 1) % colors.length; document.body.style.backgroundColor = colors[colorIndex]; localStorage.setItem('reading_colorIndex', colorIndex); };
    textColorControl.onclick = (e) => { e.preventDefault(); e.stopPropagation(); textColorIndex = (textColorIndex + 1) % textColors.length; localStorage.setItem('reading_textColorIndex', textColorIndex); textColorControl.style.color = textColors[textColorIndex]; setTimeout(() => { textColorControl.style.color = 'rgba(255, 255, 255, 0.62)'; }, 300); };
    editBtn.onclick = (e) => { e.preventDefault(); e.stopPropagation(); stopReading(); };

    document.getElementById('inputText').addEventListener('touchmove', (e) => { e.stopPropagation(); }, { passive: true });

    async function requestWakeLock() { try { if ('wakeLock' in navigator) { wakeLock = await navigator.wakeLock.request('screen'); } } catch (err) { console.error(err); } }
    function releaseWakeLock() { if (wakeLock !== null) { wakeLock.release(); wakeLock = null; } }

    // Защита от скролла и прыжков вьюпорта
    window.addEventListener('resize', () => { window.scrollTo(0, 0); });
    window.addEventListener('orientationchange', () => { setTimeout(() => { window.scrollTo(0, 0); }, 30); });
    document.addEventListener('scroll', (e) => { if (window.scrollY !== 0) window.scrollTo(0, 0); }, { passive: true });
</script> 
</body>
</html>
