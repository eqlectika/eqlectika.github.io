<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="manifest-flash.json">
  <title>Fast Reading Converter</title>
  <style>
    html, body {
      overscroll-behavior: none; min-height: 100dvh; margin: 0; padding: 0;
      background-color: #000000; color: #fff; font-family: Arial, sans-serif;
      overflow-y: auto;
      -webkit-user-select: none; user-select: none;
    }

    #container {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      z-index: 10;
      perspective: 1000px;
      pointer-events: none;
    }


    #mainButtons, #backBtn {
      position: relative;
      z-index: 110;
      pointer-events: auto;
    }

    body.is-paused #editBtn { 
      display: block !important; 
      opacity: 1 !important; 
      visibility: visible !important;
      z-index: 210 !important;
    }

#inputContainer, 
#settingsContainer, 
.footer-block {
  background: transparent !important; /* Никаких градиентов и заливок */
}

/* Инпут теперь всегда зафиксирован вверху под логотипом */
    #inputContainer { 
      position: fixed;
      top: 10px; 
      left: 0;
      width: 100%;
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      box-sizing: border-box; 
      padding: 0 10px;
      z-index: 100; 
      transition: opacity 0.5s ease;
    }

    /* Настройки зафиксированы по центру под текстовым полем */
    #settingsContainer {
      position: fixed;
      top: calc(20px + 30vh + 20px);
      left: 50%;
      transform: translateX(-50%);
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 5px; 
      z-index: 110;
      transition: opacity 0.5s ease;
    }

    /* Нижний блок с кнопками управления намертво прижат к низу */
    .footer-block { 
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      z-index: 100; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      padding-top: 40px;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
      background: linear-gradient(to top, #000000 85%, rgba(0,0,0,0));
    }
    .footer-block > *, #mainButtons > button, #accelBtn { pointer-events: auto; }

#mainButtons { 
      position: relative;
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      gap: 5px; 
      width: 100%;
    }

    /* Ряд із трьома головними кнопками тепер має фіксовану висоту і не стрибає */
    .button-row { 
      display: flex; 
      align-items: center; 
      justify-content: center;
      gap: 8px; 
      width: 90%;
      max-width: 400px;
      height: 45px; /* Жорстко фіксує вертикальний рівень для цих кнопок */
    }

    .button-row button {
      flex: 1;
      min-width: 90px;
      white-space: nowrap;
      text-align: center;
    }

    /* Кнопка Edit більше не виштовхує ряд вгору, бо вона позиціонується абсолютно */
    body.is-paused #editBtn { 
      display: block !important; 
      opacity: 1 !important; 
      visibility: visible !important;
      position: absolute;
      top: -50px; /* Стає строго над кнопками керування */
      left: 50%;
      transform: translateX(-50%);
      z-index: 210 !important;
      width: auto;
      min-width: 100px;
    }

    .word-layer {
      position: fixed; top: 50%; left: 50%; 
      transform: translate(-50%, -50%);
      text-align: center; font-weight: 700; white-space: nowrap;
      width: 90%; z-index: 60; pointer-events: none;
    }

    .word-enter { 
      opacity: 0; 
      transform: translate(-50%, -50%) translateZ(500px); 
      filter: blur(12px); 
    }

    .word-active { 
      opacity: 1; 
      transform: translate(-50%, -50%); 
      transition: all 0.1s cubic-bezier(0.23, 1, 0.32, 1);
      filter: blur(0); 
    }

    .word-exit { 
      opacity: 0; 
      transform: translate(-50%, -50%) scale(0);
      filter: blur(10px); 
      transition: transform 0.2s ease-in, opacity 0.5s linear, filter 0.4s 0.2s ease-in;
    }

    .word-exit-long { 
      opacity: 0; 
      transform: translate(-50%, -50%) scale(1);
      filter: blur(20px); 
      transition: transform 0.4s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 1.0s linear, filter 0.7s 0.8s ease-in;
    }}

    body.is-reading .footer-block { 
      position: fixed;
      margin-top: 40px;
      bottom: 0; 
      height: auto; 
      min-height: 50px; 
      display: flex; 
      flex-direction: column; 
      justify-content: flex-end;
      z-index: 200; 
      pointer-events: none;
      padding-bottom: calc(env(safe-area-inset-bottom, 5px) + 15px);
    }

body.is-reading #inputContainer { opacity: 0 !important; pointer-events: none; }

    button {
      font-size: 14px; background: transparent; color: white;
      border-radius: 25px; border: 2px solid rgba(255,255,255,0.38); 
      padding: 10px 20px; cursor: pointer; touch-action: manipulation;
      position: relative; z-index: 110;
    }

    .setting-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: auto; min-width: 150px; border: 0px solid rgba(255, 255, 255, 0.0);
      border-radius: 4px; padding: 6px; font-size: 14px;
      cursor: pointer; color: rgba(255, 255, 255, 0.62); background: transparent;
    }

    body.is-reading #settingsContainer { opacity: 0; pointer-events: none; }

    #backBtn { 
      display: none; 
      margin-bottom: 15px;
      background: rgba(255,255,255,0.1); 
      z-index: 210;
    }

    body.is-paused #backBtn { display: block; }
    #startBtn { background: #fff; color: #000; font-weight: bold; border: none; min-width: 100px; }
    body.is-reading #startBtn, body.is-reading #slowerBtn, body.is-reading #fasterBtn, body.is-reading #accelBtn{ 
      opacity: 0.38; background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.38); 
    }

    body.is-paused #startBtn { background: #fff; color: #000; opacity: 1; }

    #accelBtn {
      display: inline-flex; 
      margin-top: 10px; 
      border-radius: 4px; 
      width: auto; 
      padding: 10px;
      min-width: 150px; 
      border: 2px solid rgba(255, 255, 255, 0.38);
      font-size: 12px; opacity: 1.0; color: #fff;
    }
    


#inputText {
  -webkit-user-select: text !important;
  user-select: text !important;
  pointer-events: auto !important;
  width: 100%; max-width: 650px; min-height: 190px;
  padding: 14px 12px; background: rgba(255,255,255,0.05); 
  color: #fff; border: 2px solid rgba(255,255,255,0.38); 
  border-radius: 0px; font-size: 16px; outline: none; 
  box-sizing: border-box; display: block;
  font-family: Arial, sans-serif;
  height: 30vh;
  resize: none;
  overflow-y: auto;
  touch-action: pan-y !important;
}

#inputText::placeholder {
  color: rgba(255, 255, 255, 0.5); /* Белый цвет с прозрачностью 40% */
  opacity: 1; /* Переопределяет дефолтную прозрачность в Firefox */
}
#logoContainer {
  position: fixed;
  top: calc(10px + 30vh + 170px); 
  left: 50%;
  transform: translateX(-50%);
  z-index: 120;
  transition: opacity 0.5s ease;
}

/* Скрываем логотип во время чтения, как и настройки */
body.is-reading #logoContainer { 
  opacity: 0; 
  pointer-events: none; 
}
  </style>
</head>
<body>
  <script src="pwa-init.js"></script>
<div id="logoContainer">
  <a href="index.html" style="text-decoration: none;">
    <img src="logo.png" alt="Logo" style="max-width: 48px; opacity: 0.9;">
  </a>
</div>

  <div id="container"></div>
    <div id="inputContainer">
      <textarea id="inputText" placeholder="Paste your text here and press Start..."></textarea>
    </div>

    <div id="settingsContainer">
        <div id="colorControl" class="setting-btn">Background Color</div>
        <div id="textColorControl" class="setting-btn">Text Color</div>
        <div id="inversionControl" class="setting-btn">Inversion</div>
    </div>

  <div class="footer-block">
    <div id="mainButtons">
    <button id="backBtn">One item back</button>

 <div class="button-row">
  <button id="slowerBtn">Slower</button>

  <button id="startBtn">Start</button>
  <button id="fasterBtn">Faster</button>
</div>

        <button id="editBtn" style="display: none; background: rgba(255,255,255,0.1); border: 2px solid rgba(255, 255, 255, 1.0); z-index: 210;">Edit</button>

      <button id="accelBtn" class="setting-btn">Dynamic Accel: OFF</button>
    </div>

    
  </div>

<script>
    const container = document.getElementById('container');
    const inputText = document.getElementById('inputText');
    const startBtn = document.getElementById('startBtn');
    const backBtn = document.getElementById('backBtn');
    const fasterBtn = document.getElementById('fasterBtn');
    const slowerBtn = document.getElementById('slowerBtn');
    const colorControl = document.getElementById('colorControl');
    const textColorControl = document.getElementById('textColorControl');
    const inversionControl = document.getElementById('inversionControl');

    const accelBtn = document.getElementById('accelBtn');

    const colors = ['#000000', '#2a0505', '#05052a', '#052a05', '#1a1a1a'];
    const textColors = ['#ffffff', '#ffeb3b', '#00ff00', '#ff4444', '#80cbc4', '#ffa726'];
    
    let colorIndex = parseInt(localStorage.getItem('reading_colorIndex')) || 0;
    let textColorIndex = parseInt(localStorage.getItem('reading_textColorIndex')) || 0;
    let inversionActive = localStorage.getItem('reading_inversionActive') === 'true';
    let transitionInterval = null;
    let inversionLevel = inversionActive ? 100 : 0;
    let wakeLock = null;
    
    let words = [], index = 0, timer = null, isPaused = false, isReading = false;
    let interval = parseInt(localStorage.getItem('reading_interval')) || 600;
    let isDynamicAccel = false;

    document.body.style.backgroundColor = colors[colorIndex];
    inputText.value = localStorage.getItem('reading_text') || "";

    function applyInversionFilter() {
        document.documentElement.style.filter = `invert(${inversionLevel}%)`;
    }
    applyInversionFilter();

    function toggleInversion() {
        if (transitionInterval) clearInterval(transitionInterval);
        inversionActive = !inversionActive;
        localStorage.setItem('reading_inversionActive', inversionActive);
        
        const target = inversionActive ? 100 : 0;
        
        transitionInterval = setInterval(() => {
            if (inversionLevel === target) {
                clearInterval(transitionInterval);
                return;
            }
            inversionLevel += (inversionActive ? 5 : -5);
            applyInversionFilter();
        }, 15);
    }

    inversionControl.onclick = (e) => {
        e.stopPropagation();
        toggleInversion();
    };

    function updateFontSize(text, el) {
        const maxWidth = window.innerWidth * 0.9;
        const standardSize = 36;
        el.style.fontSize = standardSize + 'px';
        let currentWidth = text.length * (standardSize * 0.6); 
        if (currentWidth > maxWidth) {
            const reducedSize = (maxWidth / text.length) / 0.6;
            el.style.fontSize = reducedSize + 'px';
        }
    }

    function clearOldWord(isLongExit = false) {
        const oldEl = container.querySelector('.word-active');
        if (oldEl) {
            const exitClass = isLongExit ? 'word-exit-long' : 'word-exit';
            oldEl.classList.replace('word-active', exitClass);
            setTimeout(() => oldEl.remove(), isLongExit ? 400 : 200);
        }
    }

function showNext() {
        if (index >= words.length || isPaused || !isReading) {
            if (index >= words.length) stopReading();
            return;
        }

        let rawTxt = words[index];
        let displayTxt = rawTxt;
        let isLongHold = displayTxt.includes('/');
        if (isLongHold) displayTxt = displayTxt.replace(/\//g, '');

        clearOldWord(isLongHold);

        // Всегда создаем элемент, если это не пустая строка или разделитель
        if (displayTxt !== " " && !displayTxt.includes('|')) {
            const newEl = document.createElement('div');
            newEl.className = 'word-layer word-enter';
            newEl.textContent = displayTxt;
            newEl.style.color = textColors[textColorIndex];
            updateFontSize(displayTxt, newEl);
            container.appendChild(newEl);
            requestAnimationFrame(() => setTimeout(() => newEl.classList.replace('word-enter', 'word-active'), 20));
        }

// Логика пауз
let pauses = 1;

if (rawTxt.match(/\n{2,}/)) {
    pauses = 5.0; // Пауза для нового абзаца
} else if (rawTxt.includes('|')) {
    pauses = 5.0; // Специальный разделитель
} else if (rawTxt === " " || rawTxt.match(/\s+/)) {
    pauses = 1.0; // Обычный пробел (без паузы)
} else {
    // Проверка знаков препинания
    if (/[;,]/.test(rawTxt)) pauses = 3.0;         // Запятая, точка с запятой
    else if (/:/.test(rawTxt)) pauses = 3.0;       // Двоеточие
    else if (/[.!?—]/.test(rawTxt)) pauses = 4.5;  // Точка, воскл/вопр знаки, тире
    
    // Дополнительная задержка для длинных слов
    if (rawTxt.length > 8) pauses += 0.38;
    if (isLongHold) pauses += 2.0;
}

        // Ускорение
        let currentInterval = interval;
        if (isDynamicAccel && words.length > 1) {
            let progress = index / (words.length - 1);
            const phi = 0.618; 
            const intensity = 0.382; 
            let factor = progress <= phi 
                ? (1 - (progress / phi) * intensity) 
                : ((1 - intensity) + ((progress - phi) / (1 - phi)) * intensity);
            currentInterval = interval * factor;
        }

        index++;
        timer = setTimeout(showNext, currentInterval * pauses);
    }

        function stopReading() {
        releaseWakeLock();
        clearTimeout(timer);
        isReading = false; isPaused = false;
        document.body.classList.remove('is-reading', 'is-paused');
        startBtn.textContent = 'Start';
        container.innerHTML = '';
    }
    

    accelBtn.onclick = (e) => {
        e.stopPropagation();
        isDynamicAccel = !isDynamicAccel;
        accelBtn.textContent = `Dynamic Accel: ${isDynamicAccel ? 'ON' : 'OFF'}`;

    };

    startBtn.onclick = (e) => {
        e.stopPropagation();
        if (!isReading) {
            const text = inputText.value.trim();
            if (!text) return;
            localStorage.setItem('reading_text', text);
words = text
  .replace(/([,;:.!?])(?!\s|$)/g, '$1 ') // Гарантируем пробел после знака
  .split(/(\n{2,}|\s+)/)                 // Делим по двойным переносам или пробелам
  .filter(w => w !== undefined && w !== "")
  .map(w => w.replace(/_/g, ' '));
          
            index = 0; isReading = true; isPaused = false;
            document.body.classList.add('is-reading');
            startBtn.textContent = 'Pause';
            requestWakeLock();
            showNext();
            
        } else {
            isPaused = !isPaused;
            document.body.classList.toggle('is-paused', isPaused);
            startBtn.textContent = isPaused ? 'Continue' : 'Pause';
            if (!isPaused) showNext(); else clearTimeout(timer);
        }
    };

    backBtn.onclick = (e) => {
        e.stopPropagation();
        index = Math.max(0, index - 2);
        clearOldWord();
        if (isPaused) {
            const wasPaused = isPaused; isPaused = false;
            showNext(); clearTimeout(timer); isPaused = wasPaused;
        }
    };

    fasterBtn.onclick = (e) => { e.stopPropagation(); interval = Math.max(50, interval - 50); localStorage.setItem('reading_interval', interval); };
    slowerBtn.onclick = (e) => { e.stopPropagation(); interval += 50; localStorage.setItem('reading_interval', interval); };
    colorControl.onclick = (e) => { e.stopPropagation(); colorIndex = (colorIndex + 1) % colors.length; document.body.style.backgroundColor = colors[colorIndex]; localStorage.setItem('reading_colorIndex', colorIndex); };
    textColorControl.onclick = (e) => { e.stopPropagation(); textColorIndex = (textColorIndex + 1) % textColors.length; localStorage.setItem('reading_textColorIndex', textColorIndex); textColorControl.style.color = textColors[textColorIndex]; setTimeout(() => { textColorControl.style.color = 'rgba(255, 255, 255, 0.62)'; }, 300); };

    const handleExit = (e) => {
        e.preventDefault();
        stopReading();
    };

const editBtn = document.getElementById('editBtn');


    function toggleDonate() { const info = document.getElementById("cryptoInfo"); info.style.display = (info.style.display === "flex") ? "none" : "flex"; info.scrollIntoView({ behavior: 'smooth' }); }
    function copyToClipboard() { const addr = document.getElementById("cryptoAddr"); const hint = document.getElementById("copyHint"); const text = addr.innerText; navigator.clipboard.writeText(text).then(() => { addr.innerText = "Copied!"; addr.style.color = "#00ff00"; setTimeout(() => { addr.innerText = text; addr.style.color = "#fff"; }, 1500); }); }
document.getElementById('inputText').addEventListener('touchmove', (e) => {
    e.stopPropagation();
}, { passive: true });


async function requestWakeLock() {
    try {
        if ('wakeLock' in navigator) {
            wakeLock = await navigator.wakeLock.request('screen');
        }
    } catch (err) {
        console.error(err);
    }
}

function releaseWakeLock() {
    if (wakeLock !== null) {
        wakeLock.release();
        wakeLock = null;
    }
}
    
    editBtn.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation();
        stopReading();
    };


</script> 
</body>
</html>
