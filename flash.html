<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest-flash.json">
  <title>Fast Reading Converter</title>
  <style>
    html, body {
      overscroll-behavior: none; 
      height: 100vh;
      height: var(--app-height, 100vh);
      margin: 0; padding: 0;
      background-color: #000000; color: #fff; font-family: Arial, sans-serif;
      overflow: hidden;
      -webkit-user-select: none; user-select: none;
    }

    #logoContainer {
      position: absolute; 
      top: calc(env(safe-area-inset-top, 0px) + 10px);
      left: 50%; 
      transform: translateX(-50%); 
      z-index: 120;
      transition: opacity 0.5s ease;
    }

    body.is-reading #logoContainer {
      opacity: 0 !important;
      pointer-events: none !important;
    }

    #inputContainer { 
      position: fixed;
      top: calc(env(safe-area-inset-top, 0px) + 40px);
      left: 0;
      flex-shrink: 0; padding: 0px 15px; 
      z-index: 100; width: 100%; display: flex; flex-direction: column; 
      align-items: center; box-sizing: border-box; transition: opacity 0.5s ease;
    }

    .footer-block { 
      z-index: 120; width: 100%;
      display: flex; flex-direction: column; align-items: center;
      position: fixed;
      bottom: 0;
      left: 0;
      padding-top: 20px;
      padding-bottom: calc(env(safe-area-inset-bottom, 5px) + 10px);
      pointer-events: none;
    }

    #inputContainer, #settingsContainer, #mainButtons, button, .setting-btn, .toolbar {
      pointer-events: auto !important;
    }

    #container {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; justify-content: center; align-items: center;
      z-index: 10;
      perspective: 1000px;
      pointer-events: none;
    }

    #mainButtons, #backBtn {
      position: relative;
      z-index: 110;
    }

    body.is-paused #editBtn { 
      display: block !important; 
      opacity: 1 !important; 
      visibility: visible !important;
      z-index: 210 !important;
    }

    #mainButtons { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .button-row { display: flex; align-items: center; gap: 5px; }

    .word-layer {
      position: fixed; top: 50%; left: 50%; 
      transform: translate(-50%, -50%);
      text-align: center; font-weight: 700; white-space: nowrap;
      width: 100%; z-index: 60; pointer-events: none;
    }

    .word-enter { 
      opacity: 0; 
      transform: translate(-50%, -50%) translateZ(500px); 
      filter: blur(12px); 
    }

    .word-active { 
      opacity: 1; 
      transform: translate(-50%, -50%); 
      transition: all 0.1s cubic-bezier(0.23, 1, 0.32, 1);
      filter: blur(0); 
    }

    .word-exit { 
      opacity: 0; 
      transform: translate(-50%, -50%) scale(0);
      filter: blur(10px); 
      transition: transform 0.2s ease-in, opacity 0.5s linear, filter 0.4s 0.2s ease-in;
    }

    .word-exit-long { 
      opacity: 0; 
      transform: translate(-50%, -50%) scale(1);
      filter: blur(20px); 
      transition: transform 0.4s cubic-bezier(0.1, 0.8, 0.2, 1), opacity 1.0s linear, filter 0.7s 0.8s ease-in;
    }

    body.is-reading .footer-block { 
      position: fixed;
      margin-top: 40px;
      bottom: 0; 
      height: auto; 
      min-height: 50px; 
      display: flex; 
      flex-direction: column; 
      justify-content: flex-end;
      z-index: 200; 
      padding-bottom: calc(env(safe-area-inset-bottom, 5px) + 15px);
    }

    body.is-reading #inputContainer { opacity: 0 !important; pointer-events: none !important; }

    button {
      font-size: 14px; background: transparent; color: white;
      border-radius: 25px; border: 2px solid rgba(255,255,255,0.38); 
      padding: 10px 20px; cursor: pointer; touch-action: manipulation;
      position: relative; z-index: 110;
    }

    #settingsContainer {
      display: flex; flex-direction: column; align-items: center; gap: 0px; margin: 10px 0; z-index: 110;
    }

    .setting-btn {
      display: inline-flex; align-items: center; justify-content: center;
      width: auto; min-width: 150px; border: 0px solid rgba(255, 255, 255, 0.0);
      border-radius: 2px; padding: 8px 20px; font-size: 12px;
      cursor: pointer; color: rgba(255, 255, 255, 0.62); background: transparent;
    }

    body.is-reading #settingsContainer { opacity: 0; pointer-events: none !important; }

    #backBtn { 
      display: none; 
      margin-bottom: 15px;
      background: rgba(255,255,255,0.1); 
      z-index: 210;
    }

    body.is-paused #backBtn { display: block; }

    #startBtn { background: #fff; color: #000; font-weight: bold; border: none; min-width: 100px; }

    body.is-reading #startBtn, body.is-reading #slowerBtn, body.is-reading #fasterBtn, body.is-reading #accelBtn { 
      opacity: 0.38; background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.38); 
    }

    body.is-paused #startBtn { background: #fff; color: #000; opacity: 1; }

    #accelBtn {
      display: inline-flex; margin-top: 10px; border-radius: 4px; 
      width: auto; min-width: 150px; border: 2px solid rgba(255, 255, 255, 0.38);
      font-size: 11px; opacity: 1.0; color: #fff;
    }

    #inputText {
      -webkit-user-select: text !important;
      user-select: text !important;
      pointer-events: auto !important;
      width: 100%; max-width: 650px; min-height: 180px;
      padding: 10px 14px; background: rgba(255,255,255,0.05); 
      color: #fff; border: 2px solid rgba(255,255,255,0.38); 
      border-radius: 0px; font-size: 16px; outline: none; 
      box-sizing: border-box; display: block;
      font-family: Arial, sans-serif;
      height: 25vh;
      resize: none;
      overflow-y: auto;
      touch-action: pan-y !important;
    }

    /* Стили для панели инструментов загрузки */
    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      width: 100%;
      max-width: 650px;
      justify-content: space-between;
    }
    .toolbar-btn {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.1);
    }
    #fileInput {
      display: none;
    }
  </style>
</head>
<body>
  <script src="pwa-init.js"></script>
  <div id="logoContainer">
    <a href="#" id="logoLink" style="text-decoration: none;">
      <img src="logo.png" alt="Logo" style="max-width: 48px; opacity: 0.9;">
    </a>
  </div>

  <div id="container"></div>

  <div class="footer-block">
    <div id="inputContainer">
      <div class="toolbar">
        <button class="toolbar-btn" id="loadAliceBtn">📖 Load "Alice in Wonderland"</button>
        <button class="toolbar-btn" onclick="document.getElementById('fileInput').click()">📂 Upload .txt</button>
        <input type="file" id="fileInput" accept=".txt">
      </div>
      <textarea id="inputText" placeholder="Paste your text here or use options above and tap Start..."></textarea>
    </div>

    <div id="settingsContainer">
        <div id="inversionControl" class="setting-btn">inversion</div>
    </div>

    <div id="mainButtons">
      <button id="editBtn" style="display: none; background: rgba(255,255,255,0.1); border: 2px solid rgba(255, 255, 255, 1.0); z-index: 210;">Edit</button>
      <button id="backBtn">One item back</button>
      <div class="button-row">
        <button id="slowerBtn">Slower</button>
        <button id="startBtn">Start</button>
        <button id="fasterBtn">Faster</button>
      </div>
      <button id="accelBtn" class="setting-btn">Dynamic Accel: OFF</button>
    </div>
  </div>

<script>
    const container = document.getElementById('container');
    const inputText = document.getElementById('inputText');
    const startBtn = document.getElementById('startBtn');
    const backBtn = document.getElementById('backBtn');
    const fasterBtn = document.getElementById('fasterBtn');
    const slowerBtn = document.getElementById('slowerBtn');
    const inversionControl = document.getElementById('inversionControl');
    const accelBtn = document.getElementById('accelBtn');
    const editBtn = document.getElementById('editBtn');
    const fileInput = document.getElementById('fileInput');
    const loadAliceBtn = document.getElementById('loadAliceBtn');
    const logoLink = document.getElementById('logoLink');

    const colors = ['#000000', '#2a0505', '#05052a', '#052a05', '#1a1a1a'];
    const textColors = ['#ffffff', '#ffeb3b', '#00ff00', '#ff4444', '#80cbc4', '#ffa726'];
    
    let colorIndex = parseInt(localStorage.getItem('reading_colorIndex')) || 0;
    let textColorIndex = parseInt(localStorage.getItem('reading_textColorIndex')) || 0;
    let wakeLock = null;
    
    let words = [], index = 0, timer = null, isPaused = false, isReading = false;
    let interval = parseInt(localStorage.getItem('reading_interval')) || 600;
    let isDynamicAccel = false;
    let inversionActive = localStorage.getItem('reading_inversionActive') === 'true';
    let transitionInterval = null;
    let inversionLevel = inversionActive ? 100 : 0;
    document.body.style.backgroundColor = colors[colorIndex];
    inputText.value = localStorage.getItem('reading_text') || "";

    // 1. Логика загрузки локального файла .txt
    fileInput.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(evt) {
        inputText.value = evt.target.result;
        localStorage.setItem('reading_text', evt.target.result);
      };
      reader.readAsText(file);
    });

    // 2. Встроенный текст "Алисы в стране чудес" (Глава 1 для примера)
    const aliceText = `CHAPTER I. Down the Rabbit-Hole

Alice was beginning to get very tired of sitting by her sister on the bank, and of having nothing to do: once or twice she had peeped into the book her sister was reading, but it had no pictures or conversations in it, “and what is the use of a book,” thought Alice “without pictures or conversations?”

So she was considering in her own mind (as well as she could, for the hot day made her feel very sleepy and stupid), whether the pleasure of making a daisy-chain would be worth the trouble of getting up and picking the daisies, when suddenly a White Rabbit with pink eyes ran close by her.

There was nothing so VERY remarkable in that; nor did Alice think it so VERY much out of the way to hear the Rabbit say to itself, “Oh dear! Oh dear! I shall be late!” (when she thought it over afterwards, it occurred to her that she ought to have wondered at this, but at the time it all seemed quite natural); but when the Rabbit actually TOOK A WATCH OUT OF ITS WAISTCOAT-POCKET, and looked at it, and then hurried on, Alice started to her feet, for it flashed across her mind that she had never before seen a rabbit with either a waistcoat-pocket, or a watch to take out of it, and burning with curiosity, she ran across the field after it, and fortunately was just in time to see it pop down a large rabbit-hole under the hedge.`;

    loadAliceBtn.addEventListener('click', function() {
      inputText.value = aliceText;
      localStorage.setItem('reading_text', aliceText);
    });

    // Безопасный клик по логотипу (сброс вместо перехода на index.html)
    logoLink.onclick = (e) => {
      e.preventDefault();
      stopReading();
    };

    function updateFontSize(text, el) {
        const maxWidth = window.innerWidth * 0.9;
        const standardSize = 36;
        el.style.fontSize = standardSize + 'px';
        let currentWidth = text.length * (standardSize * 0.6); 
        if (currentWidth > maxWidth) {
            const reducedSize = (maxWidth / text.length) / 0.6;
            el.style.fontSize = reducedSize + 'px';
        }
    }

    function applyInversionFilter() {
        document.documentElement.style.filter = `invert(${inversionLevel}%)`;
    }
    applyInversionFilter();

    function toggleInversion() {
        if (transitionInterval) clearInterval(transitionInterval);
        inversionActive = !inversionActive;
        localStorage.setItem('reading_inversionActive', inversionActive);
        
        const target = inversionActive ? 100 : 0;
        
        transitionInterval = setInterval(() => {
            if (inversionLevel === target) {
                clearInterval(transitionInterval);
                return;
            }
            inversionLevel += (inversionActive ? 5 : -5);
            applyInversionFilter();
        }, 15);
    }

    inversionControl.onclick = (e) => {
        e.stopPropagation();
        toggleInversion();
    };

    function clearOldWord(isLongExit = false) {
        const oldEl = container.querySelector('.word-active');
        if (oldEl) {
            const exitClass = isLongExit ? 'word-exit-long' : 'word-exit';
            oldEl.classList.replace('word-active', exitClass);
            setTimeout(() => oldEl.remove(), isLongExit ? 400 : 200);
        }
    }

    function showNext() {
        if (index >= words.length || isPaused || !isReading) {
            if (index >= words.length) stopReading();
            return;
        }

        let rawTxt = words[index];
        let displayTxt = rawTxt;
        let isLongHold = displayTxt.includes('/');
        if (isLongHold) displayTxt = displayTxt.replace(/\//g, '');

        clearOldWord(isLongHold);

        if (displayTxt !== " " && !displayTxt.includes('|')) {
            const newEl = document.createElement('div');
            newEl.className = 'word-layer word-enter';
            newEl.textContent = displayTxt;
            newEl.style.color = textColors[textColorIndex];
            updateFontSize(displayTxt, newEl);
            container.appendChild(newEl);
            requestAnimationFrame(() => setTimeout(() => newEl.classList.replace('word-enter', 'word-active'), 20));
        }

        let pauses = 1;

        if (rawTxt.match(/\n{2,}/)) {
            pauses = 5.0;
        } else if (rawTxt.includes('|')) {
            pauses = 5.0;
        } else if (rawTxt === " " || rawTxt.match(/\s+/)) {
            pauses = 1.0;
        } else {
            if (/[;,]/.test(rawTxt)) pauses = 3.0;
            else if (/:/.test(rawTxt)) pauses = 3.0;
            else if (/[.!?—]/.test(rawTxt)) pauses = 4.5;
            
            if (rawTxt.length > 8) pauses += 1.0;
            if (isLongHold) pauses += 2.0;
        }

        let currentInterval = interval;
        if (isDynamicAccel && words.length > 1) {
            let progress = index / (words.length - 1);
            const phi = 0.618; 
            const intensity = 0.382; 
            let factor = progress <= phi 
                ? (1 - (progress / phi) * intensity) 
                : ((1 - intensity) + ((progress - phi) / (1 - phi)) * intensity);
            currentInterval = interval * factor;
        }

        index++;
        timer = setTimeout(showNext, currentInterval * pauses);
    }

    function stopReading() {
        releaseWakeLock();
        clearTimeout(timer);
        isReading = false; isPaused = false;
        document.body.classList.remove('is-reading', 'is-paused');
        startBtn.textContent = 'Start';
        container.innerHTML = '';
    }

    accelBtn.onclick = (e) => {
        e.stopPropagation();
        isDynamicAccel = !isDynamicAccel;
        accelBtn.textContent = `Dynamic Accel: ${isDynamicAccel ? 'ON' : 'OFF'}`;
    };

    startBtn.onclick = (e) => {
        e.stopPropagation();
        if (!isReading) {
            const text = inputText.value.trim();
            if (!text) return;
            localStorage.setItem('reading_text', text);
            words = text
              .replace(/([,;:.!?])(?!\s|$)/g, '$1 ')
              .split(/(\n{2,}|\s+)/)
              .filter(w => w !== undefined && w !== "")
              .map(w => w.replace(/_/g, ' '));
              
            index = 0; isReading = true; isPaused = false;
            document.body.classList.add('is-reading');
            startBtn.textContent = 'Pause';
            requestWakeLock();
            showNext();
        } else {
            isPaused = !isPaused;
            document.body.classList.toggle('is-paused', isPaused);
            startBtn.textContent = isPaused ? 'Continue' : 'Pause';
            if (!isPaused) showNext(); else clearTimeout(timer);
        }
    };

    backBtn.onclick = (e) => {
        e.stopPropagation();
        index = Math.max(0, index - 2);
        clearOldWord();
        if (isPaused) {
            const wasPaused = isPaused; isPaused = false;
            showNext(); clearTimeout(timer); isPaused = wasPaused;
        }
    };

    fasterBtn.onclick = (e) => { e.stopPropagation(); interval = Math.max(50, interval - 50); localStorage.setItem('reading_interval', interval); };
    slowerBtn.onclick = (e) => { e.stopPropagation(); interval += 50; localStorage.setItem('reading_interval', interval); };

    editBtn.onclick = (e) => {
        e.preventDefault();
        e.stopPropagation();
        stopReading();
    };

    document.getElementById('inputText').addEventListener('touchmove', (e) => {
        e.stopPropagation();
    }, { passive: true });

    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        } catch (err) {
            console.error(err);
        }
    }

    function releaseWakeLock() {
        if (wakeLock !== null) {
            wakeLock.release();
            wakeLock = null;
        }
    }

    function resetHeight() {
        document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
    }
    window.addEventListener('resize', resetHeight);
    window.addEventListener('orientationchange', () => {
        setTimeout(resetHeight, 100);
    });
    resetHeight();
</script> 
</body>
</html>
