<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="manifest" href="manifest-clarity.json">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{height:100vh;background:#fff;overflow:hidden}
        
        .logo-wrapper {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        
        .logo-link {
            display: block;
            width: 40px;
            height: 40px;
        }
        
        .logo {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

* {
    user-select: none;
    -webkit-user-select: none;
    -moz-user-select: none;
    -ms-user-select: none;
}
    </style>
</head>
<body>
    <div class="logo-wrapper">
        <a href="index.html" class="logo-link">
            <img src="logo.png" alt="Логотип" class="logo" id="logo" />
        </a>
    </div>

<script>
    const body = document.body;
    const logo = document.getElementById('logo');

    let speed = 5;
    const startTime = performance.now(); 
    let isWhiteLogo = true; // Если логотип белый, ставим true

    function animate() {
        const now = performance.now();
        const elapsed = (now - startTime) / 1000;
        const phase = (elapsed / speed) % 1;
        const brightness = 0.5 - 0.5 * Math.cos(phase * 2 * Math.PI);
        const gray = Math.round(brightness * 255);
        const hex = gray.toString(16).padStart(2, '0');
        body.style.backgroundColor = `#${hex}${hex}${hex}`;
        
        // Если логотип белый - инвертируем его сразу, чтобы он стал чёрным на белом фоне
        if (isWhiteLogo) {
            // На белом фоне (brightness=1) логотип должен быть чёрным: invert(1)
            // На чёрном фоне (brightness=0) логотип должен быть белым: invert(0)
            const invertValue = brightness; // Прямая зависимость
            logo.style.filter = `invert(${invertValue})`;
        } else {
            // Если логотип чёрный - стандартная инверсия
            const invertValue = 1 - brightness;
            logo.style.filter = `invert(${invertValue})`;
        }
        
        requestAnimationFrame(animate);
    }

    function handleMove(e) {
        const y = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
        const h = window.innerHeight;
        const ratio = Math.max(0, Math.min(1, y / h));
        speed = 50 - ratio * 49;
    }

    document.addEventListener('mousemove', handleMove);
    document.addEventListener('touchmove', handleMove);
    document.addEventListener('touchstart', (e) => {
        const y = e.touches[0].clientY;
        const h = window.innerHeight;
        const ratio = Math.max(0, Math.min(1, y / h));
        speed = 50 - ratio * 49;
    });



    animate();
</script>
</body>
</html>
