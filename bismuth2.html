<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bismuth Laboratory</title>
<style>
body { margin: 0; overflow: hidden; background: #000; touch-action: none; user-select: none; font-family: 'Ubuntu', monospace; }
canvas { display: block; }
.interface {
position: absolute;
top: 20px;
width: 100%;
display: flex;
flex-direction: column;
align-items: center;
z-index: 10;
pointer-events: none;
}
.mode-toggle {
background: rgba(0, 255, 0, 0.1);
border: 1px solid #00ff00;
color: #00ff00;
padding: 10px 20px;
font-size: 0.8rem;
letter-spacing: 2px;
cursor: pointer;
pointer-events: auto;
transition: 0.3s;
text-transform: uppercase;
}
.mode-toggle:hover { background: rgba(0, 255, 0, 0.3); }
.logo-container {
position: absolute;
bottom: 20px;
left: 50%;
transform: translateX(-50%);
display: flex;
flex-direction: column;
align-items: center;
text-decoration: none;
z-index: 10;
pointer-events: none;
}
.logo-text {
color: #00ff00;
font-size: 0.7rem;
letter-spacing: 2px;
opacity: 0.8;
text-align: center;
white-space: nowrap;
line-height: 1.4;
margin-top: 8px;
}
.logo-container img { height: 44px; width: auto; pointer-events: auto; }
</style>
</head>
<body>

<div class="interface">
    <button id="toggleMode" class="mode-toggle">Switch to Hopper</button>
</div>

<div class="logo-container">
    <a href="index.html"><img src="logo.png" alt="Logo"></a>
    <div class="logo-text">Tap to Grow • Rotate to Inspect</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
const group = new THREE.Group();
scene.add(group);

const lights = [];
lights[0] = new THREE.PointLight(0xffffff, 5, 100);
lights[0].position.set(15, 15, 15);
lights[1] = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(lights[0], lights[1]);

camera.position.set(12, 12, 12);

let currentMode = 'quadtree'; // 'quadtree' or 'hopper'
const material = new THREE.MeshStandardMaterial({ 
    metalness: 0.7, 
    roughness: 0.2, 
    transparent: true, 
    opacity: 0.6, 
    side: THREE.DoubleSide,
    flatShading: true
});

function createRect(p1, p2, p3, p4, depth) {
    const geo = new THREE.BufferGeometry();
    const vertices = new Float32Array([
        p1.x,p1.y,p1.z, p2.x,p2.y,p2.z, p3.x,p3.y,p3.z,
        p3.x,p3.y,p3.z, p4.x,p4.y,p4.z, p1.x,p1.y,p1.z
    ]);
    geo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
    geo.computeVertexNormals();
    const mesh = new THREE.Mesh(geo, material.clone());
    mesh.material.color.setHSL((depth * 0.12) % 1, 0.8, 0.5);
    mesh.userData = { isBismuth: true, depth: depth, corners: [p1.clone(), p2.clone(), p3.clone(), p4.clone()] };
    group.add(mesh);
}

function initBase() {
    while(group.children.length > 0) group.remove(group.children[0]);
    const s = 4;
    const pts = [
        new THREE.Vector3(-s,s,s), new THREE.Vector3(s,s,s), new THREE.Vector3(s,-s,s), new THREE.Vector3(-s,-s,s),
        new THREE.Vector3(-s,s,-s), new THREE.Vector3(s,s,-s), new THREE.Vector3(s,-s,-s), new THREE.Vector3(-s,-s,-s)
    ];
    const faces = [
        [pts[0], pts[1], pts[2], pts[3]], [pts[1], pts[5], pts[6], pts[2]],
        [pts[5], pts[4], pts[7], pts[6]], [pts[4], pts[0], pts[3], pts[7]],
        [pts[4], pts[5], pts[1], pts[0]], [pts[3], pts[2], pts[6], pts[7]]
    ];
    faces.forEach(f => createRect(f[0], f[1], f[2], f[3], 0));
}

function grow(mesh) {
    const c = mesh.userData.corners;
    const d = mesh.userData.depth + 1;
    if (d > 10) return;

    const v1 = new THREE.Vector3().subVectors(c[1], c[0]);
    const v2 = new THREE.Vector3().subVectors(c[3], c[0]);
    const normal = new THREE.Vector3().crossVectors(v1, v2).normalize();
    const center = new THREE.Vector3().add(c[0]).add(c[1]).add(c[2]).add(c[3]).divideScalar(4);

    let offset, lerpFactor;

    if (currentMode === 'quadtree') {
        offset = normal.clone().multiplyScalar(1.2);
        lerpFactor = 0.2;
    } else {
        const stepDepth = v1.length() * 0.15;
        offset = normal.clone().multiplyScalar(stepDepth);
        lerpFactor = 0.2;
    }

    const inner = c.map(p => p.clone().lerp(center, lerpFactor).sub(offset));
    
    createRect(c[0], c[1], inner[1], inner[0], d);
    createRect(c[1], c[2], inner[2], inner[1], d);
    createRect(c[2], c[3], inner[3], inner[2], d);
    createRect(c[3], c[0], inner[0], inner[3], d);
    createRect(inner[0], inner[1], inner[2], inner[3], d);
    
    group.remove(mesh);
}

// Interface Logic
document.getElementById('toggleMode').addEventListener('click', (e) => {
    currentMode = (currentMode === 'quadtree') ? 'hopper' : 'quadtree';
    e.target.innerText = `Switch to ${currentMode === 'quadtree' ? 'Hopper' : 'Quadtree'}`;
    initBase();
});

// Interaction Logic
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let touchTime = 0;

function handleInteraction(x, y) {
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(group.children);
    if (intersects.length > 0) grow(intersects[0].object);
}

window.addEventListener('touchstart', () => touchTime = Date.now(), {passive: false});
window.addEventListener('touchend', (e) => {
    if (Date.now() - touchTime < 250) {
        const t = e.changedTouches[0];
        handleInteraction(t.clientX, t.clientY);
    }
}, {passive: false});

window.addEventListener('mousedown', (e) => {
    handleInteraction(e.clientX, e.clientY);
});

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}

initBase();
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
