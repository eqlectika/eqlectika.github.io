<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Versus</title>
<style>
body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; box-sizing: border-box; }
#this-or-that { width: 100%; margin: 1em 0; }
.this-or-that-wrapper { display: flex; gap: 10px; justify-content: center; }
.this-or-that_column { flex: 1; min-width: 0; }
.this-or-that_item { transition: transform 0.3s ease; }
.this-or-that_thumbwrapper { position: relative; border: 3px solid #444; background-color: #333; cursor: pointer; overflow: hidden; }
.this-or-that_thumbwrapper img { display: block; width: 100%; height: auto; aspect-ratio: 1/1; object-fit: cover; }
#this-or-that h3 { margin: 10px 0; text-align: center; font-size: 16px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ranking-container { margin-top: 20px; padding: 15px; border-top: 2px solid #333; }
.ranking-title { font-size: 20px; margin-bottom: 15px; text-align: center; color: #fff; }
.ranking-item { padding: 10px 0; border-bottom: 1px solid #222; display: flex; justify-content: space-between; font-size: 14px; }
.ranking-item:last-child { border-bottom: none; }
@media (max-width: 480px) {
.this-or-that-wrapper { gap: 8px; }
#this-or-that h3 { font-size: 14px; }
.ranking-item { font-size: 13px; }
}
</style>
</head>
<body>
<div id="this-or-that">
<div class="this-or-that-wrapper">
<div class="this-or-that_column">
<div class="this-or-that_item" id="item-left">
<div class="this-or-that_thumbwrapper" onclick="vote('left')">
<img src="" alt="">
</div>
<h3 class="title"></h3>
</div>
</div>
<div class="this-or-that_column">
<div class="this-or-that_item" id="item-right">
<div class="this-or-that_thumbwrapper" onclick="vote('right')">
<img src="" alt="">
</div>
<h3 class="title"></h3>
</div>
</div>
</div>
</div>
<div class="ranking-container">
<div class="ranking-title">Ranking List</div>
<div id="ranking-list"></div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
const STORAGE_KEY = 'versus_ratings';
let defaultItems = [
{ id: 0, title: "Cube", img: "https://via.placeholder.com/400x400", rating: 1400 },
{ id: 1, title: "Matrix", img: "https://via.placeholder.com/400x400", rating: 1400 },
{ id: 2, title: "Code", img: "https://via.placeholder.com/400x400", rating: 1400 },
{ id: 3, title: "Loop", img: "https://via.placeholder.com/400x400", rating: 1400 },
{ id: 4, title: "Flash", img: "https://via.placeholder.com/400x400", rating: 1400 }
];
let items = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultItems;
let currentPair = [];
function saveToStorage() {
localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}
function updateRankingList() {
const sortedItems = [...items].sort((a, b) => b.rating - a.rating);
let html = '';
sortedItems.forEach((item, index) => {
html += '<div class="ranking-item">' +
'<span>' + (index + 1) + '. ' + item.title + '</span>' +
'<strong>' + Math.round(item.rating) + '</strong>' +
'</div>';
});
$('#ranking-list').html(html);
}
function updateDisplay() {
const [left, right] = currentPair;
$('#item-left img').attr('src', items[left].img);
$('#item-left .title').text(items[left].title);
$('#item-right img').attr('src', items[right].img);
$('#item-right .title').text(items[right].title);
}
function getRandomPair() {
let idx1 = Math.floor(Math.random() * items.length);
let idx2;
do { idx2 = Math.floor(Math.random() * items.length); } while (idx1 === idx2);
return [idx1, idx2];
}
function calculateElo(winnerIdx, loserIdx) {
const K = 32;
const ratingW = items[winnerIdx].rating;
const ratingL = items[loserIdx].rating;
const expectedW = 1 / (1 + Math.pow(10, (ratingL - ratingW) / 400));
const expectedL = 1 / (1 + Math.pow(10, (ratingW - ratingL) / 400));
items[winnerIdx].rating = ratingW + K * (1 - expectedW);
items[loserIdx].rating = ratingL + K * (0 - expectedL);
saveToStorage();
}
function vote(side) {
const winnerIdx = side === 'left' ? currentPair[0] : currentPair[1];
const loserIdx = side === 'left' ? currentPair[1] : currentPair[0];
calculateElo(winnerIdx, loserIdx);
updateRankingList();
const $container = $('#this-or-that');
$container.animate({ opacity: 0 }, 150, function() {
currentPair = getRandomPair();
updateDisplay();
$container.animate({ opacity: 1 }, 150);
});
}
currentPair = getRandomPair();
updateDisplay();
updateRankingList();
</script>
</body>
</html>
