<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Versus</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">

<style>
body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; padding: 10px; box-sizing: border-box; }
#versus { width: 100%; margin: 1em 0; }
.versus-wrapper { display: flex; gap: 10px; justify-content: center; }
.versus_column { flex: 1; min-width: 0; }
.versus_item { transition: transform 0.3s ease; }
.versus_thumbwrapper { position: relative; border: 3px solid #444; background-color: #333; cursor: pointer; overflow: hidden; }
.versus_thumbwrapper img { display: block; width: 100%; height: auto; aspect-ratio: 1/1; object-fit: cover; }
#versus h3 { margin: 10px 0; text-align: center; font-size: 16px; color: #fff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.ranking-container { margin-top: 20px; padding: 15px; solid #333; }
.ranking-title { font-size: 20px; margin-bottom: 15px; text-align: center; color: #fff; }
.ranking-item { padding: 10px 0; border-bottom: 1px solid #222; display: flex; justify-content: space-between; font-size: 14px; }
.ranking-item:last-child { border-bottom: none; }
@media (max-width: 480px) {
.versus-wrapper { gap: 8px; }
#versus h3 { font-size: 14px; }
.ranking-item { font-size: 13px; }
}
#ui-layer {
    position: relative;
    z-index: 10;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px 0 0; 
    text-align: center;
    pointer-events: none;
}
.logo-link { 
    pointer-events: auto;
    display: inline-block; 
}
        .logo-image {
            width: 48px;

    margin-bottom: 10px;

            opacity: 0.9;
            transition: transform 0.3s; 
        }
        .logo-image:hover { transform: scale(1.1); }
.line {
width: 100%;
height: 2px;
background-color: #fff;
opacity: 0.4;
margin-top: 20px;
margin-bottom: 10px;
}
.wantit {
font-size: 14px;
text-align: center;
display: block;
text-decoration: none;
color: #fff;
font-family: 'Luckiest Guy', sans-serif;
margin-top: 30px;
margin-bottom: 0px;
}
.ranking-item {
cursor: pointer;
transition: background-color 0.2s;
}
.ranking-item:hover {
background-color: #111;
}
.ranking-item {
display: flex;
align-items: center;
padding: 8px 0;
}
.ranking-img {
width: 30px;
height: 30px;
object-fit: cover;
border-radius: 4px;
margin-right: 12px;
border: 1px solid #444;
}
.ranking-info {
flex-grow: 1;
display: flex;
justify-content: space-between;
align-items: center;
}

</style>
</head>
<body>
    <div id="ui-layer">

           <a href="index.html" class="logo-link">
                <img src="logo.png" alt="Logo" class="logo-image">
            </a>

<p class="ranking-title">Choose One</p>

</div>
<div id="versus">
<div class="versus-wrapper">
<div class="versus_column">
<div class="versus_item" id="item-left">
<div class="versus_thumbwrapper" onclick="vote('left')">
<img src="" alt="">
</div>
<h3 class="title"></h3>
</div>
</div>
<div class="versus_column">
<div class="versus_item" id="item-right">
<div class="versus_thumbwrapper" onclick="vote('right')">
<img src="" alt="">
</div>
<h3 class="title"></h3>
</div>
</div>
</div>
</div>
<div class="ranking-container">
<div class="ranking-title">Ranking List</div>
<div id="ranking-list"></div>
<div class="line"></div>
<a href="https://eugenebox.t.me" class="wantit">If you want it<br>Come and get it</a>
<a href="https://telegra.ph/Elo-Ranking-03-25" class="wantit">Info</a>

</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>

const STORAGE_KEY = 'versus_ratings';
let defaultItems = [
{ id: 0, title: "Cube", img: "cube.jpeg", rating: 1400 },
{ id: 1, title: "Matrix", img: "matrix.jpeg", rating: 1400 },
{ id: 2, title: "Spark", img: "spark.jpeg", rating: 1400 },
{ id: 3, title: "Clock", img: "clock.jpeg", rating: 1400 },
{ id: 4, title: "Drop", img: "drop.jpeg", rating: 1400 }
];
let items = JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultItems;
let currentPair = [];
function saveToStorage() {
localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}



function updateRankingList() {
const sortedItems = [...items].sort((a, b) => b.rating - a.rating);
let html = '';
sortedItems.forEach((item, index) => {
const pageName = item.title.toLowerCase() + '.html';
html += '<div class="ranking-item" onclick="window.location.href=\'' + pageName + '\'">' +
'<img src="' + item.img + '" class="ranking-img">' +
'<div class="ranking-info">' +
'<span>' + (index + 1) + '. ' + item.title + '</span>' +
'<strong>' + Math.round(item.rating) + '</strong>' +
'</div>' +
'</div>';
});
$('#ranking-list').html(html); 
}





function updateDisplay() {
const [left, right] = currentPair;
$('#item-left img').attr('src', items[left].img);
$('#item-left .title').text(items[left].title);
$('#item-right img').attr('src', items[right].img);
$('#item-right .title').text(items[right].title);
}
function getRandomPair() {
let idx1 = Math.floor(Math.random() * items.length);
let idx2;
do { idx2 = Math.floor(Math.random() * items.length); } while (idx1 === idx2);
return [idx1, idx2];
}
function calculateElo(winnerIdx, loserIdx) {
const K = 32;
const ratingW = items[winnerIdx].rating;
const ratingL = items[loserIdx].rating;
const expectedW = 1 / (1 + Math.pow(10, (ratingL - ratingW) / 400));
const expectedL = 1 / (1 + Math.pow(10, (ratingW - ratingL) / 400));
items[winnerIdx].rating = ratingW + K * (1 - expectedW);
items[loserIdx].rating = ratingL + K * (0 - expectedL);
saveToStorage();
}
function vote(side) {
const winnerIdx = side === 'left' ? currentPair[0] : currentPair[1];
const loserIdx = side === 'left' ? currentPair[1] : currentPair[0];
calculateElo(winnerIdx, loserIdx);
updateRankingList();
const $container = $('#versus');
$container.animate({ opacity: 0 }, 150, function() {
currentPair = getRandomPair();
updateDisplay();
$container.animate({ opacity: 1 }, 150);
});
}
currentPair = getRandomPair();
updateDisplay();
updateRankingList();
</script>
</body>
</html>
