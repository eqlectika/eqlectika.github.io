<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest-bismuth.json">
<title>Bismuth Laboratory Persistent</title>
<style>
body { margin: 0; overflow: hidden; background: #000; touch-action: none; user-select: none; font-family: 'Ubuntu', monospace; }
canvas { display: block; }
.interface { position: absolute; top: 20px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; z-index: 10; pointer-events: none; }
.mode-toggle { background: none; border: none; color: #00ff00; padding: 10px; font-size: 0.7rem; letter-spacing: 2px; cursor: pointer; pointer-events: auto; text-transform: uppercase; outline: none; min-width: 80px; -webkit-tap-highlight-color: transparent; }
#basement { position: absolute; bottom: 0; width: 100%; height: 120px; overflow-y: scroll; scroll-snap-type: y mandatory; z-index: 10; pointer-events: auto; scrollbar-width: none; -ms-overflow-style: none; }
#basement::-webkit-scrollbar { display: none; }
.scroll-container { display: flex; flex-direction: column; width: 100%; }
.snap-section { height: 120px; width: 100%; flex-shrink: 0; scroll-snap-align: start; display: flex; flex-direction: column; align-items: center; justify-content: center; background: transparent; }
.logo-container { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
.logo-text { color: #ffffff; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.8; text-align: center; margin-bottom: 8px; width: 100%; white-space: nowrap; }
.logo-container img { height: 44px; width: auto; pointer-events: auto; }
footer { width: 100%; background: transparent; }
.donate-box { display: flex; flex-direction: column; align-items: center; gap: 8px; text-align: center; }
.donate-btn { color: #fff; border: 1px solid #fff; padding: 5px 15px; background: transparent; cursor: pointer; font-size: 0.6rem; text-transform: uppercase; width: fit-content; }
.crypto-info { display: none; flex-direction: column; gap: 5px; margin-top: 10px; padding: 0 20px; }
.crypto-address-display { font-size: 10px; color: #00ff00; background: #0a0a0a; padding: 8px; border: 1px dashed #999; cursor: copy; word-break: break-all; }
</style>
</head>
<body>
<div class="interface">
<button id="deleteMode" class="mode-toggle">Build</button>
<button id="toggleMode" class="mode-toggle">Tree</button>
<button id="undoBtn" class="mode-toggle">Undo</button>
</div>
<div id="basement">
<div class="scroll-container">
<div class="snap-section">
<div class="logo-container">
<div class="logo-text">Tap • Rotate • Scale • Pan • Hold</div>
<a href="index.html"><img src="logo.png" alt="Logo"></a>
</div>
</div>
<div class="snap-section">
<footer>
<div class="donate-box">
<button class="donate-btn" onclick="toggleDonate()">Support</button>
<div id="cryptoInfo" class="crypto-info">
<span style="font-size: 10px; color: #fff;">ETH (ERC20)</span>
<div id="cryptoAddr" class="crypto-address-display" onclick="copyToClipboard()">0xF5367CF8187Ab1C405c495dC05fCa0434d76c1B8</div>
<span id="copyHint" style="font-size: 9px; color: #fff;">Click address to copy</span>
</div>
</div>
</footer>
</div>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
let history = [];
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
const group = new THREE.Group();
scene.add(group);
const lights = [new THREE.PointLight(0xffffff, 5, 100), new THREE.PointLight(0xffffff, 4, 100), new THREE.AmbientLight(0xffffff, 0.5)];
lights[0].position.set(15, 15, 15);
lights[1].position.set(-15, -15, -15);
scene.add(...lights);
camera.position.set(12, 12, 12);
let currentMode = 'tree';
let isDeleteMode = false;
const material = new THREE.MeshStandardMaterial({ metalness: 0.7, roughness: 0.2, transparent: true, opacity: 0.6, side: THREE.DoubleSide, flatShading: true });
const currentCenter = new THREE.Vector3(0, 0, 0);
let holdTimer = null, isFlying = false, startTime = 0, flyDirection = new THREE.Vector3(), flyPhase = 'approach', currentSpeed = 0;
const maxSpeed = 0.1, acceleration = 0.001, bypassDistance = 1;
const raycaster = new THREE.Raycaster(), mouse = new THREE.Vector2(), startMouse = new THREE.Vector2();
function saveState() {
const data = group.children.map(m => ({ depth: m.userData.depth, corners: m.userData.corners.map(c => c.clone()) }));
const snapshot = JSON.stringify(data);
if (history.length === 0 || history[history.length - 1] !== snapshot) {
history.push(snapshot);
if (history.length > 30) history.shift();
}
localStorage.setItem('bismuth_state', snapshot);
}
function loadState() {
const saved = localStorage.getItem('bismuth_state');
if (!saved) return initBase();
history = [saved];
JSON.parse(saved).forEach(d => {
const c = d.corners.map(p => new THREE.Vector3(p.x, p.y, p.z));
createRect(c[0], c[1], c[2], c[3], d.depth, false);
});
}
function undo() {
if (history.length <= 1) return;
history.pop();
const previousState = JSON.parse(history[history.length - 1]);
while(group.children.length > 0) { group.remove(group.children[0]); }
previousState.forEach(d => {
const c = d.corners.map(p => new THREE.Vector3(p.x, p.y, p.z));
createRect(c[0], c[1], c[2], c[3], d.depth, false);
});
localStorage.setItem('bismuth_state', JSON.stringify(previousState));
}
function initBase() {
const s = 4;
const pts = [new THREE.Vector3(-s,s,s), new THREE.Vector3(s,s,s), new THREE.Vector3(s,-s,s), new THREE.Vector3(-s,-s,s), new THREE.Vector3(-s,s,-s), new THREE.Vector3(s,s,-s), new THREE.Vector3(s,-s,-s), new THREE.Vector3(-s,-s,-s)];
[[pts[0],pts[1],pts[2],pts[3]], [pts[1],pts[5],pts[6],pts[2]], [pts[5],pts[4],pts[7],pts[6]], [pts[4],pts[0],pts[3],pts[7]], [pts[4],pts[5],pts[1],pts[0]], [pts[3],pts[2],pts[6],pts[7]]].forEach(f => createRect(f[0], f[1], f[2], f[3], 0, false));
saveState();
}
function createRect(p1, p2, p3, p4, depth, save = true) {
const geo = new THREE.BufferGeometry();
const v = [p1.x,p1.y,p1.z, p2.x,p2.y,p2.z, p3.x,p3.y,p3.z, p3.x,p3.y,p3.z, p4.x,p4.y,p4.z, p1.x,p1.y,p1.z];
geo.setAttribute('position', new THREE.Float32BufferAttribute(v, 3));
geo.computeVertexNormals();
const mesh = new THREE.Mesh(geo, material.clone());
mesh.material.color.setHSL((depth * 0.12) % 1, 0.8, 0.5);
mesh.userData = { isBismuth: true, depth: depth, corners: [p1.clone(), p2.clone(), p3.clone(), p4.clone()] };
group.add(mesh);
if (save) saveState();
}
function grow(mesh) {
const c = mesh.userData.corners, d = mesh.userData.depth + 1; if (d > 10) return;
const v1 = new THREE.Vector3().subVectors(c[1], c[0]);
const normal = new THREE.Vector3().crossVectors(v1, new THREE.Vector3().subVectors(c[3], c[0])).normalize();
const center = new THREE.Vector3().add(c[0]).add(c[1]).add(c[2]).add(c[3]).divideScalar(4);
const offset = normal.multiplyScalar(currentMode === 'tree' ? 1.2 : v1.length() * 0.15);
const inner = c.map(p => p.clone().lerp(center, 0.2).sub(offset));
group.remove(mesh);
createRect(c[0], c[1], inner[1], inner[0], d, false); createRect(c[1], c[2], inner[2], inner[1], d, false); createRect(c[2], c[3], inner[3], inner[2], d, false); createRect(c[3], c[0], inner[0], inner[3], d, false); createRect(inner[0], inner[1], inner[2], inner[3], d, false);
saveState();
}
function startFly() {
isFlying = true; flyPhase = 'approach';
const currentPos = camera.position.clone();
const toCenter = new THREE.Vector3().subVectors(currentCenter, currentPos).normalize();
const lateral = new THREE.Vector3(0, 1, 0).cross(toCenter).normalize().multiplyScalar(bypassDistance);
flyDirection.copy(toCenter).add(lateral.multiplyScalar(0.2)).normalize();
controls.enabled = false;
}
document.getElementById('deleteMode').addEventListener('click', (e) => {
e.stopPropagation(); isDeleteMode = !isDeleteMode;
e.target.innerText = isDeleteMode ? 'Delete' : 'Build';
e.target.style.color = isDeleteMode ? '#ff0000' : '#00ff00';
});
document.getElementById('toggleMode').addEventListener('click', (e) => {
e.stopPropagation();
currentMode = (currentMode === 'tree') ? 'hopper' : 'tree';
e.target.innerText = currentMode === 'tree' ? 'Tree' : 'Hopper';
});
document.getElementById('undoBtn').addEventListener('click', (e) => { e.stopPropagation(); undo(); });
function toggleDonate() { 
const info = document.getElementById("cryptoInfo"); 
const isOpening = info.style.display !== "flex";
info.style.display = isOpening ? "flex" : "none"; 
}
function copyToClipboard() {
const addr = document.getElementById("cryptoAddr");
const text = addr.innerText;
navigator.clipboard.writeText(text).then(() => {
addr.innerText = "Copied!";
setTimeout(() => addr.innerText = text, 1500);
});
}
function onDown(e) {
if (e.target.tagName === 'BUTTON' || e.target.closest('#basement')) return;
const x = e.clientX || (e.touches && e.touches[0].clientX), y = e.clientY || (e.touches && e.touches[0].clientY);
mouse.x = (x / window.innerWidth) * 2 - 1; mouse.y = -(y / window.innerHeight) * 2 + 1;
startMouse.set(x, y); startTime = Date.now();
clearTimeout(holdTimer); holdTimer = setTimeout(startFly, 1800);
}
function onUp(e) {
if (e.target.tagName === 'BUTTON' || e.target.closest('#basement')) { clearTimeout(holdTimer); startTime = 0; return; }
clearTimeout(holdTimer);
if (startTime !== 0 && Date.now() - startTime < 1800 && !isFlying) {
raycaster.setFromCamera(mouse, camera);
const hits = raycaster.intersectObjects(group.children);
if (hits.length > 0) {
if (isDeleteMode) { group.remove(hits[0].object); saveState(); }
else { grow(hits[0].object); }
}
}
isFlying = false; startTime = 0;
}
function onMove(e) {
if (!startTime) return;
const x = e.clientX || (e.touches && e.touches[0].clientX), y = e.clientY || (e.touches && e.touches[0].clientY);
if (Math.hypot(x - startMouse.x, y - startMouse.y) > 5 && !isFlying) { clearTimeout(holdTimer); startTime = 0; }
}
window.addEventListener('mousedown', onDown); window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onUp);
window.addEventListener('touchstart', onDown, { passive: false }); window.addEventListener('touchmove', onMove, { passive: false }); window.addEventListener('touchend', onUp, { passive: false });
function animate() {
requestAnimationFrame(animate);
if (isFlying) { currentSpeed = Math.min(currentSpeed + acceleration, maxSpeed); } 
else { currentSpeed = Math.max(currentSpeed - acceleration, 0); if (currentSpeed === 0) controls.enabled = true; }
if (currentSpeed > 0) {
const dist = camera.position.distanceTo(currentCenter);
if (flyPhase === 'approach') { camera.position.addScaledVector(flyDirection, currentSpeed); if (dist < bypassDistance + 1) flyPhase = 'bypass'; } 
else if (flyPhase === 'bypass') {
const rel = new THREE.Vector3().subVectors(camera.position, currentCenter);
const tan = new THREE.Vector3().crossVectors(rel, new THREE.Vector3(0, 1, 0)).normalize();
camera.position.addScaledVector(tan, currentSpeed); camera.position.addScaledVector(rel.normalize(), currentSpeed * 0.2);
if (rel.normalize().dot(flyDirection) < -0.5) flyPhase = 'exit';
} else { camera.position.addScaledVector(new THREE.Vector3().subVectors(camera.position, currentCenter).normalize(), currentSpeed); }
camera.lookAt(currentCenter);
}
controls.update(); renderer.render(scene, camera);
}
loadState(); animate();
window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
</script>
</body>
</html>
