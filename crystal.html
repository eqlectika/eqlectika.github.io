<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bismuth Orthogonal Step</title>
<style>
body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
canvas { display: block; }
</style>
</head>
<body>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000);
renderer.outputEncoding = THREE.sRGBEncoding;
document.body.appendChild(renderer.domElement);
const controls = new THREE.OrbitControls(camera, renderer.domElement);
const material = new THREE.MeshStandardMaterial({ 
    metalness: 0.30, 
    roughness: 0.5, 

transparent: true,
    opacity: 0.5,

    vertexColors: true, 
    side: THREE.DoubleSide,
    flatShading: true 
});
let geometry = new THREE.BoxGeometry(10, 10, 10, 1, 1, 1);
function applyBismuthColor(geo) {
    const pos = geo.attributes.position;
    const colors = [];
    for (let i = 0; i < pos.count; i++) {
        const color = new THREE.Color();
        const v = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i));
        color.setHSL((v.length() * 0.08) % 1.0, 0.9, 0.5);
        colors.push(color.r, color.g, color.b);
    }
    geo.setAttribute('color', new THREE.Float32BufferAttribute(colors, 3));
}
applyBismuthColor(geometry);
let mesh = new THREE.Mesh(geometry, material);
scene.add(mesh);
const light1 = new THREE.PointLight(0xffffff, 10, 200);
light1.position.set(20, 20, 20);
scene.add(light1);
const light2 = new THREE.PointLight(0x00ffff, 5, 200);
light2.position.set(-20, -20, -20);
scene.add(light2);
const ambient = new THREE.AmbientLight(0xffffff, 0.3);
scene.add(ambient);
camera.position.set(20, 20, 20);
function growStep(faceIndex) {
    const posAttr = mesh.geometry.attributes.position;
    const idx = faceIndex * 3;
    const v = [
        new THREE.Vector3().fromBufferAttribute(posAttr, idx),
        new THREE.Vector3().fromBufferAttribute(posAttr, idx + 1),
        new THREE.Vector3().fromBufferAttribute(posAttr, idx + 2)
    ];
    const center = new THREE.Vector3().add(v[0]).add(v[1]).add(v[2]).divideScalar(3);
    const normal = new THREE.Vector3().crossVectors(v[1].clone().sub(v[0]), v[2].clone().sub(v[0])).normalize();
    const s = 0.85;
    const d = -1.2;
    const inner = v.map(p => p.clone().sub(center).multiplyScalar(s).add(center).add(normal.clone().multiplyScalar(d)));
    const newVerts = [
        v[0].x,v[0].y,v[0].z, v[1].x,v[1].y,v[1].z, inner[1].x,inner[1].y,inner[1].z,
        v[0].x,v[0].y,v[0].z, inner[1].x,inner[1].y,inner[1].z, inner[0].x,inner[0].y,inner[0].z,
        v[1].x,v[1].y,v[1].z, v[2].x,v[2].y,v[2].z, inner[2].x,inner[2].y,inner[2].z,
        v[1].x,v[1].y,v[1].z, inner[2].x,inner[2].y,inner[2].z, inner[1].x,inner[1].y,inner[1].z,
        v[2].x,v[2].y,v[2].z, v[0].x,v[0].y,v[0].z, inner[0].x,inner[0].y,inner[0].z,
        v[2].x,v[2].y,v[2].z, inner[0].x,inner[0].y,inner[0].z, inner[2].x,inner[2].y,inner[2].z,
        inner[0].x,inner[0].y,inner[0].z, inner[1].x,inner[1].y,inner[1].z, inner[2].x,inner[2].y,inner[2].z
    ];
    const currentPos = Array.from(posAttr.array);
    currentPos.splice(faceIndex * 9, 9, ...newVerts);
    const newGeo = new THREE.BufferGeometry();
    newGeo.setAttribute('position', new THREE.Float32BufferAttribute(currentPos, 3));
    applyBismuthColor(newGeo);
    newGeo.computeVertexNormals();
    mesh.geometry.dispose();
    mesh.geometry = newGeo;
}
window.addEventListener('pointerdown', (e) => {
    const mouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
    const raycaster = new THREE.Raycaster();
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObject(mesh);
    if (intersects.length > 0) growStep(intersects[0].faceIndex);
});
function animate() {
    requestAnimationFrame(animate);
    const t = Date.now() * 0.001;
    light1.position.x = Math.cos(t) * 25;
    light1.position.z = Math.sin(t) * 25;
    controls.update();
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
