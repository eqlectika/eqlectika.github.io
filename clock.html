<!DOCTYPE html>
<html lang="en">
<head> 
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Solar System Orbital Trajectories Animation</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      box-sizing: border-box;
    }

body {
  margin: 0;
  padding: 0;
  background-color: #000;
  color: #fff;
  font-family: monospace;
  overflow-y: auto;
  min-height: 100%; 
  display: flex;
  flex-direction: column;
}

#canvas-wrapper {
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
  margin: 5px 0; 
}

.footer-logo-container {
  text-align: center;
  width: 100%;
  padding: 10px 0 0 0;
  margin-top: 0; 
}

    h1 {
margin: 15px;
      font-size: 1.2rem;
      text-align: center;
    }


  .logo-image {
    display: inline-block;
    opacity: 1;
    max-width: 48px;
    transition: opacity 0.3s, transform 0.3s;
    vertical-align: middle;
  }

  .logo-image:hover {
    opacity: 0.8;
    transform: scale(1.1);
  }
    
    #controls {
      display: flex;
      font-family: monospace;
      justify-content: center;
      gap: 15px;
      padding-bottom: 5px;
      flex-wrap: wrap;
      margin-bottom: 5px;
    }
    #controls label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.9rem;
    }

    #orbitCanvas {
      background-color: #000;
      display: block;
      max-width: 100%;
      max-height: 100%;
      touch-action: auto;
    }
    #legend {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-top: 5px;
      margin-bottom: 20px;
      font-size: 0.8rem;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
    }
    .color-box {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      position: relative;
    }
    .color-box input {
      position: absolute;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    #info {
      text-align: center;
      font-size: 0.8rem;
      margin: 0px;
      padding: 0 10px;
    }
    .help-link {
      position: center;
      text-align: center;
      margin: 5px;
      top: 70px;
      color: #777;
      font-size: 18px;
      text-decoration: none;
      font-family: monospace;
    }
    .hidden-planet {
      opacity: 0.3;
    }
    .speed-control {
      width: 100%;
      padding: 0 0px;
      margin-top: 5px;
      text-align: center;
    }
    .speed-control label {
      display: block;
      margin-bottom: 5px;
    }
    .speed-slider {
      width: 80%;
      margin-bottom: 0px;
    }
    #pause-btn {
      margin-bottom: 5px;
      padding: 5px 10px;
      background: #333;
      color: white;
      border: none;
      border-radius: 0px;
      cursor: pointer;
    }
    #date-picker {
      margin: 5px 5px;
      background: #333;
      color: white;
      border: none;
      padding: 5px;
      font-family: monospace;
    }
    .control-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 5px;
    }
    footer { 
  margin-top: auto; 
  padding: 20px 0; 
  display: flex; 
  justify-content: center; 
}
}
  </style>
</head>
<body>
  <script src="pwa-init.js"></script>
  <div class="footer-logo-container">
    <a href="index.html">
      <img src="logo.png" alt="Logo" class="logo-image">
    </a>
  </div>
  <h1>Solar System Model</h1>
  <div class="speed-control">
    <div class="control-container">
      <label for="date-picker">Date:</label>
<input type="date" id="date-picker" value="2000-01-01">
      <button id="pause-btn">Pause</button>
</div>
    <input type="range" id="speed-slider" class="speed-slider" min="0.001" max="0.05" step="0.001" value="0.05">
  </div>
  <div id="canvas-wrapper">
    <canvas id="orbitCanvas"></canvas>
  </div>
  <div id="controls">
    <label><input type="radio" name="frame" value="sun" checked> Sun</label>
    <label><input type="radio" name="frame" value="earth"> Earth</label>
  </div>
  <div id="legend"></div>

  <div id="info"></div>
  

  
  <script>
    const canvas = document.getElementById('orbitCanvas');
    const ctx = canvas.getContext('2d');
    const legendDiv = document.getElementById('legend');
    
function initCanvas() {
  const size = window.innerWidth; // Берем всю ширину экрана
  canvas.width = size;            // Ширина холста в пикселях
  canvas.height = size;           // Высота холста такая же (делает его квадратным)
  canvas.style.width = `${size}px`;
  canvas.style.height = `${size}px`;
}


    
    window.addEventListener('resize', () => {
      initCanvas();
      trajectories.forEach(arr => arr.length = 0);
    });
    
    const planets = [
      {name: 'Moon', distance: 0.00257, period: 27.3, color: '#cccccc', eccentricity: 0.0549, inclination: 5.145, parent: 'Earth'},
      {name: 'Mercury', distance: 0.387, period: 88, color: '#1e90ff', eccentricity: 0.2056, inclination: 0.1222},
      {name: 'Venus', distance: 0.723, period: 225, color: '#8F00FF', eccentricity: 0.0068, inclination: 0.0593},
      {name: 'Earth', distance: 1.000, period: 365.25, color: '#008000', eccentricity: 0.0167, inclination: 0},
      {name: 'Mars', distance: 1.524, period: 687, color: '#ff4500', eccentricity: 0.0934, inclination: 0.0323},
      {name: 'Jupiter', distance: 5.203, period: 4333, color: '#daa520', eccentricity: 0.0489, inclination: 0.0228},
      {name: 'Saturn', distance: 9.537, period: 10759, color: '#deb887', eccentricity: 0.0565, inclination: 0.0436},
      {name: 'Uranus', distance: 19.191, period: 30687, color: '#40e0d0', eccentricity: 0.0464, inclination: 0.0135},
      {name: 'Neptune', distance: 30.068, period: 60190, color: '#4169e1', eccentricity: 0.0095, inclination: 0.0309}
    ];
    
    let planetVisibility = planets.map(() => true);
    
    function createLegend() {
      legendDiv.innerHTML = '';
      planets.forEach((planet, index) => {
        const item = document.createElement('div');
        item.className = 'legend-item';
        const colorBox = document.createElement('div');
        colorBox.className = 'color-box';
        colorBox.style.backgroundColor = planet.color 
        if (!planetVisibility[index]) {
          colorBox.classList.add('hidden-planet');
        }
        const label = document.createElement('span');
        label.textContent = planet.name;
        if (!planetVisibility[index]) {
          label.classList.add('hidden-planet');
        }
        item.append(colorBox, label);
        legendDiv.appendChild(item);
        item.addEventListener('click', () => {
          planetVisibility[index] = !planetVisibility[index];
          if (planetVisibility[index]) {
            colorBox.classList.remove('hidden-planet');
            label.classList.remove('hidden-planet');
          } else {
            colorBox.classList.add('hidden-planet');
            label.classList.add('hidden-planet');
          }
          if (planet.name === 'Earth' && !planetVisibility[index] && frame === 'earth') {
            document.querySelector('input[name="frame"][value="sun"]').checked = true;
            frame = 'sun';
          }
          trajectories.forEach(arr => arr.length = 0);
        });
      });
    }
    
    initCanvas();
    createLegend();
    
    const maxDistance = planets[planets.length - 1].distance;
    const margin = 40;
    let maxOrbitRadius;
    
    function orbitRadius(ae) {
      return (ae / maxDistance) * maxOrbitRadius;
    }
    
    const J2000 = new Date('2000-01-01T12:00:00Z');
    let t = 0;
    let dt = 0.05;
    
    let frame = 'sun';
    const earthIndex = planets.findIndex(p => p.name === 'Earth');
    const trajectories = planets.map(() => []);
    
    let scale = 10;
    let offsetX = 0;
    let offsetY = 0;
    
    document.getElementById('controls').addEventListener('change', (e) => {
      if (e.target.name === 'frame') {
        frame = e.target.value;

        if (frame === 'earth') {
          const earthIdx = planets.findIndex(p => p.name === 'Earth');
          if (!planetVisibility[earthIdx]) {
            planetVisibility[earthIdx] = true;
            createLegend(); 
          }
        }

        trajectories.forEach(arr => arr.length = 0);
        offsetX = 0;
        offsetY = 0;
        scale = 10;
      }
    });

    
    const speedSlider = document.getElementById('speed-slider');
    speedSlider.addEventListener('input', (e) => {
      dt = parseFloat(e.target.value);
    });
    
    const datePicker = document.getElementById('date-picker');
datePicker.addEventListener('change', (e) => {
  const selectedDate = new Date(e.target.value + 'T12:00:00Z');
  const msInDay = 86400000;
  t = (selectedDate.getTime() - J2000.getTime()) / msInDay;
  isPaused = true; 
  pauseBtn.textContent = 'Resume'; 
});
    
    let isPaused = false;
    const pauseBtn = document.getElementById('pause-btn');
    pauseBtn.addEventListener('click', () => {
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? 'Resume' : 'Pause';
      if (!isPaused) {
        animate();
      }
    });
    
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      const zoomSpeed = 0.001;
      const prevScale = scale;
      scale += e.deltaY * -zoomSpeed * scale;
      scale = Math.max(0.1, Math.min(scale, 50));
      const scaleChange = scale / prevScale;
      offsetX = offsetX * scaleChange;
      offsetY = offsetY * scaleChange;
      trajectories.forEach(arr => arr.length = 0);
    }, {passive: false});
    
    let isDragging = false;
    let lastX, lastY;
    canvas.addEventListener('mousedown', e => {
      if (e.button === 0) {
        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;
      }
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - lastX;
      const dy = e.clientY - lastY;
      offsetX += dx;
      offsetY += dy;
      lastX = e.clientX;
      lastY = e.clientY;
      trajectories.forEach(arr => arr.length = 0);
    });
    window.addEventListener('mouseup', () => {
      isDragging = false;
    });
    
    let lastTouchDistance = null;
    canvas.addEventListener('touchmove', function (e) {
      if (e.touches.length === 2) {
        e.preventDefault();
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const distance = Math.sqrt(dx * dx + dy * dy);
        if (lastTouchDistance !== null) {
          const zoomIntensity = 0.001;
          const delta = distance - lastTouchDistance;
          const prevScale = scale;
          scale *= (1 + zoomIntensity * delta);
          scale = Math.max(0.1, Math.min(scale, 50));
          const scaleChange = scale / prevScale;
          offsetX = offsetX * scaleChange;
          offsetY = offsetY * scaleChange;
          trajectories.forEach(arr => arr.length = 0);
        }
        lastTouchDistance = distance;
      }
    }, { passive: false });
    canvas.addEventListener('touchend', () => {
      lastTouchDistance = null;
    });
    
    function drawPoint(x, y, color, size = 4) {
      ctx.beginPath();
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.arc(x, y, size, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    
    function getCurrentDate() {
      const msInDay = 86400000;
      const currentDate = new Date(J2000.getTime() + t * msInDay);
      return currentDate.toISOString().split('T')[0];
    }
    
    function solveKepler(M, e, tolerance = 1e-6) {
      let E = M;
      let delta;
      do {
        delta = (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
        E -= delta;
      } while (Math.abs(delta) > tolerance);
      return E;
    }
    
    function getTrueAnomaly(E, e) {
      const cosTheta = (Math.cos(E) - e) / (1 - e * Math.cos(E));
      const sinTheta = Math.sqrt(1 - e * e) * Math.sin(E) / (1 - e * Math.cos(E));
      return Math.atan2(sinTheta, cosTheta);
    }
    
    function animate() {
      maxOrbitRadius = (canvas.width / 2) - margin;
      const centerX = canvas.width / 2 + offsetX;
      const centerY = canvas.height / 2 + offsetY;
      
      ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 1. Вычисляем Землю
      const earthData = planets[earthIndex];
      const earthM = (2 * Math.PI * t) / earthData.period;
      const earthE = solveKepler(earthM, earthData.eccentricity);
      const earthTheta = getTrueAnomaly(earthE, earthData.eccentricity);
      const earthR = (orbitRadius(earthData.distance) * (1 - earthData.eccentricity ** 2)) / (1 + earthData.eccentricity * Math.cos(earthTheta));
      
      const earthX = earthR * Math.cos(earthTheta);
      const earthY = earthR * Math.sin(earthTheta) * Math.cos(earthData.inclination);


      // 2. Вычисляем все объекты
      const positions = planets.map(planet => {
        let x, y;

        if (planet.name === 'Moon') {
          const moonM = (2 * Math.PI * t) / planet.period;
          const moonE = solveKepler(moonM, planet.eccentricity);
          const moonTheta = getTrueAnomaly(moonE, planet.eccentricity);
          
          const moonR = orbitRadius(0.05) * 2; // Увеличил радиус для видимости
          const localX = moonR * Math.cos(moonTheta);
          const localY = moonR * Math.sin(moonTheta) * Math.cos(planet.inclination);
          
          x = earthX + localX;
          y = earthY + localY;
        } 
        else {
          const a = orbitRadius(planet.distance);
          const e = planet.eccentricity;
          const M = (2 * Math.PI * t) / planet.period;
          const E = solveKepler(M, e);
          const theta = getTrueAnomaly(E, e);
          const r = a * (1 - e * e) / (1 + e * Math.cos(theta));
          
          x = r * Math.cos(theta);
          y = r * Math.sin(theta) * Math.cos(planet.inclination);
        }

        return { x: centerX + x * scale, y: centerY + y * scale, color: planet.color, name: planet.name };
      });

      
      // Отрисовка
      const currentEarthPos = positions[earthIndex];
      
      // Рисуем Солнце
      if (frame === 'sun') {
        drawPoint(centerX, centerY, '#ffff00', 6);
      } else {
        const sunX = centerX - (currentEarthPos.x - centerX);
        const sunY = centerY - (currentEarthPos.y - centerY);
        drawPoint(sunX, sunY, '#ffff00', 6);
      }

      positions.forEach((pos, i) => {
        if (!planetVisibility[i]) return;
        
        let drawX = pos.x;
        let drawY = pos.y;
        if (frame === 'earth') {
          drawX = centerX + (pos.x - currentEarthPos.x);
          drawY = centerY + (pos.y - currentEarthPos.y);
        }
        
        if (planets[i].name === 'Moon') {
          const earthDrawX = frame === 'earth' ? centerX : currentEarthPos.x;
          const earthDrawY = frame === 'earth' ? centerY : currentEarthPos.y;

          // 1. Линия Земля-Луна
          ctx.beginPath();
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
          ctx.moveTo(earthDrawX, earthDrawY);
          ctx.lineTo(drawX, drawY);
          ctx.stroke();

          // 2. Линия ПРОДЛЕНИЯ (вставить этот кусок кода)
          ctx.beginPath();
          ctx.setLineDash([5, 5]); 
          ctx.strokeStyle = '#cccccc';
          ctx.moveTo(drawX, drawY);
          // Удлиняем вектор: берем разницу координат и умножаем на 2
// Умножаем разницу на 10, чтобы линия была длиннее
ctx.lineTo(drawX + (drawX - earthDrawX) * 100, drawY + (drawY - earthDrawY) * 100);

          ctx.stroke();
          ctx.setLineDash([]);
        }

        trajectories[i].push({x: drawX, y: drawY});
        if (trajectories[i].length > 300) trajectories[i].shift();
        
        ctx.beginPath();
        ctx.strokeStyle = planets[i].color;
        for (let j = 0; j < trajectories[i].length; j++) {
            const p = trajectories[i][j];
            j === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
        drawPoint(drawX, drawY, planets[i].color, 3);
      });


      
      if (!isPaused) {
        t += dt;
        datePicker.value = getCurrentDate();
        requestAnimationFrame(animate);
      }
    }

    animate();

    
    

  </script>

</body>
</html>
