<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

let history = [];
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
const group = new THREE.Group();
scene.add(group);

let currentVisualMode = 'void'; 
let currentFlatWords = ["subject", "matrix", "architect", "code", "system"];

const bgColors = ["#000000", "#000033", "#003300", "#4a0010"];
const textColors = ["#ffffff", "#00ff00", "#ffa500", "#ff1493", "#00ffff"];
let bgIndex = 0;
let textIndex = 0;

let typo = null;
const defaultEnWords = ["structure", "geometry", "quantum", "dimension", "axis", "matrix", "vector", "fractal", "node", "symmetry", "order", "system", "vertex", "tensor", "lattice"];

function initTypoDictionary() {
  const affPath = "https://cdn.jsdelivr.net/jsdelivr/gh/cfinke/Typo.js@master/typo/dictionaries/en_US/en_US.aff";
  const dicPath = "https://cdn.jsdelivr.net/jsdelivr/gh/cfinke/Typo.js@master/typo/dictionaries/en_US/en_US.dic";
  
  Promise.all([
    fetch(affPath).then(r => { if (!r.ok) throw new Error(); return r.text(); }),
    fetch(dicPath).then(r => { if (!r.ok) throw new Error(); return r.text(); })
  ]).then(([affData, dicData]) => {
    typo = new Typo("en_US", affData, dicData);
  }).catch(() => {
    console.warn("Using local fallback generator.");
  });
}
initTypoDictionary();

function predictNextWords(seedWord) {
  const norm = seedWord ? seedWord.toLowerCase().trim() : '';
  let result = [];
  
  if (typo) {
    const suggestions = typo.suggest(norm);
    if (suggestions && suggestions.length > 0) {
      result = suggestions.filter(w => !w.includes("'") && !w.includes("-"));
    }
  }
  
  if (result.length < 5) {
    const shuffled = [...defaultEnWords].sort(() => 0.5 - Math.random());
    while (result.length < 5) {
      const nextWord = shuffled.pop();
      if (!result.includes(nextWord)) {
        result.push(nextWord);
      }
    }
  }
  
  return result.slice(0, 5);
}

function createTextTexture(text) {
  const canvas = document.createElement('canvas');
  canvas.width = 256;
  canvas.height = 256;
  const ctx = canvas.getContext('2d');
  
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  
  ctx.lineWidth = 16;
  ctx.strokeStyle = '#ffffff';
  ctx.strokeRect(8, 8, canvas.width - 16, canvas.height - 16);
  
  if (currentVisualMode === 'text') {
    const cleanText = text.toUpperCase();
    let fontSize = 50; 
    const maxWidth = canvas.width - 40; 
    
    do {
      ctx.font = `bold ${fontSize}px "DIN Condensed", Menlo, sans-serif`;
      if (ctx.measureText(cleanText).width <= maxWidth) break;
      fontSize -= 2;
    } while (fontSize > 10);
    
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(cleanText, canvas.width / 2, canvas.height / 2);
  }
  
  const texture = new THREE.CanvasTexture(canvas);
  return texture;
}

function updateAllTextures() {
  group.children.forEach(mesh => {
    if (mesh.userData && mesh.userData.word !== undefined) {
      if (mesh.material.map) {
        mesh.material.map.dispose();
      }
      mesh.material.map = createTextTexture(mesh.userData.word);
      mesh.material.needsUpdate = true;
    }
  });
}

function fitSingleWordFontSize(el, word) {
  let fontSize = 100;
  el.style.fontSize = `${fontSize}px`;
  
  const maxW = window.innerWidth - 40;
  const testCanvas = document.createElement('canvas');
  const testCtx = testCanvas.getContext('2d');
  
  do {
    testCtx.font = `bold ${fontSize}px "DIN Condensed", Menlo, sans-serif`;
    if (testCtx.measureText(word.toUpperCase()).width <= maxW) break;
    fontSize -= 2;
  } while (fontSize > 12);
  
  el.style.fontSize = `${fontSize}px`;
}

function renderFlatInterface() {
  const container = document.getElementById('flatInterface');
  const topMenu = document.getElementById('topInterface');
  const lbls = document.getElementById('labelsContainer');
  const bgBtn = document.getElementById('bgColorBtn');
  const txBtn = document.getElementById('textColorBtn');
  
  if (currentVisualMode !== 'flat') {
    container.style.display = 'none';
    topMenu.style.display = 'flex';
    lbls.style.display = 'flex';
    bgBtn.style.display = 'none';
    txBtn.style.display = 'none';
    document.body.style.background = '#000000';
    return;
  }
  
  container.style.display = 'flex';
  topMenu.style.display = 'none';
  lbls.style.display = 'none';
  bgBtn.style.display = 'block';
  txBtn.style.display = 'block';
  
  container.style.background = bgColors[bgIndex];
  document.body.style.background = bgColors[bgIndex];
  
  currentFlatWords.forEach((word, idx) => {
    const el = document.getElementById(`fw${idx}`);
    el.innerText = word.toUpperCase();
    el.style.color = textColors[textIndex];
    fitSingleWordFontSize(el, word);
  });
}

const hemi = new THREE.HemisphereLight(0xffffff, 0x000000, 0.8);
const light = new THREE.PointLight(0xffffff, 0.5);
light.position.set(10,10,10);
scene.add(hemi, light);
const backLight = new THREE.PointLight(0xffffff, 1, 50);
backLight.position.set(-15,-20,-15);
scene.add(backLight);
const bottomLight = new THREE.DirectionalLight(0xffffff, 0.4);
bottomLight.position.set(0,-20,0);
scene.add(bottomLight);
camera.position.set(12,12,12);

let currentMode = 'tree';
let isDeleteMode = false;
let polarity = 1;
let isMirror = false;
const currentCenter = new THREE.Vector3(0,0,0);
let holdTimer = null;
let isFlying = false;
let startTime = 0;
const flyDirection = new THREE.Vector3();
let currentSpeed = 0;
const maxSpeed = 0.1;
const acceleration = 0.001;
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const startMouse = new THREE.Vector2();

function saveState() {
  const data = group.children.map(m => ({
    depth: m.userData.depth,
    normalSteps: m.userData.normalSteps,
    mirrorSteps: m.userData.mirrorSteps,
    word: m.userData.word,
    corners: m.userData.corners.map(c => ({ x: c.x, y: c.y, z: c.z }))
  }));
  const snapshot = JSON.stringify(data);
  if (history.length === 0 || history[history.length - 1] !== snapshot) {
    history.push(snapshot);
    if (history.length > 30) history.shift();
  }
  localStorage.setItem('bismuth_state', snapshot);
}

function loadState() {
  const saved = localStorage.getItem('bismuth_state');
  if (!saved) {
    initBase();
    return;
  }
  history = [saved];
  JSON.parse(saved).forEach(d => {
    const c = d.corners.map(p => new THREE.Vector3(p.x, p.y, p.z));
    createRect(c[0], c[1], c[2], c[3], d.depth, d.normalSteps, d.mirrorSteps, d.word, false);
  });
}

function undo() {
  if (history.length <= 1) return;
  history.pop();
  const previous = JSON.parse(history[history.length - 1]);
  while (group.children.length > 0) {
    group.remove(group.children[0]);
  }
  previous.forEach(d => {
    const c = d.corners.map(p => new THREE.Vector3(p.x, p.y, p.z));
    createRect(c[0], c[1], c[2], c[3], d.depth, d.normalSteps, d.mirrorSteps, d.word, false);
  });
  localStorage.setItem('bismuth_state', JSON.stringify(previous));
  if (group.children.length > 0) {
    const lastMeshWord = group.children[group.children.length - 1].userData.word || "matrix";
    currentFlatWords = predictNextWords(lastMeshWord);
    if (currentVisualMode === 'flat') renderFlatInterface();
  }
}

function reset() {
  while (group.children.length > 0) {
    group.remove(group.children[0]);
  }
  history = [];
  initBase();
  if (currentVisualMode === 'flat') renderFlatInterface();
}

function initBase() {
  const s = 4;
  const pts = [
    new THREE.Vector3(-s,s,s), new THREE.Vector3(s,s,s), new THREE.Vector3(s,-s,s), new THREE.Vector3(-s,-s,s),
    new THREE.Vector3(-s,s,-s), new THREE.Vector3(s,s,-s), new THREE.Vector3(s,-s,-s), new THREE.Vector3(-s,-s,-s)
  ];
  const faces = [
    [pts[0],pts[1],pts[2],pts[3]], [pts[1],pts[5],pts[6],pts[2]], [pts[5],pts[4],pts[7],pts[6]],
    [pts[4],pts[0],pts[3],pts[7]], [pts[4],pts[5],pts[1],pts[0]], [pts[3],pts[2],pts[6],pts[7]]
  ];
  const initialWords = ["subject", "matrix", "architect", "code", "system", "mind"];  
  faces.forEach((f, idx) => {
    const word = initialWords[idx % initialWords.length];
    createRect(f[0], f[1], f[2], f[3], 0, 0, 0, word, false);
  });
  saveState();
  currentFlatWords = initialWords.slice(0, 5);
}

function createRect(p1, p2, p3, p4, depth, normalSteps = 0, mirrorSteps = 0, word = "", save = true) {
  const geo = new THREE.BufferGeometry();
  const v = [
    p1.x,p1.y,p1.z, p2.x,p2.y,p2.z, p3.x,p3.y,p3.z,
    p3.x,p3.y,p3.z, p4.x,p4.y,p4.z, p1.x,p1.y,p1.z
  ];
  const uvs = new Float32Array([
    0,1, 1,1, 1,0,
    1,0, 0,0, 0,1
  ]);
  geo.setAttribute('position', new THREE.Float32BufferAttribute(v,3));
  geo.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));
  geo.computeVertexNormals();
  
  const textTex = createTextTexture(word);
  const customMaterial = new THREE.MeshPhongMaterial({
    color: 0xffffff,
    shininess: 30,
    specular: 0x444444,
    side: THREE.DoubleSide,
    depthWrite: true,
    map: textTex
  });
  
  const mesh = new THREE.Mesh(geo, customMaterial);
  mesh.userData = {
    isBismuth: true,
    depth,
    normalSteps,
    mirrorSteps,
    word,
    corners: [p1.clone(), p2.clone(), p3.clone(), p4.clone()]
  };
  group.add(mesh);
  if (save) saveState();
}

function grow(mesh) {
  const c = mesh.userData.corners;
  const d = mesh.userData.depth;
  const normalSteps = mesh.userData.normalSteps;
  const mirrorSteps = mesh.userData.mirrorSteps;
  const seedWord = mesh.userData.word;
  if (!isMirror && normalSteps >= 10) return;
  if (isMirror && mirrorSteps >= 10) return;
  const v1 = new THREE.Vector3().subVectors(c[1], c[0]);
  const normal = new THREE.Vector3().crossVectors(v1, new THREE.Vector3().subVectors(c[3], c[0])).normalize();
  const center = new THREE.Vector3().add(c[0]).add(c[1]).add(c[2]).add(c[3]).divideScalar(4);
  const lerpFactor = isMirror ? -0.2 : 0.2;
  const stepPolarity = isMirror ? polarity : -polarity;
  const offset = normal.multiplyScalar(currentMode === 'tree' ? 1.2 : v1.length() * 0.15).multiplyScalar(stepPolarity);
  const inner = c.map(p => p.clone().lerp(center, lerpFactor).sub(offset));
  const nextDepth = isMirror ? d - 1 : d + 1;
  const nextNormalSteps = isMirror ? normalSteps : normalSteps + 1;
  const nextMirrorSteps = isMirror ? mirrorSteps + 1 : mirrorSteps;
  
  group.remove(mesh);
  
  const predicted = predictNextWords(seedWord);
  
  createRect(c[0], c[1], inner[1], inner[0], nextDepth, nextNormalSteps, nextMirrorSteps, predicted[0], false);
  createRect(c[1], c[2], inner[2], inner[1], nextDepth, nextNormalSteps, nextMirrorSteps, predicted[1], false);
  createRect(c[2], c[3], inner[3], inner[2], nextDepth, nextNormalSteps, nextMirrorSteps, predicted[2], false);
  createRect(c[3], c[0], inner[0], inner[3], nextDepth, nextNormalSteps, nextMirrorSteps, predicted[3], false);
  createRect(inner[0], inner[1], inner[2], inner[3], nextDepth, nextNormalSteps, nextMirrorSteps, predicted[4], false);
  saveState();
}

document.getElementById('textToggleBtn').addEventListener('click', e => {
  e.stopPropagation();
  
  if (currentVisualMode === 'void') {
    currentVisualMode = 'text';
    e.target.innerText = 'Text';
    e.target.style.color = '#00ff00';
    renderer.domElement.style.display = 'block';
    updateAllTextures();
  } else if (currentVisualMode === 'text') {
    currentVisualMode = 'flat';
    e.target.innerText = 'Info';
    e.target.style.color = '#00ffff';
    renderer.domElement.style.display = 'none';
  } else {
    currentVisualMode = 'void';
    e.target.innerText = 'Void';
    e.target.style.color = '#ffa500';
    renderer.domElement.style.display = 'block';
    updateAllTextures();
  }
  renderFlatInterface();
});

currentFlatWords.forEach((_, idx) => {
  const el = document.getElementById(`fw${idx}`);
  el.addEventListener('click', e => {
    e.stopPropagation();
    const currentText = el.innerText.toLowerCase();
    const predicted = predictNextWords(currentText);
    const newWord = predicted[Math.floor(Math.random() * predicted.length)];
    
    currentFlatWords[idx] = newWord;
    el.innerText = newWord.toUpperCase();
    fitSingleWordFontSize(el, newWord);
  });
});

document.getElementById('bgColorBtn').addEventListener('click', e => {
  e.stopPropagation();
  bgIndex = (bgIndex + 1) % bgColors.length;
  renderFlatInterface();
});

document.getElementById('textColorBtn').addEventListener('click', e => {
  e.stopPropagation();
  textIndex = (textIndex + 1) % textColors.length;
  renderFlatInterface();
});

document.getElementById('deleteMode').addEventListener('click', e => {
  e.stopPropagation();
  isDeleteMode = !isDeleteMode;
  e.target.innerText = isDeleteMode ? 'Delete' : 'Build';
  e.target.style.color = isDeleteMode ? '#ff0000' : '#00ff00';
});
document.getElementById('toggleMode').addEventListener('click', e => {
  e.stopPropagation();
  currentMode = currentMode === 'tree' ? 'hopper' : 'tree';
  e.target.innerText = currentMode === 'tree' ? 'Tree' : 'Hopper';
});
document.getElementById('mirrorBtn').addEventListener('click', e => {
  e.stopPropagation();
  isMirror = !isMirror;
  e.target.innerText = isMirror ? 'Mirror' : 'Normal';
  e.target.style.color = isMirror ? '#ffa500' : '#00ff00';
});
document.getElementById('polarityBtn').addEventListener('click', e => {
  e.stopPropagation();
  polarity *= -1;
  e.target.innerText = polarity === 1 ? 'Internal' : 'External';
  e.target.style.color = polarity === 1 ? '#00ff00' : '#ff1493';
});

let undoTimer = null;
let isLongPress = false;
const undoBtn = document.getElementById('undoBtn');
undoBtn.addEventListener('mousedown', e => {
  e.stopPropagation();
  isLongPress = false;
  undoTimer = setTimeout(() => { reset(); isLongPress = true; }, 3000);
});
undoBtn.addEventListener('touchstart', e => {
  e.stopPropagation();
  isLongPress = false;
  undoTimer = setTimeout(() => { reset(); isLongPress = true; }, 3000);
}, { passive: true });
window.addEventListener('mouseup', () => { if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; } });
window.addEventListener('touchend', () => { if (undoTimer) { clearTimeout(undoTimer); undoTimer = null; } });
undoBtn.addEventListener('click', e => {
  e.stopPropagation();
  if (!isLongPress) undo();
  isLongPress = false;
});

function toggleDonate() {
  const info = document.getElementById('cryptoInfo');
  info.style.display = info.style.display !== 'flex' ? 'flex' : 'none';
}
function copyToClipboard() {
  const addr = document.getElementById('cryptoAddr');
  const text = addr.innerText;
  navigator.clipboard.writeText(text).then(() => {
    addr.innerText = 'Copied!';
    setTimeout(() => { addr.innerText = text; }, 1500);
  });
}

let isBypassing = false;
let bypassAngle = 0;
let bypassRadius = 0;
let targetBypassRadius = 0;

const flyLabel = document.getElementById('flyLabel');
const bypassLabel = document.getElementById('bypassLabel');

function updateInterfaceLabels() {
  flyLabel.innerText = isFlying ? 'Stop' : 'Fly';
  flyLabel.style.color = isFlying ? '#ff0000' : '#ffffff';
  bypassLabel.innerText = isBypassing ? 'Stop' : 'Bypass';
  bypassLabel.style.color = isBypassing ? '#ff0000' : '#ffffff';
}

flyLabel.addEventListener('click', (e) => {
  e.stopPropagation();
  isFlying = !isFlying;
  if (isFlying) {
    isBypassing = false;
    flyDirection.subVectors(currentCenter, camera.position).normalize();
  }
  updateInterfaceLabels();
});

bypassLabel.addEventListener('click', (e) => {
  e.stopPropagation();
  isBypassing = !isBypassing;
  if (isBypassing) {
    isFlying = false;
    let radiusVector = new THREE.Vector3().subVectors(camera.position, currentCenter);
    bypassRadius = radiusVector.length();
    targetBypassRadius = bypassRadius * 0.25;
    bypassAngle = Math.atan2(camera.position.z - currentCenter.z, camera.position.x - currentCenter.x);
  }
  updateInterfaceLabels();
});

function onDown(e) {
  if (e.target.tagName === 'BUTTON' || e.target.closest('#basement') || currentVisualMode === 'flat') return;
  const x = e.clientX || (e.touches && e.touches[0].clientX);
  const y = e.clientY || (e.touches && e.touches[0].clientY);
  mouse.x = (x / window.innerWidth) * 2 - 1;
  mouse.y = -(y / window.innerHeight) * 2 + 1;
  startMouse.set(x, y);
  startTime = Date.now();
}

function onUp(e) {
  if (e.target.tagName === 'BUTTON' || e.target.closest('#basement') || currentVisualMode === 'flat') { startTime = 0; return; }
  if (startTime !== 0 && Date.now() - startTime < 300) {
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(group.children);
    if (hits.length > 0) {
      if (isDeleteMode) {
        group.remove(hits[0].object);
        saveState();
      } else {
        grow(hits[0].object);
      }
    }
  }
  startTime = 0;
}

function onMove(e) {
  if (!startTime || currentVisualMode === 'flat') return;
  const x = e.clientX || (e.touches && e.touches[0].clientX);
  const y = e.clientY || (e.touches && e.touches[0].clientY);
  if (Math.hypot(x - startMouse.x, y - startMouse.y) > 5) { startTime = 0; }
}

renderer.domElement.addEventListener('pointerdown', onDown);
renderer.domElement.addEventListener('pointermove', onMove);
renderer.domElement.addEventListener('pointerup', onUp);

function animate() {
  requestAnimationFrame(animate);
  if (currentVisualMode === 'flat') return;
  
  if (isFlying) {
    controls.enabled = true;
    controls.autoRotate = false;
    currentSpeed = Math.min(currentSpeed + acceleration, maxSpeed);
    camera.position.addScaledVector(flyDirection, currentSpeed);
    controls.target.addScaledVector(flyDirection, currentSpeed);
  } else if (isBypassing) {
    controls.enabled = true;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.0;
  } else {
    controls.enabled = true;
    controls.autoRotate = false;
    currentSpeed = Math.max(currentSpeed - acceleration, 0);
  }
  controls.update();
  renderer.render(scene, camera);
}
document.fonts.ready.then(() => {
  loadState();
  animate();
  document.getElementById('bgColorBtn').style.display = 'none';
  document.getElementById('textColorBtn').style.display = 'none';
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  if (currentVisualMode === 'flat') renderFlatInterface();
});
</script>
</body>
</html>
