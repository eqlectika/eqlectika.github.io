<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest-cross.json">
<title>Cross Editor</title>

<style>
body, html {
margin: 0;
padding: 0;
height: 100dvh;
width: 100vw;
overflow: hidden;
background: #000;
touch-action: none;
-webkit-tap-highlight-color: transparent;
}
.container {
display: grid;
grid-template-columns: var(--x) 1fr;
grid-template-rows: var(--y) 1fr;
height: 100%;
width: 100%;
}
.editor-wrapper {
position: relative;
width: 100%;
height: 100%;
overflow: hidden;
}

.editor {
width: 100%;
height: 100%;
background: var(--bg, #111);
color: var(--color, #eee);
box-sizing: border-box;
padding: 15px;
font-size: 18px;
outline: none;
touch-action: auto;
-webkit-user-select: text;
user-select: text;
-webkit-touch-callout: default;
overflow-y: auto;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Copperplate, Roboto, Helvetica, Arial, sans-serif;
}

#t3 {
font-weight: bold;
}

/* Эмуляция placeholder для contenteditable */
.editor:empty::before {
content: attr(data-placeholder);

pointer-events: none;
display: block;
}

.img-preview {
position: absolute;
bottom: 10px;
right: 10px;
max-width: 30%;
max-height: 30%;
border-radius: 4px;
pointer-events: none;
display: none;
opacity: 0.7;
}
.handle {
position: absolute;
top: var(--y);
left: var(--x);
width: 32px;
height: 32px;
transform: translate(-50%, -50%);
z-index: 100;
touch-action: none;
cursor: pointer;
-webkit-user-select: none;
user-select: none;
-webkit-touch-callout: none;
}

.handle img {
width: 100%;
height: 100%;
object-fit: contain;
pointer-events: none;
-webkit-user-drag: none;
}

</style>
</head>
<body>
<div class="container" id="app" style="--x: 50%; --y: 50%;">
<div class="editor-wrapper"><div class="editor" id="t0" contenteditable="true" data-placeholder="Type or paste text and image here. Move handle (crosshair) to resize fields. Long tap field to format and delete image. Tap handle to save and load collage. Long tap handle to level up."></div><img class="img-preview"></div>
<div class="editor-wrapper"><div class="editor" id="t1" contenteditable="true" data-placeholder="Type or paste text and image here. Move handle (crosshair) to resize fields. Long tap field to format and delete image. Tap handle to save and load collage. Long tap handle to level up."></div><img class="img-preview"></div>
<div class="editor-wrapper"><div class="editor" id="t2" contenteditable="true" data-placeholder="Type or paste text and image here. Move handle (crosshair) to resize fields. Long tap field to format and delete image. Tap handle to save and load collage. Long tap handle to level up."></div><img class="img-preview"></div>
<div class="editor-wrapper"><div class="editor" id="t3" contenteditable="true" data-placeholder="Type or paste text and image here. Move handle (crosshair) to resize fields. Long tap field to format and delete image. Tap handle to save and load collage. Long tap handle to level up."></div><img class="img-preview"></div>
<a href="index.html" class="handle" id="handle" draggable="false" onclick="return false;"><img src="handle.png" alt="Logo" draggable="false"></a>

</div>
<script>
const container = document.getElementById('app');
const handle = document.getElementById('handle');
const textareas = document.querySelectorAll('.editor');
const images = document.querySelectorAll('.img-preview');
let isDragging = false;
let dragStartTime = 0;
let db;
const dbRequest = indexedDB.open("QuadEditorDB", 3);
dbRequest.onupgradeneeded = e => {
db = e.target.result;
if(!db.objectStoreNames.contains("texts")) db.createObjectStore("texts", { keyPath: "id" });
};
dbRequest.onsuccess = e => { db = e.target.result; loadData(); };

async function saveToDB(id, content, img = null, clearImg = false) {
return new Promise((resolve) => {
const tx = db.transaction("texts", "readwrite");
const store = tx.objectStore("texts");
const req = store.get(id);
req.onsuccess = () => {
const data = req.result || { id };
data.content = content;
if (clearImg) {
delete data.img;
} else if (img) {
data.img = img;
}
store.put(data);
tx.oncomplete = () => resolve();
};
});
}

function loadData() {
container.style.setProperty('--x', localStorage.getItem('q_x') || '50%');
container.style.setProperty('--y', localStorage.getItem('q_y') || '50%');
const defBgs = ['#000080', '#005f00', '#870000', '#ff8700']; 
const defColors = ['#FFD54F', '#E1BEE7', '#81C784', '#000000']; 
textareas.forEach((ta, i) => {
const tx = db.transaction("texts", "readonly");
const req = tx.objectStore("texts").get(i);
req.onsuccess = () => {
if (req.result) {
ta.innerHTML = req.result.content || '';
if (req.result.img) { images[i].src = req.result.img; images[i].style.display = 'block'; }
else { images[i].removeAttribute('src'); images[i].style.display = 'none'; }
} else {
ta.innerHTML = '';
images[i].removeAttribute('src');
images[i].style.display = 'none';
}
};
ta.style.fontSize = localStorage.getItem(`q_s_${i}`) || '18px';
ta.style.setProperty('--bg', localStorage.getItem(`q_b_${i}`) || defBgs[i]);
ta.style.setProperty('--color', localStorage.getItem(`q_c_${i}`) || defColors[i]);
});
}

// Функция сохранения всего коллажа в список
function saveCollage(name) {
const tx = db.transaction("texts", "readonly");
const store = tx.objectStore("texts");
const items = [];
let count = 0;
for(let i=0; i<4; i++) {
const req = store.get(i);
req.onsuccess = () => {
items[i] = req.result || { id: i, content: '' };
count++;
if(count === 4) {
const collages = JSON.parse(localStorage.getItem('q_collages') || '{}');
collages[name] = items;
localStorage.setItem('q_collages', JSON.stringify(collages));
alert(`Collage "${name}" saved!`);
}
};
}
}

// Функция загрузки коллажа из списка
function loadCollage(name) {
const collages = JSON.parse(localStorage.getItem('q_collages') || '{}');
const collage = collages[name];
if (!collage) return;
const tx = db.transaction("texts", "readwrite");
const store = tx.objectStore("texts");
store.clear().onsuccess = () => {
collage.forEach(item => store.put(item));
tx.oncomplete = () => loadData();
};
}

let timer;

handle.addEventListener('pointerdown', (e) => {
isDragging = true;
dragStartTime = Date.now();
timer = setTimeout(() => {
if (isDragging) {
isDragging = false;
window.location.href = "index.html";
}
}, 5000);
});

window.addEventListener('pointermove', (e) => {
if (!isDragging) return;
const touch = e.touches ? e.touches[0] : e;
const padding = 10;
const rawX = (touch.clientX / window.innerWidth) * 100;
const rawY = (touch.clientY / window.innerHeight) * 100;
const clampedX = Math.max(padding, Math.min(100 - padding, rawX));
const clampedY = Math.max(padding, Math.min(100 - padding, rawY));
const x = `${clampedX}%`;
const y = `${clampedY}%`;
container.style.setProperty('--x', x);
container.style.setProperty('--y', y);
localStorage.setItem('q_x', x);
localStorage.setItem('q_y', y);
});

window.addEventListener('pointerup', (e) => {
clearTimeout(timer);
if (!isDragging) return;
const duration = Date.now() - dragStartTime;
isDragging = false;

if (duration < 250) {
const collages = JSON.parse(localStorage.getItem('q_collages') || '{}');
const list = Object.keys(collages).join('\n');
const msg = list ? `Enter name to SAVE current collage.\nOr leave empty to LOAD from list:\n\n${list}` : `Enter name to SAVE current collage:`;
const res = prompt(msg);

if (res === null) return; 

const name = res.trim();
if (name !== '') {
saveCollage(name);
} else if (list) {
const loadName = prompt(`Enter name to LOAD:\n\n${list}`);
if (loadName && collages[loadName.trim()]) {
loadCollage(loadName.trim());
} else if (loadName) {
alert('Collage not found!');
}
}
}
});


handle.addEventListener('touchstart', (e) => {
if (e.cancelable) e.preventDefault();
}, { passive: false });
handle.addEventListener('click', (e) => e.preventDefault());
handle.addEventListener('contextmenu', (e) => e.preventDefault());

function handleImageFile(file, index, ta) {
const reader = new FileReader();
reader.onload = (ev) => {
images[index].src = ev.target.result;
images[index].style.display = 'block';
saveToDB(index, ta.innerHTML, ev.target.result);
};
reader.readAsDataURL(file);
}

textareas.forEach((ta, i) => {
ta.addEventListener('input', () => {
if (ta.textContent.trim() === '' && !ta.querySelector('img')) {
ta.innerHTML = '';
}
saveToDB(i, ta.innerHTML);
});

ta.addEventListener('paste', (e) => {
e.preventDefault();
const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
if (item) {
handleImageFile(item.getAsFile(), i, ta);
} else {
const text = e.clipboardData.getData('text/plain');
document.execCommand('insertText', false, text);
}
});

ta.addEventListener('dragover', (e) => {
e.preventDefault();
});

ta.addEventListener('drop', (e) => {
e.preventDefault();
if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
const file = Array.from(e.dataTransfer.files).find(x => x.type.indexOf('image') !== -1);
if (file) {
handleImageFile(file, i, ta);
}
} else {
const item = Array.from(e.dataTransfer.items).find(x => x.type.indexOf('image') !== -1);
if (item) {
handleImageFile(item.getAsFile(), i, ta);
}
}
});

let timer;
const startLongPress = (e) => {
timer = setTimeout(() => {
ta.blur();
const s = prompt("Size:", ta.style.fontSize);
if (s) { ta.style.fontSize = s; localStorage.setItem(`q_s_${i}`, s); }
const b = prompt("Background:", ta.style.getPropertyValue('--bg'));
if (b) { ta.style.setProperty('--bg', b); localStorage.setItem(`q_b_${i}`, b); }
const c = prompt("Color:", ta.style.getPropertyValue('--color'));
if (c) { ta.style.setProperty('--color', c); localStorage.setItem(`q_c_${i}`, c); }

if (images[i].style.display === 'block') {
const delImg = prompt("Delete image? (yes/no):", "no");
if (delImg && delImg.toLowerCase() === 'yes') {
images[i].removeAttribute('src');
images[i].style.display = 'none';
saveToDB(i, ta.innerHTML, null, true);
}
}
}, 5000);
};
const stopLongPress = () => clearTimeout(timer);
ta.addEventListener('touchstart', startLongPress);
ta.addEventListener('touchend', stopLongPress);
ta.addEventListener('mousedown', startLongPress);
ta.addEventListener('mouseup', stopLongPress);
ta.addEventListener('mouseleave', stopLongPress);
});
</script>
</body>
</html>
