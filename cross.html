<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest-cross.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<title>Cross Editor</title>

<style>
body, html {
margin: 0;
padding: 0;
height: 100dvh;
width: 100vw;
overflow: hidden;
background: #000;
touch-action: none;
-webkit-tap-highlight-color: transparent;
}
.container {
display: grid;
grid-template-columns: var(--x) 1fr;
grid-template-rows: var(--y) 1fr;
height: 100%;
width: 100%;
}
.editor-wrapper {
position: relative;
width: 100%;
height: 100%;
overflow: hidden;
}

.editor {
width: 100%;
height: 100%;
background: var(--bg, #111);
color: var(--color, #eee);
box-sizing: border-box;
padding: 15px;
font-size: 18px;
outline: none;
touch-action: auto;
-webkit-user-select: text;
user-select: text;
-webkit-touch-callout: default;
overflow-y: auto;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Copperplate, Roboto, Helvetica, Arial, sans-serif;
white-space: pre-wrap;
}

#t3 {
font-weight: bold;
}

.editor:empty::before {
content: attr(data-placeholder);
pointer-events: none;
display: block;
white-space: pre-wrap;
}

.img-preview {
position: absolute;
bottom: 10px;
right: 10px;
max-width: 30%;
max-height: 30%;
border-radius: 4px;
pointer-events: none;
display: none;
opacity: 0.7;
}
.handle {
position: absolute;
top: var(--y);
left: var(--x);
width: 32px;
height: 32px;
transform: translate(-50%, -50%);
z-index: 100;
touch-action: none;
cursor: pointer;
-webkit-user-select: none;
user-select: none;
-webkit-touch-callout: none;
}

.handle img {
width: 100%;
height: 100%;
object-fit: contain;
pointer-events: none;
-webkit-user-drag: none;
}

/* Оформление модального окна Help */
dialog {
border: none;
border-radius: 8px;
padding: 20px;
background: #1e1e24;
color: #fff;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
font-size: 16px;
line-height: 1.5;
max-width: 85vw;
box-shadow: 0 4px 20px rgba(0,0,0,0.5);
outline: none;
}
dialog::backdrop {
background: rgba(0, 0, 0, 0.7);
-webkit-backdrop-filter: blur(3px);
backdrop-filter: blur(3px);
}
dialog p {
margin: 0 0 12px 0;
white-space: pre-wrap;
}
dialog a {
color: #38bdf8;
text-decoration: underline;
}
dialog button {
background: #334155;
color: #fff;
border: none;
padding: 8px 16px;
border-radius: 4px;
cursor: pointer;
font-size: 14px;
float: right;
margin-top: 5px;
}
dialog button:active {
background: #475569;
}
</style>
</head>
<body>
<div class="container" id="app" style="--x: 50%; --y: 50%;">
<div class="editor-wrapper"><div class="editor" id="t0" contenteditable="true" data-placeholder="Type or paste text and image here. &#10;Move Handle (crosshair) to resize fields. &#10;Tap Handle to change design. &#10;Long tap Handle to level up. &#10;Long-long tap Field to format and delete image."></div><img class="img-preview"></div>
<div class="editor-wrapper"><div class="editor" id="t1" contenteditable="true" data-placeholder="Type or paste text and image here. &#10;Move Handle (crosshair) to resize fields. &#10;Tap Handle to change design. &#10;Long tap Handle to level up. &#10;Long-long tap Field to format and delete image."></div><img class="img-preview"></div>
<div class="editor-wrapper"><div class="editor" id="t2" contenteditable="true" data-placeholder="Type or paste text and image here. &#10;Move Handle (crosshair) to resize fields. &#10;Tap Handle to change design. &#10;Long tap Handle to level up. &#10;Long-long tap Field to format and delete image."></div><img class="img-preview"></div>
<div class="editor-wrapper"><div class="editor" id="t3" contenteditable="true" data-placeholder="AI improvisation will appear here based on the other fields..."></div><img class="img-preview"></div>
<a href="#" class="handle" id="handle" draggable="false" onclick="return false;"><img src="handle.png" alt="Logo" draggable="false"></a>
</div>

<dialog id="helpDialog">
<p>Type or paste text and image here.
Move Handle (crosshair) to resize fields.
Tap Handle to change design.
Long tap Handle to level up.
Long-long tap Field to format and delete image.

Explore more at <a href="https://eqlectika.github.io" target="_blank" rel="noopener">eqlectika.github.io</a></p>
<button onclick="document.getElementById('helpDialog').close()">Close</button>
</dialog>

<script>
const container = document.getElementById('app');
const handle = document.getElementById('handle');
const textareas = document.querySelectorAll('.editor');
const images = document.querySelectorAll('.img-preview');
const helpDialog = document.getElementById('helpDialog');
let isDragging = false;
let dragStartTime = 0;
let db;

const dbRequest = indexedDB.open("QuadEditorDB", 3);
dbRequest.onupgradeneeded = e => {
db = e.target.result;
if(!db.objectStoreNames.contains("texts")) db.createObjectStore("texts", { keyPath: "id" });
};
dbRequest.onsuccess = e => { db = e.target.result; loadData(); };

async function saveToDB(id, content, img = null, clearImg = false) {
return new Promise((resolve) => {
const tx = db.transaction("texts", "readwrite");
const store = tx.objectStore("texts");
const req = store.get(id);
req.onsuccess = () => {
const data = req.result || { id };
data.content = content;
if (clearImg) {
delete data.img;
} else if (img) {
data.img = img;
}
store.put(data);
tx.oncomplete = () => resolve();
};
});
}

function loadData() {
container.style.setProperty('--x', localStorage.getItem('q_x') || '50%');
container.style.setProperty('--y', localStorage.getItem('q_y') || '50%');
const defBgs = ['#000080', '#005f00', '#870000', '#ff8700']; 
const defColors = ['#FFD54F', '#E1BEE7', '#81C784', '#000000']; 
textareas.forEach((ta, i) => {
const tx = db.transaction("texts", "readonly");
const req = tx.objectStore("texts").get(i);
req.onsuccess = () => {
if (req.result) {
ta.innerHTML = req.result.content || '';
if (req.result.img) { images[i].src = req.result.img; images[i].style.display = 'block'; }
else { images[i].removeAttribute('src'); images[i].style.display = 'none'; }
} else {
ta.innerHTML = '';
images[i].removeAttribute('src');
images[i].style.display = 'none';
}
};
ta.style.fontSize = localStorage.getItem(`q_s_${i}`) || '18px';
ta.style.setProperty('--bg', localStorage.getItem(`q_b_${i}`) || defBgs[i]);
ta.style.setProperty('--color', localStorage.getItem(`q_c_${i}`) || defColors[i]);
});
}

function saveCollage(name) {
const tx = db.transaction("texts", "readonly");
const store = tx.objectStore("texts");
const items = [];
let count = 0;
for(let i=0; i<4; i++) {
const req = store.get(i);
req.onsuccess = () => {
items[i] = req.result || { id: i, content: '' };
count++;
if(count === 4) {
const collages = JSON.parse(localStorage.getItem('q_collages') || '{}');
collages[name] = items;
localStorage.setItem('q_collages', JSON.stringify(collages));
alert(`Collage "${name}" saved!`);
}
};
}
}

function loadCollage(name) {
const collages = JSON.parse(localStorage.getItem('q_collages') || '{}');
const collage = collages[name];
if (!collage) return;
const tx = db.transaction("texts", "readwrite");
const store = tx.objectStore("texts");
store.clear().onsuccess = () => {
collage.forEach(item => store.put(item));
tx.oncomplete = () => loadData();
};
}

// Запрос ключа из локального хранилища или через prompt
function getGeminiApiKey() {
  let key = localStorage.getItem('q_gemini_key');
  if (!key) {
    key = prompt("Enter your Gemini API Key:");
    if (key) {
      localStorage.setItem('q_gemini_key', key.trim());
    }
  }
  return key;
}

async function runGeminiImprovisation() {
  const apiKey = getGeminiApiKey();
  if (!apiKey) return;

  const t0 = document.getElementById('t0').innerText.trim();
  const t1 = document.getElementById('t1').innerText.trim();
  const t2 = document.getElementById('t2').innerText.trim();
  const t3 = document.getElementById('t3');

  if (!t0 && !t1 && !t2) return;

  t3.innerHTML = "🤖 AI is thinking...";

  const promptText = `You are an AI build inside a 4-quadrant text editor. Analyze the contents of these 3 fields and write a witty, creative, or philosophical improvisation, synthesis, or conclusion in field 4. Keep it concise (1-3 sentences max). Speak strictly in English.
Field 1: "${t0 || '(empty)'}"
Field 2: "${t1 || '(empty)'}"
Field 3: "${t2 || '(empty)'}"
Output only the improvisation text directly, without any intro or markdown code blocks.`;

  try {
    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        contents: [{ parts: [{ text: promptText }] }]
      })
    });
    const data = await response.json();
    if (data.candidates && data.candidates[0].content.parts[0].text) {
      const aiText = data.candidates[0].content.parts[0].text.trim();
      t3.innerHTML = `🤖 ${aiText}`;
      saveToDB(3, t3.innerHTML);
    } else {
      t3.innerHTML = "🤖 Empty response from AI.";
    }
  } catch (err) {
    t3.innerHTML = "🤖 AI failed to improvisate. Long-press field to clear key.";
    console.error(err);
  }
}

let handleLongPressTimer;

handle.addEventListener('pointerdown', (e) => {
isDragging = true;
dragStartTime = Date.now();
handleLongPressTimer = setTimeout(() => {
if (isDragging) {
isDragging = false;
helpDialog.showModal();
}
}, 5000);
});

window.addEventListener('pointermove', (e) => {
if (!isDragging) return;
const touch = e.touches ? e.touches[0] : e;
const padding = 10;
const rawX = (touch.clientX / window.innerWidth) * 100;
const rawY = (touch.clientY / window.innerHeight) * 100;
const clampedX = Math.max(padding, Math.min(100 - padding, rawX));
const clampedY = Math.max(padding, Math.min(100 - padding, rawY));
const x = `${clampedX}%`;
const y = `${clampedY}%`;
container.style.setProperty('--x', x);
container.style.setProperty('--y', y);
localStorage.setItem('q_x', x);
localStorage.setItem('q_y', y);
});

window.addEventListener('pointerup', (e) => {
clearTimeout(handleLongPressTimer);
if (!isDragging) return;
const duration = Date.now() - dragStartTime;
isDragging = false;

if (duration < 250) {
const collages = JSON.parse(localStorage.getItem('q_collages') || '{}');
const list = Object.keys(collages).join('\n');
const msg = list ? `Enter name to SAVE current collage.\nOr leave empty to LOAD from list:\n\n${list}` : `Enter name to SAVE current collage:`;
const res = prompt(msg);

if (res === null) return; 

const name = res.trim();
if (name !== '') {
saveCollage(name);
} else if (list) {
const loadName = prompt(`Enter name to LOAD:\n\n${list}`);
if (loadName && collages[loadName.trim()]) {
loadCollage(loadName.trim());
} else if (loadName) {
alert('Collage not found!');
}
}
runGeminiImprovisation();
}
});

handle.addEventListener('touchstart', (e) => {
if (e.cancelable) e.preventDefault();
}, { passive: false });
handle.addEventListener('click', (e) => e.preventDefault());
handle.addEventListener('contextmenu', (e) => e.preventDefault());

function handleImageFile(file, index, ta) {
const reader = new FileReader();
reader.onload = (ev) => {
images[index].src = ev.target.result;
images[index].style.display = 'block';
saveToDB(index, ta.innerHTML, ev.target.result);
};
reader.readAsDataURL(file);
}

textareas.forEach((ta, i) => {
ta.addEventListener('input', () => {
if (ta.textContent.trim() === '' && !ta.querySelector('img')) {
ta.innerHTML = '';
}
saveToDB(i, ta.innerHTML);
});

ta.addEventListener('paste', (e) => {
e.preventDefault();
const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
if (item) {
handleImageFile(item.getAsFile(), i, ta);
} else {
const text = e.clipboardData.getData('text/plain');
document.execCommand('insertText', false, text);
}
});

ta.addEventListener('dragover', (e) => { e.preventDefault(); });

ta.addEventListener('drop', (e) => {
e.preventDefault();
if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
const file = Array.from(e.dataTransfer.files).find(x => x.type.indexOf('image') !== -1);
if (file) { handleImageFile(file, i, ta); }
} else {
const item = Array.from(e.dataTransfer.items).find(x => x.type.indexOf('image') !== -1);
if (item) { handleImageFile(item.getAsFile(), i, ta); }
}
});

let textareaLongPressTimer;
const startLongPress = (e) => {
textareaLongPressTimer = setTimeout(() => {
ta.blur();
if (i === 3) {
  const updateKey = prompt("Update or clear Gemini API Key:", localStorage.getItem('q_gemini_key') || '');
  if (updateKey !== null) localStorage.setItem('q_gemini_key', updateKey.trim());
}

const s = prompt("Size:", ta.style.fontSize);
if (s) { ta.style.fontSize = s; localStorage.setItem(`q_s_${i}`, s); }
const b = prompt("Background:", ta.style.getPropertyValue('--bg'));
if (b) { ta.style.setProperty('--bg', b); localStorage.setItem(`q_b_${i}`, b); }
const c = prompt("Color:", ta.style.getPropertyValue('--color'));
if (c) { ta.style.setProperty('--color', c); localStorage.setItem(`q_c_${i}`, c); }

if (images[i].style.display === 'block') {
const delImg = prompt("Delete image? (yes/no):", "no");
if (delImg && delImg.toLowerCase() === 'yes') {
images[i].removeAttribute('src');
images[i].style.display = 'none';
saveToDB(i, ta.innerHTML, null, true);
}
}
}, 5000);
};
const stopLongPress = () => clearTimeout(textareaLongPressTimer);
ta.addEventListener('touchstart', startLongPress);
ta.addEventListener('touchend', stopLongPress);
ta.addEventListener('mousedown', startLongPress);
ta.addEventListener('mouseup', stopLongPress);
ta.addEventListener('mouseleave', stopLongPress);
});
</script>
</body>
</html>
