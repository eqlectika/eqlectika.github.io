<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Swift-Style Cross Editor</title>
    <link rel="manifest" href="manifest-cross.json">
        <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100dvh; width: 100vw; overflow: hidden; background: #000; touch-action: none; -webkit-tap-highlight-color: transparent; }
        
        /* Архитектурная сетка, управляемая через CSS-переменные */
        .container { 
            display: grid; 
            grid-template-columns: var(--x, 50%) 1fr; 
            grid-template-rows: var(--y, 50%) 1fr; 
            height: 100%; 
            width: 100%; 
        }
        .editor-wrapper { position: relative; width: 100%; height: 100%; overflow: hidden; }
        
        /* Лингвистический дизайн полей ввода */
        .editor { 
            width: 100%; 
            height: 100%; 
            border: 0.5px solid #222; 
            background: var(--bg, #111); 
            color: var(--color, #eee); 
            box-sizing: border-box; 
            padding: 15px; 
            font-size: 20px; 
            outline: none; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;


            overflow-y: auto;
            transition: background 0.5s ease, transform 0.2s ease;
        }

        
        /* Эффектный фокус в стиле декларативных интерфейсов */
        .editor:focus { 
            box-shadow: inset 0 0 25px rgba(255, 255, 255, 0.15); 
        }

        .handle { 
            position: absolute; 
            top: var(--y, 50%); 
            left: var(--x, 50%); 
            width: 28px; 
            height: 28px; 
            transform: translate(-50%, -50%); 
            z-index: 100; 
            cursor: pointer; 
            touch-action: none;
            filter: drop-shadow(2px 2px 18px rgba(0,0,0,0.8));
            transition: transform 0.1s ease;
        }
        .handle:active { transform: translate(-50%, -50%) scale(1.2); }
        .handle img { width: 100%; height: 100%; object-fit: contain; pointer-events: none; }
    </style>
</head>
<body>

    <div class="container" id="app" style="--x: 50%; --y: 50%;">
        <div class="editor-wrapper"><div class="editor" id="t0" contenteditable="true" style="--bg: #000080; --color: #FFD54F; font-size: 20px;"></div></div>
        <div class="editor-wrapper"><div class="editor" id="t1" contenteditable="true" style="--bg: #005f00; --color: #ffffff; font-size: 20px;"></div></div>
        <div class="editor-wrapper"><div class="editor" id="t2" contenteditable="true" style="--bg: #870000; --color: #ffffff; font-size: 20px;"></div></div>
        <div class="editor-wrapper"><div class="editor" id="t3" contenteditable="true" style="--bg: #ff8700; --color: #000000; font-size: 20px; font-weight: bold;"></div></div>

        <div class="handle" id="handle"><img src="handle.png" alt="Logo"></div>
    </div>

<script>

// Изолированное состояние системы
const State = {
    x: parseFloat(localStorage.getItem('q_x')) || 50,
    y: parseFloat(localStorage.getItem('q_y')) || 50,
    isDragging: false,
    hasMoved: false, // Флаг для определения перемещения
    
    render() {
        document.getElementById('app').style.setProperty('--x', `${this.x}%`);
        document.getElementById('app').style.setProperty('--y', `${this.y}%`);
    },
    
    save() {
        localStorage.setItem('q_x', this.x);
        localStorage.setItem('q_y', this.y);
    },

    // Метод для загрузки текста заметок
    loadNotes() {
        const editors = document.querySelectorAll('.editor');
        editors.forEach(editor => {
            const savedText = localStorage.getItem(`note_${editor.id}`);
            if (savedText !== null) {
                editor.innerHTML = savedText;
            }
        });
    }
};

const handle = document.getElementById('handle');

// Инициализация геометрии и загрузка сохраненного контента
State.render();
State.loadNotes();

// Управление поведением текстовых редакторов
document.querySelectorAll('.editor').forEach(editor => {
    // Автосохранение текста в localStorage при вводе
    editor.addEventListener('input', (e) => {
        localStorage.setItem(`note_${e.target.id}`, e.target.innerHTML);
    });

    // Перехват вставки для очистки форматирования (удаление чужих шрифтов, фонов и CSS-стилей)
    editor.addEventListener('paste', (e) => {
        e.preventDefault();
        const text = (e.originalEvent || e).clipboardData.getData('text/plain');
        document.execCommand('insertText', false, text);
        editor.dispatchEvent(new Event('input', { bubbles: true }));
    });
});

// Обработка начала взаимодействия
handle.addEventListener('pointerdown', (e) => {
    State.isDragging = true;
    State.hasMoved = false; // Сбрасываем при каждом новом нажатии
});

// Движение (изменение геометрии среды)
window.addEventListener('pointermove', (e) => {
    if (!State.isDragging) return;

    State.hasMoved = true; // Если было движение, это не простой клик

    const rawX = (e.clientX / window.innerWidth) * 100;
    const rawY = (e.clientY / window.innerHeight) * 100;

    State.x = Math.max(10, Math.min(90, rawX));
    State.y = Math.max(10, Math.min(90, rawY));

    State.render();
});

// Завершение взаимодействия
window.addEventListener('pointerup', () => {
    if (State.isDragging) {
        State.isDragging = false;
        State.save();
    }
});

// Переход по обычному клику, если не было перетаскивания
handle.addEventListener('click', (e) => {
    e.preventDefault();
    if (!State.hasMoved) {
        window.location.href = 'index.html';
    }
});

window.addEventListener('dragstart', (e) => e.preventDefault());

</script>

</body>
</html>
