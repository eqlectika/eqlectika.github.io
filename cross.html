<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest-cross.json">
<title>Cross Editor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Ubuntu:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/luckiest-guy" rel="stylesheet">

<style>
body, html {
margin: 0;
padding: 0;
height: 100dvh;
width: 100vw;
overflow: hidden;
background: #000;
touch-action: none;
}
.container {
display: grid;
grid-template-columns: var(--x) 1fr;
grid-template-rows: var(--y) 1fr;
height: 100%;
width: 100%;
}
.editor-wrapper {
position: relative;
width: 100%;
height: 100%;
overflow: hidden;
}
textarea {
width: 100%;
height: 100%;
border: 0.5px solid #333;
background: var(--bg, #111);
color: var(--color, #eee);
resize: none;
box-sizing: border-box;
padding: 15px;
font-size: 18px;
outline: none;
touch-action: auto;
font-family: var(--font, sans-serif);
}
.img-preview {
position: absolute;
bottom: 10px;
right: 10px;
max-width: 30%;
max-height: 30%;
border-radius: 4px;
pointer-events: none;
display: none;
opacity: 0.7;
}
.handle {
position: absolute;
top: var(--y);
left: var(--x);
width: 34px;
height: 34px;
transform: translate(-50%, -50%);
z-index: 100;
filter: drop-shadow(0 4px 4px rgba(0, 0, 0, 0.5));
touch-action: none;
cursor: pointer;
-webkit-user-select: none;
user-select: none;
-webkit-touch-callout: none; /* Отключает превью и контекстное меню в iOS */
}

.handle img {
width: 100%;
height: 100%;
object-fit: contain;
pointer-events: none;
-webkit-user-drag: none;
}

</style>
</head>
<body>
<div class="container" id="app" style="--x: 50%; --y: 50%;">
<div class="editor-wrapper"><textarea id="t0" placeholder="
    Type or paste text and hold to change font, background, or color. 
    Move the butterfly to resize the fields. 
    Short tap to donate or hold to visit my home site."></textarea><img id="i0" class="img-preview"></div>
<div class="editor-wrapper"><textarea id="t1" placeholder="
    Type or paste text and hold to change font, background, or color. 
    Move the butterfly to resize the fields. 
    Short tap to donate or hold to visit my home site."></textarea><img id="i0" class="img-preview"></div>
<div class="editor-wrapper"><textarea id="t2" placeholder="
    Type or paste text and hold to change font, background, or color. 
    Move the butterfly to resize the fields. 
    Short tap to donate or hold to visit my home site."></textarea><img id="i0" class="img-preview"></div>
<div class="editor-wrapper"><textarea id="t3" placeholder="
    Type or paste text and hold to change font, background, or color. 
    Move the butterfly to resize the fields. 
    Short tap to donate or hold to visit my home site."></textarea><img id="i0" class="img-preview"></div>
<a href="index.html" class="handle" id="handle" draggable="false" onclick="return false;"><img src="logo.png" alt="Logo" draggable="false"></a>

</div>
<script>
const container = document.getElementById('app');
const handle = document.getElementById('handle');
const textareas = document.querySelectorAll('textarea');
const images = document.querySelectorAll('.img-preview');
let isDragging = false;
let dragStartTime = 0;
let holdTimer;
let isLongPress = false;
let db;
const dbRequest = indexedDB.open("QuadEditorDB", 3);
dbRequest.onupgradeneeded = e => {
db = e.target.result;
if(!db.objectStoreNames.contains("texts")) db.createObjectStore("texts", { keyPath: "id" });
};
dbRequest.onsuccess = e => { db = e.target.result; loadData(); };
async function saveToDB(id, content, img = null) {
const tx = db.transaction("texts", "readwrite");
const store = tx.objectStore("texts");
const req = store.get(id);
req.onsuccess = () => {
const data = req.result || { id };
data.content = content;
if (img) data.img = img;
store.put(data);
};
}
function loadData() {
container.style.setProperty('--x', localStorage.getItem('q_x') || '50%');
container.style.setProperty('--y', localStorage.getItem('q_y') || '50%');
const defFonts = ['Menlo', 'Copperplate', 'DIN Alternate', 'Luckiest Guy'];
const defBgs = ['#000080', '#005f00', '#870000', '#ff8700']; 
const defColors = ['#FFD54F', '#E1BEE7', '#81C784', '#000000']; 
textareas.forEach((ta, i) => {
const tx = db.transaction("texts", "readonly");
const req = tx.objectStore("texts").get(i);
req.onsuccess = () => {
if (req.result) {
ta.value = req.result.content || '';
if (req.result.img) { images[i].src = req.result.img; images[i].style.display = 'block'; }
}
};
ta.style.setProperty('--font', localStorage.getItem(`q_f_${i}`) || defFonts[i]);
ta.style.setProperty('--bg', localStorage.getItem(`q_b_${i}`) || defBgs[i]);
ta.style.setProperty('--color', localStorage.getItem(`q_c_${i}`) || defColors[i]);
});
}
handle.addEventListener('pointerdown', (e) => {
isDragging = true;
isLongPress = false;
dragStartTime = Date.now();
holdTimer = setTimeout(() => {
if (isDragging) {
isLongPress = true;
window.location.href = 'index.html';
}
}, 2100);
});
window.addEventListener('pointermove', (e) => {
if (!isDragging) return;
const touch = e.touches ? e.touches[0] : e;
const padding = 10;
const rawX = (touch.clientX / window.innerWidth) * 100;
const rawY = (touch.clientY / window.innerHeight) * 100;
const clampedX = Math.max(padding, Math.min(100 - padding, rawX));
const clampedY = Math.max(padding, Math.min(100 - padding, rawY));
const x = `${clampedX}%`;
const y = `${clampedY}%`;
container.style.setProperty('--x', x);
container.style.setProperty('--y', y);
localStorage.setItem('q_x', x);
localStorage.setItem('q_y', y);
clearTimeout(holdTimer);
});

window.addEventListener('pointerup', (e) => {
clearTimeout(holdTimer);
if (!isDragging) return;
const duration = Date.now() - dragStartTime;
if (duration < 250 && !isLongPress) {
navigator.clipboard.writeText('0xF5367CF8187Ab1C405c495dC05fCa0434d76c1B8').then(() => {
alert('Address ETH (ERC20) is copied to donate. Thank you.');
});
}
isDragging = false;
});
handle.addEventListener('touchstart', (e) => {
if (e.cancelable) e.preventDefault();
}, { passive: false });
handle.addEventListener('click', (e) => e.preventDefault());
handle.addEventListener('contextmenu', (e) => e.preventDefault());
textareas.forEach((ta, i) => {
ta.addEventListener('input', () => saveToDB(i, ta.value));
ta.addEventListener('paste', (e) => {
const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
if (item) {
const reader = new FileReader();
reader.onload = (ev) => {
images[i].src = ev.target.result;
images[i].style.display = 'block';
saveToDB(i, ta.value, ev.target.result);
};
reader.readAsDataURL(item.getAsFile());
}
});
let timer;
ta.addEventListener('touchstart', () => {
timer = setTimeout(() => {
const f = prompt("Font:", ta.style.getPropertyValue('--font'));
if (f) { ta.style.setProperty('--font', f); localStorage.setItem(`q_f_${i}`, f); }
const b = prompt("Background:", ta.style.getPropertyValue('--bg'));
if (b) { ta.style.setProperty('--bg', b); localStorage.setItem(`q_b_${i}`, b); }
const c = prompt("Color:", ta.style.getPropertyValue('--color'));
if (c) { ta.style.setProperty('--color', c); localStorage.setItem(`q_c_${i}`, c); }
}, 1800);
});
ta.addEventListener('touchend', () => clearTimeout(timer));
});
if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');

</script>
</body>
</html>
