<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<link rel="manifest" href="manifest-cross.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
<title>Cross Editor</title>

<style>
body, html {
margin: 0;
padding: 0;
height: 100dvh;
width: 100vw;
overflow: hidden;
background: #000;
touch-action: none;
-webkit-tap-highlight-color: transparent;
}
.container {
display: grid;
grid-template-columns: var(--x, 50%) 1fr;
grid-template-rows: var(--y, 50%) 1fr;
height: 100%;
width: 100%;
}
.editor-wrapper {
position: relative;
width: 100%;
height: 100%;
overflow: hidden;
}

/* Дефолтные стили: теперь t0 жирный (синтез), а t3 обычный */
#t0 { 
  --default-bg: #ff8700; 
  --default-color: #000000; 
}
#t1 { --default-bg: #005f00; --default-color: #E1BEE7; }
#t2 { --default-bg: #870000; --default-color: #81C784; }
#t3 { --default-bg: #000080; --default-color: #FFD54F; }

.editor {
width: 100%;
height: 100%;
background: var(--bg, var(--default-bg));
color: var(--color, var(--default-color));
box-sizing: border-box;
padding: 15px;
font-size: 18px;
outline: none;
touch-action: auto;
-webkit-user-select: text;
user-select: text;
-webkit-touch-callout: default;
overflow-y: auto;
font-family: var(--fn, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif);
white-space: pre-wrap;
}

.editor:empty::before {
content: attr(data-placeholder);
pointer-events: none;
display: block;
white-space: pre-wrap;
}

.img-preview {
  position: absolute;
  max-width: 30%;
  max-height: 30%;
  border-radius: 4px;
  pointer-events: none;
  display: none;
  opacity: 0.7;
}


.handle {
position: absolute;
top: var(--y, 50%);
left: var(--x, 50%);
width: 32px;
height: 32px;
transform: translate(-50%, -50%) scale(1);
z-index: 100;
touch-action: none;
cursor: pointer;
-webkit-user-select: none;
user-select: none;
-webkit-touch-callout: none;
display: flex;
align-items: center;
justify-content: center;
transition: transform 0.1s ease, filter 0.3s ease;
}

.handle:active {
transform: translate(-50%, -50%) scale(0.85);
}

.handle img {
width: 100%;
height: 100%;
object-fit: contain;
pointer-events: none;
-webkit-user-drag: none;
transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

</style>
</head>
<body>
<div class="container" id="app">
<div class="editor-wrapper"><div class="editor" id="t0" contenteditable="true" data-placeholder="1. Type or paste text and image here. &#10;2. Move Handle (crosshair) to resize Fields. &#10;3. Tap Handle to change design. &#10;4. Very long tap Field to format and delete image. &#10;5. Long tap Handle to level up."></div><img class="img-preview"></div>
<div class="editor-wrapper"><div class="editor" id="t1" contenteditable="true" data-placeholder="1. Type or paste text and image here. &#10;2. Move Handle (crosshair) to resize Fields. &#10;3. Tap Handle to change design. &#10;4. Very long tap Field to format and delete image. &#10;5. Long tap Handle to level up."></div><img class="img-preview"></div>
<div class="editor-wrapper"><div class="editor" id="t2" contenteditable="true" data-placeholder="1. Type or paste text and image here. &#10;2. Move Handle (crosshair) to resize Fields. &#10;3. Tap Handle to change design. &#10;4. Very long tap Field to format and delete image. &#10;5. Long tap Handle to level up."></div><img class="img-preview"></div>
<div class="editor-wrapper"><div class="editor" id="t3" contenteditable="true" data-placeholder="1. Type or paste text and image here. &#10;2. Move Handle (crosshair) to resize Fields. &#10;3. Tap Handle to change design. &#10;4. Very long tap Field to format and delete image. &#10;5. Long tap Handle to level up."></div><img class="img-preview"></div>
<a href="#" class="handle" id="handle" draggable="false"><img src="handle.png" alt="Logo" draggable="false"></a>
</div>

<script>
const container = document.getElementById('app');
const handle = document.getElementById('handle');
const textareas = document.querySelectorAll('.editor');
const images = document.querySelectorAll('.img-preview');

let isDragging = false;
let dragStartTime = 0;
let db;

const designs = ['handle.png', 'handle-black.png', 'logo.png' ];
let currentDesign = parseInt(localStorage.getItem('q_handle_design') || '0');

const fontsPool = [
  '"Luckiest Guy", Arial, sans-serif',
  'Copperplate, "Copperplate Gothic Bold", sans-serif',
  '"American Typewriter", Courier, monospace',
  '-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif'
];

const defBgs = ['#ff8700', '#005f00', '#870000', '#000080']; 
const defColors = ['#000000', '#E1BEE7', '#81C784', '#FFD54F']; 

const magicPalettes = [
  { bg: defBgs, co: defColors },
  { bg: ['#2b2d42', '#8d99ae', '#edf2f4', '#ef233c'], co: ['#fff', '#000', '#000', '#fff'] },
  { bg: ['#1a5b8c', '#143d59', '#f4b41a', '#fbcbc9'], co: ['#fff', '#fff', '#000', '#000'] },
  { bg: ['#0f172a', '#1e293b', '#334155', '#475569'], co: ['#38bdf8', '#818cf8', '#fb7185', '#34d399'] },
  { bg: ['#111111', '#222222', '#333333', '#444444'], co: ['#eee', '#eee', '#eee', '#eee'] },
  { bg: ['#ffccd5', '#ffb3c1', '#ff8fa3', '#ff758f'], co: ['#590d22', '#590d22', '#fff', '#fff'] },
  { bg: ['#e2efe0', '#bccbaf', '#96a788', '#708264'], co: ['#283618', '#283618', '#fefae0', '#fefae0'] }
];

const dbRequest = indexedDB.open("QuadEditorDB", 3);
dbRequest.onupgradeneeded = e => {
db = e.target.result;
if(!db.objectStoreNames.contains("texts")) db.createObjectStore("texts", { keyPath: "id" });
};
dbRequest.onsuccess = e => { db = e.target.result; loadData(); };

async function saveToDB(id, content, img = null, clearImg = false) {
return new Promise((resolve) => {
const tx = db.transaction("texts", "readwrite");
const store = tx.objectStore("texts");
const req = store.get(id); 
req.onsuccess = () => {
const data = req.result || { id };
data.content = content;
if (clearImg) {
delete data.img;
} else if (img) { 
data.img = img; 
}
store.put(data);
tx.oncomplete = () => resolve();
};
});
}

function updateHandleImage(index) {
  const imgEl = handle.querySelector('img');
  imgEl.src = designs[index];
  if (index === 3) {
    imgEl.style.transform = 'rotate(0deg)';
  }
}

function loadData() {
  container.style.setProperty('--x', localStorage.getItem('q_x') || '50%');
  container.style.setProperty('--y', localStorage.getItem('q_y') || '50%');
  updateHandleImage(currentDesign);

  // Настройка координат для каждого t0-t3
// ... внутри loadData()
const imgPositions = [
  { top: 'auto', bottom: '10px', left: 'auto', right: '10px' }, // t0
  { top: 'auto', bottom: '10px', left: '10px', right: 'auto' }, // t1
  { top: '10px', bottom: 'auto', left: 'auto', right: '10px' }, // t2
  { top: '10px', bottom: 'auto', left: '10px', right: 'auto' }  // t3
];

textareas.forEach((ta, i) => {
  const pos = imgPositions[i];
  const img = images[i];
  
  img.style.top = pos.top;
  img.style.bottom = pos.bottom;
  img.style.left = pos.left;
  img.style.right = pos.right;

    // Дальше ваш код загрузки стилей
    if (localStorage.getItem(`q_b_${i}`)) {
      ta.style.setProperty('--bg', localStorage.getItem(`q_b_${i}`));
      ta.style.setProperty('--color', localStorage.getItem(`q_c_${i}`));
    }
    if (localStorage.getItem(`q_f_${i}`)) {
      ta.style.setProperty('--fn', localStorage.getItem(`q_f_${i}`));
    }
    ta.style.fontSize = localStorage.getItem(`q_s_${i}`) || '18px';

    const tx = db.transaction("texts", "readonly");
    const req = tx.objectStore("texts").get(i);
    req.onsuccess = () => {
      if (req.result) {
        ta.innerHTML = req.result.content || '';
        if (req.result.img) { images[i].src = req.result.img; images[i].style.display = 'block'; }
        else { images[i].removeAttribute('src'); images[i].style.display = 'none'; }
      }
    };
  });
}

let handleLongPressTimer; 
let startX = 0, startY = 0;

handle.addEventListener('pointerdown', (e) => {
  isDragging = true;
  dragStartTime = Date.now();
  const touch = e.touches ? e.touches[0] : e;
  startX = touch.clientX;
  startY = touch.clientY;

  handleLongPressTimer = setTimeout(() => {
    if (isDragging) {
      isDragging = false;
window.location.href = 'index.html'

    }
  }, 1000);
});

window.addEventListener('pointermove', (e) => {
  if (!isDragging) return;
  const touch = e.touches ? e.touches[0] : e;
  
  const moveX = Math.abs(touch.clientX - startX);
  const moveY = Math.abs(touch.clientY - startY);
  
  if (moveX > 5 || moveY > 5) {
    clearTimeout(handleLongPressTimer);
  }

  const padding = 10;
  const rawX = (touch.clientX / window.innerWidth) * 100;
  const rawY = (touch.clientY / window.innerHeight) * 100;
  const clampedX = Math.max(padding, Math.min(100 - padding, rawX));
  const clampedY = Math.max(padding, Math.min(100 - padding, rawY));
  const x = `${clampedX}%`;
  const y = `${clampedY}%`;
  container.style.setProperty('--x', x);
  container.style.setProperty('--y', y);
  localStorage.setItem('q_x', x);
  localStorage.setItem('q_y', y);
});

window.addEventListener('pointerup', (e) => {
clearTimeout(handleLongPressTimer);
if (!isDragging) return;
const duration = Date.now() - dragStartTime;
isDragging = false;

if (duration < 250) {
  currentDesign = (currentDesign + 1) % designs.length;
  localStorage.setItem('q_handle_design', currentDesign);
  updateHandleImage(currentDesign);

  const randomHue = Math.floor(Math.random() * 360);
  
  if (currentDesign === 3) {
    handle.style.filter = `drop-shadow(0 4px 4px rgba(0,0,0,0.5)) drop-shadow(0 4px 4px rgba(255,255,255,0.3))`;
  } else {
    const randomDegrees = Math.floor(Math.random() * 4) * 90;
    handle.querySelector('img').style.transform = `rotate(${randomDegrees}deg)`;
    handle.style.filter = `hue-rotate(${randomHue}deg) drop-shadow(0 6px 6px rgba(255,255,255,0.4))`;
  }

  const palette = magicPalettes[Math.floor(Math.random() * magicPalettes.length)];
  
  textareas.forEach((ta, i) => {
    const randomFont = fontsPool[Math.floor(Math.random() * fontsPool.length)];
    ta.style.setProperty('--fn', randomFont);
    localStorage.setItem(`q_f_${i}`, randomFont);
    
    ta.style.setProperty('--bg', palette.bg[i]);
    ta.style.setProperty('--color', palette.co[i]);
    localStorage.setItem(`q_b_${i}`, palette.bg[i]);
    localStorage.setItem(`q_c_${i}`, palette.co[i]);
  });

}
});

handle.addEventListener('touchstart', (e) => {
if (e.cancelable) e.preventDefault();
}, { passive: false });

handle.addEventListener('click', (e) => e.preventDefault());
handle.addEventListener('contextmenu', (e) => e.preventDefault());

function handleImageFile(file, index, ta) {
const reader = new FileReader();
reader.onload = (ev) => {
images[index].src = ev.target.result;
images[index].style.display = 'block';
saveToDB(index, ta.innerHTML, ev.target.result);

};
reader.readAsDataURL(file);
}

textareas.forEach((ta, i) => {
ta.addEventListener('input', () => {
if (ta.textContent.trim() === '' && !ta.querySelector('img')) {
ta.innerHTML = '';
}
saveToDB(i, ta.innerHTML);


});

ta.addEventListener('paste', (e) => {
e.preventDefault();
const item = Array.from(e.clipboardData.items).find(x => x.type.indexOf('image') !== -1);
if (item) {
handleImageFile(item.getAsFile(), i, ta);
} else {
const text = e.clipboardData.getData('text/plain');
document.execCommand('insertText', false, text);

}
});

ta.addEventListener('dragover', (e) => { e.preventDefault(); });

ta.addEventListener('drop', (e) => {
e.preventDefault();
if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
const file = Array.from(e.dataTransfer.files).find(x => x.type.indexOf('image') !== -1);
if (file) { handleImageFile(file, i, ta); }
} else {
const item = Array.from(e.dataTransfer.items).find(x => x.type.indexOf('image') !== -1);
if (item) { handleImageFile(item.getAsFile(), i, ta); }
}
});

  let textareaLongPressTimer;
  
  const startLongPress = (e) => {
    const targetTa = e.currentTarget;
    textareaLongPressTimer = setTimeout(() => {
      targetTa.blur();

      const curFont = localStorage.getItem(`q_f_${i}`) || "sans-serif";
      const curBg = localStorage.getItem(`q_b_${i}`) || getComputedStyle(targetTa).getPropertyValue('--default-bg').trim();
      const curColor = localStorage.getItem(`q_c_${i}`) || getComputedStyle(targetTa).getPropertyValue('--default-color').trim();
      const curSize = localStorage.getItem(`q_s_${i}`) || "18px";

      const newFont = prompt("Font:", curFont);
      if (newFont !== null) {
        targetTa.style.setProperty('--fn', newFont);
        localStorage.setItem(`q_f_${i}`, newFont);
      }

      const s = prompt("Size:", curSize);
      if (s) { targetTa.style.fontSize = s; localStorage.setItem(`q_s_${i}`, s); }
      
      const b = prompt("Background color:", curBg);
      if (b) { targetTa.style.setProperty('--bg', b); localStorage.setItem(`q_b_${i}`, b); }
      
      const c = prompt("Font color:", curColor); 
      if (c) { targetTa.style.setProperty('--color', c); localStorage.setItem(`q_c_${i}`, c); }
      
      // ИСПРАВЛЕНО: параметры картинки показываются только если она существует
      if (images[i].style.display === 'block') {
        const currentPos = localStorage.getItem(`q_pos_${i}`) || "bottom right";
        const pos = prompt("Image position:", currentPos);
        if (pos) {
          localStorage.setItem(`q_pos_${i}`, pos);
          const [v, h] = pos.split(' ');
          images[i].style.top = v === 'top' ? '10px' : 'auto';
          images[i].style.bottom = v === 'bottom' ? '10px' : 'auto';
          images[i].style.left = h === 'left' ? '10px' : 'auto';
          images[i].style.right = h === 'right' ? '10px' : 'auto';
        }
        
        const delImg = prompt("Delete image?", "no");
        if (delImg && delImg.toLowerCase() === 'yes') {
          images[i].removeAttribute('src');
          images[i].style.display = 'none';
          localStorage.removeItem(`q_pos_${i}`);
          saveToDB(i, targetTa.innerHTML, null, true);

        }
      }
    }, 5000);
  };



  const stopLongPress = () => clearTimeout(textareaLongPressTimer);

  ta.addEventListener('touchstart', startLongPress);
  ta.addEventListener('touchend', stopLongPress);
  ta.addEventListener('mousedown', startLongPress);
  ta.addEventListener('mouseup', stopLongPress);
  ta.addEventListener('mouseleave', stopLongPress);
});


</script>
</body>
</html>
