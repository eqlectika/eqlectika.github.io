<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest-cube.json">
    <title>Visualized Semiotics + Bismuth Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body {
            user-select: none;
            margin: 0;
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            background: #000;
            touch-action: none;
        }
        .control-button, .top-control, {
            font-family: 'Luckiest Guy', cursive !important;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .control-button, .top-control {
            position: fixed;
            z-index: 1000;
            cursor: pointer;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9) !important;
            background: none;
            border: none;
            padding: 10px;
        }
        
        .control-button { bottom: 20px; }
        .fly-button-base { left: 50%; transform: translateX(-50%); }
        
        .top-control { top: 20px; }
        .mode-menu-container { position: fixed; top: 20px; left: 3%; z-index: 1000; }
        .structure-button { left: 50%; transform: translateX(-50%); }
        .wire-button { right: 3%; }

        .mode-menu { position: absolute; top: 100%; left: 0; margin-top: 10px; display: none; flex-direction: column; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 4px; }
        .mode-menu.show { display: flex; }
        .mode-menu-item { color: #fff; cursor: pointer; padding: 5px 10px; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="control-button fly-button-base" id="fly-btn">Fly</div> 

    <div class="top-control wire-button">Wire</div> 
    <div class="top-control structure-button">
        <a href="index.html" style="position: fixed; z-index: 1000; left: 50%; transform: translateX(-50%);">
        <img src="logo.png" alt="Logo" style="height: 40px; cursor: pointer;">
    </a>
    </div> 



    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let isScalingUp = false;
        let isScalingDown = false;
        let objectToScale = null;
        const SCALE_RATE = 1.03;
        const SCALE_RATE_DOWN = 0.97;
        const MIN_SCALE = 0.1;
        const MAX_SCALE = 500;

        let holdScaleTimer = null;
        const HOLD_SCALE_DELAY = 350; 
        const MOVE_THRESHOLD = 8;
        let pointerDownPosition = new THREE.Vector2();
        let pointerDownTime = 0;

        let currentStructure = 'Hopper'; 
        let isFlying = false;

        let cameraVelocity = new THREE.Vector3();
        const FRICTION = 0.98;
        const ACCEL = 0.01;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x007bff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100000);
        camera.position.set(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const cameraLightGroup = new THREE.Group();
        camera.add(cameraLightGroup);
        scene.add(camera);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
        directionalLight.position.set(0, 0, 10);
        cameraLightGroup.add(directionalLight);

        const ultramarineLight = new THREE.DirectionalLight(0x3f00ff, 1.0);
        ultramarineLight.position.set(0, 0, -10);
        cameraLightGroup.add(ultramarineLight);

        const additionalLights = [
            { color: 0xff0000, position: [10, 0, 0] },
            { color: 0x00ff00, position: [0, 10, 0] },
            { color: 0x0000ff, position: [0, 0, 10] },
            { color: 0x3f00ff, position: [-10, -10, -10] },
        ];
        additionalLights.forEach(({ color, position }) => {
            const light = new THREE.DirectionalLight(color, 0.8);
            light.position.set(...position);
            scene.add(light);
        });

        const GEOMETRY_TYPES = [
            { name: 'Box', creator: (size) => new THREE.BoxGeometry(size, size, size) },
            { name: 'Tetra', creator: (size) => new THREE.TetrahedronGeometry(size) },
            { name: 'Icosa', creator: (size) => new THREE.IcosahedronGeometry(size, 0) },
            { name: 'Icosa2', creator: (size) => new THREE.IcosahedronGeometry(size, 2) },
            { name: 'Octa', creator: (size) => new THREE.OctahedronGeometry(size) },
            { name: 'Dodeca', creator: (size) => new THREE.DodecahedronGeometry(size) },
        ];

        const interactiveObjects = [];
        let mode = 'Build';
        let isWireframeMode = false;

        const mainGroup = new THREE.Group();
        scene.add(mainGroup);

        const createRandomObjectAt = (pos3D) => {
            const size = Math.random() * 2 + 3;
            const type = GEOMETRY_TYPES[Math.floor(Math.random() * GEOMETRY_TYPES.length)];
            let geometry = type.creator(size).toNonIndexed();

            const material = new THREE.MeshStandardMaterial({
                color: Math.random() * 0xffffff,
                roughness: Math.random() * 0.8 + 0.1,
                metalness: Math.random() * 0.8 + 0.2,
                opacity: Math.random() * 0.5 + 0.5,
                transparent: true,
                side: THREE.DoubleSide, 
                wireframe: isWireframeMode,
            });
            const pivot = new THREE.Group();
            pivot.position.copy(pos3D);
            pivot.userData = {
                velocity: new THREE.Vector3((Math.random() - 0.5) * 0.2, (Math.random() - 0.5) * 0.2, (Math.random() - 0.5) * 0.2),
                rotVelocity: new THREE.Vector3((Math.random() - 0.5) * 0.02, (Math.random() - 0.5) * 0.02, (Math.random() - 0.5) * 0.02)
            };

            const mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            mesh.userData = { depth: 0, isStatic: true, isPolarityObject: true, parentPivot: pivot };
            
            pivot.add(mesh);
            mainGroup.add(pivot);
            interactiveObjects.push(mesh);
        };

        const createInitialIcosahedron = () => {
            let geometry = new THREE.IcosahedronGeometry(4, 0).toNonIndexed();
            const material = new THREE.MeshStandardMaterial({
                color: 0x00ffcc, roughness: 0.2, metalness: 0.8, side: THREE.DoubleSide, wireframe: isWireframeMode
            });
            const pivot = new THREE.Group();
            pivot.position.set(0, 0, -20);
            const mesh = new THREE.Mesh(geometry, material);
            mesh.userData = { depth: 0, isStatic: true, isPolarityObject: true, parentPivot: pivot };
            pivot.add(mesh);
            mainGroup.add(pivot);
            interactiveObjects.push(mesh);
        };

        createInitialIcosahedron();

function growFromFace(hitObject, face) {
    if (!face) return;

    const posAttr = hitObject.geometry.attributes.position;
    const vA = new THREE.Vector3().fromBufferAttribute(posAttr, face.a).applyMatrix4(hitObject.matrixWorld);
    const vB = new THREE.Vector3().fromBufferAttribute(posAttr, face.b).applyMatrix4(hitObject.matrixWorld);
    const vC = new THREE.Vector3().fromBufferAttribute(posAttr, face.c).applyMatrix4(hitObject.matrixWorld);
    const worldNormal = face.normal.clone().applyQuaternion(hitObject.quaternion).normalize();
    const parentPivot = hitObject.userData.parentPivot;
    const invPivotMatrix = new THREE.Matrix4().copy(parentPivot.matrixWorld).invert();
    const nextDepth = (hitObject.userData.depth || 0) + 1;
    const stepOut = (currentStructure === 'Hopper') ? 0.3 : 0.8;

    [1, -1].forEach(dir => {
        const currentNormal = worldNormal.clone().multiplyScalar(dir);
        const segGeometry = new THREE.BufferGeometry();
        const vertices = [];
        
        const vA_up = vA.clone().addScaledVector(currentNormal, stepOut);
        const vB_up = vB.clone().addScaledVector(currentNormal, stepOut);
        const vC_up = vC.clone().addScaledVector(currentNormal, stepOut);
        const center = new THREE.Vector3().add(vA).add(vB).add(vC).divideScalar(3).addScaledVector(currentNormal, stepOut);
        
        vA_up.lerp(center, 0.4); vB_up.lerp(center, 0.4); vC_up.lerp(center, 0.4);
        
        const loc = [vA, vB, vC, vA_up, vB_up, vC_up].map(v => v.applyMatrix4(invPivotMatrix));
        
        // Массив вершин пирамиды
        const pts = [loc[0], loc[1], loc[4], loc[0], loc[4], loc[3], loc[1], loc[2], loc[5], loc[1], loc[5], loc[4], loc[2], loc[0], loc[3], loc[2], loc[3], loc[5], loc[3], loc[4], loc[5]];
        pts.forEach(p => vertices.push(p.x, p.y, p.z));

        segGeometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
        segGeometry.computeVertexNormals();
        
        const mesh = new THREE.Mesh(segGeometry, new THREE.MeshStandardMaterial({
            color: new THREE.Color(`hsl(${(nextDepth * 25) % 360}, 90%, 50%)`),
            roughness: 0.2, metalness: 0.8, side: THREE.DoubleSide, wireframe: isWireframeMode
        }));
        mesh.userData = { depth: nextDepth, isPolarityObject: true, parentPivot: parentPivot };
        parentPivot.add(mesh);
        interactiveObjects.push(mesh);
    });

    removeFaceFromGeometry(hitObject, face);
}

function removeFaceFromGeometry(mesh, face) {
    const geo = mesh.geometry;
    const pos = geo.attributes.position;
    const newPositions = [];
    
    // Сравниваем координаты вершин, чтобы найти нужный треугольник
    for (let i = 0; i < pos.count; i += 3) {
        const v1 = new THREE.Vector3(pos.getX(i), pos.getY(i), pos.getZ(i));
        const targetV1 = new THREE.Vector3().fromBufferAttribute(pos, face.a);
        
        // Если вершины не совпадают с вершинами кликнутого треугольника, оставляем их
        if (v1.distanceTo(targetV1) > 0.001) {
            for (let j = 0; j < 3; j++) {
                newPositions.push(pos.getX(i+j), pos.getY(i+j), pos.getZ(i+j));
            }
        }
    }
    
    geo.setAttribute('position', new THREE.Float32BufferAttribute(newPositions, 3));
    geo.attributes.position.needsUpdate = true;
    geo.computeVertexNormals();
    
    // Удаляем из interactiveObjects, если в меше не осталось треугольников
    if (newPositions.length === 0) {
        mesh.parent.remove(mesh);
        interactiveObjects.splice(interactiveObjects.indexOf(mesh), 1);
    }
}

        const raycaster = new THREE.Raycaster();

        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.control-button, .top-control, .mode-menu-container')) return;
            pointerDownPosition.set(e.clientX, e.clientY);
            pointerDownTime = Date.now();
            const normMouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
            raycaster.setFromCamera(normMouse, camera);
            const intersects = raycaster.intersectObjects(interactiveObjects, false);
            if (intersects.length > 0) {
                if (e.button === 2) { objectToScale = intersects[0].object; isScalingDown = true; }
                else { holdScaleTimer = setTimeout(() => { objectToScale = intersects[0].object; isScalingUp = true; }, HOLD_SCALE_DELAY); }
            }
        });

        window.addEventListener('pointermove', (e) => {
            if (e.buttons === 1 && !isScalingUp && !isScalingDown) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x -= e.movementY * 0.002;
                camera.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, camera.rotation.x));
            }
            if (pointerDownPosition.distanceTo(new THREE.Vector2(e.clientX, e.clientY)) > MOVE_THRESHOLD) clearTimeout(holdScaleTimer);
        });

renderer.domElement.addEventListener('pointerup', (e) => {
    clearTimeout(holdScaleTimer);
    
    // 1. Если это было масштабирование, сбрасываем состояние
    if (isScalingUp || isScalingDown) { 
        isScalingUp = false; isScalingDown = false; objectToScale = null; return; 
    }
    
    // 2. Игнорируем клики по элементам интерфейса
    if (e.target.closest('.control-button, .top-control')) return;
    
    // 3. Проверка на случайный сдвиг (чтобы не срабатывало при вращении камеры)
    if (pointerDownPosition.distanceTo(new THREE.Vector2(e.clientX, e.clientY)) <= MOVE_THRESHOLD) {
        
        const normMouse = new THREE.Vector2((e.clientX / window.innerWidth) * 2 - 1, -(e.clientY / window.innerHeight) * 2 + 1);
        raycaster.setFromCamera(normMouse, camera);
        const intersects = raycaster.intersectObjects(interactiveObjects, false);
        
        if (intersects.length > 0) {
            // ВАЖНО: Больше никакой проверки e.button. 
            // Любой клик по объекту вызывает его деление и удаление.
            growFromFace(intersects[0].object, intersects[0].face);
        } else {
            // Клик по пустоте - создаем новый объект из камеры
            const dir = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            createRandomObjectAt(camera.position.clone().add(dir.multiplyScalar(20)));
        }
    }
});

        document.getElementById('fly-btn').addEventListener('click', () => { isFlying = !isFlying; });
        document.querySelector('.structure-button').addEventListener('click', () => currentStructure = (currentStructure === 'Hopper') ? 'Tree' : 'Hopper');
        document.querySelectorAll('.mode-menu-item').forEach(item => item.addEventListener('click', () => mode = item.getAttribute('data-mode')));
        document.querySelector('.wire-button').addEventListener('click', () => { isWireframeMode = !isWireframeMode; interactiveObjects.forEach(obj => obj.material.wireframe = isWireframeMode); });
        
        document.addEventListener('contextmenu', (e) => e.preventDefault());

        function animate() {
            requestAnimationFrame(animate);
            if (objectToScale) {
                const p = objectToScale.userData.parentPivot;
                p.scale.multiplyScalar(isScalingUp ? SCALE_RATE : SCALE_RATE_DOWN);
            }
            
            if (isFlying) {
                const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
                cameraVelocity.add(forward.multiplyScalar(ACCEL));
            }
            cameraVelocity.multiplyScalar(FRICTION);
            camera.position.add(cameraVelocity);

            mainGroup.children.forEach(pivot => {
                pivot.position.add(pivot.userData.velocity || new THREE.Vector3());
            });

            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
