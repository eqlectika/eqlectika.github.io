<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest-cube.json">
    <title>Visualized Semiotics + Bismuth Core</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&display=swap" rel="stylesheet">
    <style>
        body {
            user-select: none;
            margin: 0;
            overflow: hidden;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            background: #000;
            touch-action: none;
        }
        .control-button, .top-control, .mode-menu-item {
            font-family: 'Luckiest Guy', cursive !important;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .control-button, .top-control {
            position: fixed;
            z-index: 1000;
            cursor: pointer;
            font-size: 18px;
            color: rgba(255, 255, 255, 0.9) !important;
            background: none;
            border: none;
            padding: 10px;
        }
        
        /* Нижняя панель */
        .control-button { bottom: 20px; }
        .further-button { left: 3%; }
        .closer-button { right: 3%; }
        .fly-button-base { left: 50%; transform: translateX(-50%); }
        
        /* Верхняя панель: все кнопки на одном уровне top: 20px */
        .top-control { top: 20px; }
        .mode-menu-container { position: fixed; top: 20px; left: 3%; z-index: 1000; }
        .structure-button { left: 50%; transform: translateX(-50%); }
        .wire-button { right: 3%; }

        .mode-menu { position: absolute; top: 100%; left: 0; margin-top: 10px; display: none; flex-direction: column; background: rgba(0,0,0,0.7); padding: 5px; border-radius: 4px; }
        .mode-menu.show { display: flex; }
        .mode-menu-item { color: #fff; cursor: pointer; padding: 5px 10px; white-space: nowrap; }
    </style>
</head>
<body>

    <div class="control-button further-button">Further</div>
    <div class="control-button closer-button">Closer</div>
    <div class="control-button fly-button-base" id="fly-btn">Fly</div> 

    <div class="top-control wire-button">Wire</div> 
    <div class="top-control structure-button">
        <a href="index.html" style="position: left: 50%; transform: translateX(-50%); fixed; z-index: 1000;">
        <img src="logo.png" alt="Logo" style="height: 40px; cursor: pointer;">
    </a>
    </div> 

    <div class="mode-menu-container">
        <div class="top-control mode-button" id="mode-dropdown-toggle" style="position:static; padding:10px;">BUILD</div>
        <div class="mode-menu" id="mode-menu-list">
            <div class="mode-menu-item" data-mode="Build">BUILD</div>
            <div class="mode-menu-item" data-mode="Delete">DELETE</div>

        </div> 
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        let isScalingUp = false;
        let isScalingDown = false;
        let objectToScale = null;
        const SCALE_RATE = 1.03;
        const SCALE_RATE_DOWN = 0.97;
        const MIN_SCALE = 0.1;
        const MAX_SCALE = 500;

        let holdScaleTimer = null;
        const HOLD_SCALE_DELAY = 350; 
        const MOVE_THRESHOLD = 8;
        let pointerDownPosition = new THREE.Vector2();
        let pointerDownTime = 0;

        let currentStructure = 'Hopper'; 
        let isFlying = false;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x007bff);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100000);
        camera.position.z = 30;

        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // OrbitControls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const cameraLightGroup = new THREE.Group();
        camera.add(cameraLightGroup);
        scene.add(camera);

        const directionalLight = new THREE.DirectionalLight(0xffffff, 1.5);
        directionalLight.position.set(0, 0, 10);
        cameraLightGroup.add(directionalLight);

        const ultramarineLight = new THREE.DirectionalLight(0x3f00ff, 1.0);
        ultramarineLight.position.set(0, 0, -10);
        cameraLightGroup.add(ultramarineLight);

        const additionalLights = [
            { color: 0xff0000, position: [10, 0, 0] },
            { color: 0x00ff00, position: [0, 10, 0] },
            { color: 0x0000ff, position: [0, 0, 10] },
            { color: 0x3f00ff, position: [-10, -10, -10] },
        ];
        additionalLights.forEach(({ color, position }) => {
            const light = new THREE.DirectionalLight(color, 0.8);
            light.position.set(...position);
            scene.add(light);
        });

        const GEOMETRY_TYPES = [
            { name: 'Box', creator: (size) => new THREE.BoxGeometry(size, size, size) },
            { name: 'Tetra', creator: (size) => new THREE.TetrahedronGeometry(size) },
            { name: 'Icosa', creator: (size) => new THREE.IcosahedronGeometry(size, 0) },
            { name: 'Icosa2', creator: (size) => new THREE.IcosahedronGeometry(size, 2) },
            { name: 'Octa', creator: (size) => new THREE.OctahedronGeometry(size) },
            { name: 'Dodeca', creator: (size) => new THREE.DodecahedronGeometry(size) },
        ];

        const interactiveObjects = [];
        let mode = 'Build';
        let isWireframeMode = false;

        const mainGroup = new THREE.Group();
        scene.add(mainGroup);

        const createRandomObjectAt = (pos3D) => {
            const size = Math.random() * 2 + 3;
            const type = GEOMETRY_TYPES[Math.floor(Math.random() * GEOMETRY_TYPES.length)];
            let geometry = type.creator(size);
            geometry = geometry.toNonIndexed();

            const material = new THREE.MeshStandardMaterial({
                color: Math.random() * 0xffffff,
                roughness: Math.random() * 0.8 + 0.1,
                metalness: Math.random() * 0.8 + 0.2,
                opacity: Math.random() * 0.5 + 0.5,
                transparent: true,
                side: THREE.DoubleSide, 
                wireframe: isWireframeMode,
            });
            const pivot = new THREE.Group();
            pivot.position.copy(pos3D);
            
            pivot.userData = {
                velocity: new THREE.Vector3((Math.random() - 0.5) * 0.2, (Math.random() - 0.5) * 0.2, (Math.random() - 0.5) * 0.2),
                rotVelocity: new THREE.Vector3((Math.random() - 0.5) * 0.02, (Math.random() - 0.5) * 0.02, (Math.random() - 0.5) * 0.02)
            };

            const mesh = new THREE.Mesh(geometry, material);
            mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
            mesh.userData = { depth: 0, isStatic: true, isPolarityObject: true, parentPivot: pivot };
            
            pivot.add(mesh);
            mainGroup.add(pivot);
            interactiveObjects.push(mesh);
        };

        const createInitialCube = () => {
            let geometry = new THREE.BoxGeometry(6, 6, 6).toNonIndexed();
            
            const material = new THREE.MeshStandardMaterial({
                color: 0x00ffcc,
                roughness: 0.2,
                metalness: 0.8,
                side: THREE.DoubleSide,
                wireframe: isWireframeMode
            });
            const pivot = new THREE.Group();
            pivot.position.set(0, 0, 0);
            pivot.userData = {
                velocity: new THREE.Vector3((Math.random() - 0.5) * 0.2, (Math.random() - 0.5) * 0.2, (Math.random() - 0.5) * 0.2),
                rotVelocity: new THREE.Vector3((Math.random() - 0.5) * 0.02, (Math.random() - 0.5) * 0.02, (Math.random() - 0.5) * 0.02)
            };

            const mesh = new THREE.Mesh(geometry, material);
            mesh.userData = { depth: 0, isStatic: true, isPolarityObject: true, parentPivot: pivot };
            
            pivot.add(mesh);
            mainGroup.add(pivot);
            interactiveObjects.push(mesh);
        };

        createInitialCube();

        function growFromFace(hitObject, face) {
            if (!face) return;
            const geometry = hitObject.geometry;
            const posAttr = geometry.attributes.position;
            if (!posAttr) return;

            const vA = new THREE.Vector3().fromBufferAttribute(posAttr, face.a);
            const vB = new THREE.Vector3().fromBufferAttribute(posAttr, face.b);
            const vC = new THREE.Vector3().fromBufferAttribute(posAttr, face.c);

            vA.applyMatrix4(hitObject.matrixWorld);
            vB.applyMatrix4(hitObject.matrixWorld);
            vC.applyMatrix4(hitObject.matrixWorld);

            const worldNormal = face.normal.clone().applyQuaternion(hitObject.quaternion).normalize();
            
            const stepOut = (currentStructure === 'Hopper') ? 0.3 : 0.8;
            const stepIn = -stepOut; 
            const lerpFactor = (currentStructure === 'Hopper') ? 0.4 : 0.25;

            const parentPivot = hitObject.userData.parentPivot;
            const invPivotMatrix = new THREE.Matrix4().copy(parentPivot.matrixWorld).invert();
            const currentDepth = hitObject.userData.depth || 0;
            const nextDepth = currentDepth + 1;
            const hue = (nextDepth * 25) % 360;

            const nextMaterial = new THREE.MeshStandardMaterial({
                color: new THREE.Color(`hsl(${hue}, 90%, 50%)`),
                roughness: 0.2,
                metalness: 0.8,
                transparent: true,
                opacity: 0.9,
                side: THREE.DoubleSide,
                wireframe: isWireframeMode
            });

            const segGeometry = new THREE.BufferGeometry();
            const vertices = [];

            function addTriangle(p1, p2, p3) {
                vertices.push(p1.x, p1.y, p1.z, p2.x, p2.y, p2.z, p3.x, p3.y, p3.z);
            }

            function appendSide(stepSize) {
                const vA_up = vA.clone().addScaledVector(worldNormal, stepSize);
                const vB_up = vB.clone().addScaledVector(worldNormal, stepSize);
                const vC_up = vC.clone().addScaledVector(worldNormal, stepSize);

                const center = new THREE.Vector3().add(vA).add(vB).add(vC).divideScalar(3);
                const center_up = center.clone().addScaledVector(worldNormal, stepSize);

                vA_up.lerp(center_up, lerpFactor);
                vB_up.lerp(center_up, lerpFactor);
                vC_up.lerp(center_up, lerpFactor);

                const locA = vA.clone().applyMatrix4(invPivotMatrix);
                const locB = vB.clone().applyMatrix4(invPivotMatrix);
                const locC = vC.clone().applyMatrix4(invPivotMatrix);
                const locA_up = vA_up.applyMatrix4(invPivotMatrix);
                const locB_up = vB_up.applyMatrix4(invPivotMatrix);
                const locC_up = vC_up.applyMatrix4(invPivotMatrix);

                addTriangle(locA, locB, locB_up); addTriangle(locA, locB_up, locA_up);
                addTriangle(locB, locC, locC_up); addTriangle(locB, locC_up, locB_up);
                addTriangle(locC, locA, locA_up); addTriangle(locC, locA_up, locC_up);
                addTriangle(locA_up, locB_up, locC_up);
            }

            appendSide(stepOut); 
            appendSide(stepIn);  

            segGeometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            segGeometry.computeVertexNormals();

            const mesh = new THREE.Mesh(segGeometry, nextMaterial);
            mesh.userData = { depth: nextDepth, isPolarityObject: true, parentPivot: parentPivot };
            
            parentPivot.add(mesh);
            interactiveObjects.push(mesh);

            // Удаление базовой грани
            const posArray = posAttr.array;
            const newVertices = [];
            const targetIndex = face.faceIndex * 9;

            for (let i = 0; i < posArray.length; i += 9) {
                if (i === targetIndex) continue; 
                for (let j = 0; j < 9; j++) {
                    newVertices.push(posArray[i + j]);
                }
            }

            hitObject.geometry.dispose();
            const rebuiltGeometry = new THREE.BufferGeometry();
            rebuiltGeometry.setAttribute('position', new THREE.Float32BufferAttribute(newVertices, 3));
            rebuiltGeometry.computeVertexNormals();
            hitObject.geometry = rebuiltGeometry;
        }

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const getIntersection = (clientX, clientY, objectsToCheck) => {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            return raycaster.intersectObjects(objectsToCheck, false); 
        };

        const getEmptySpace3DPoint = (clientX, clientY) => {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const targetPlane = new THREE.Plane(new THREE.Vector3(0, 0, 1), 0);
            const intersectionPoint = new THREE.Vector3();
            raycaster.ray.intersectPlane(targetPlane, intersectionPoint);
            return intersectionPoint;
        };

        // ВВОД
        renderer.domElement.addEventListener('pointerdown', (e) => {
            if (e.target.closest('.control-button, .top-control, .mode-menu-container')) return;
            if (!e.isPrimary) return;

            pointerDownPosition.set(e.clientX, e.clientY);
            pointerDownTime = Date.now();
            isScalingUp = false; isScalingDown = false; objectToScale = null;

            const intersects = getIntersection(e.clientX, e.clientY, interactiveObjects);
            if (intersects.length > 0 && intersects[0].object.userData.isPolarityObject) {
                const hitObject = intersects[0].object;
                if (e.button === 2) {
                    objectToScale = hitObject;
                    isScalingDown = true;
                    controls.enabled = false;
                } else {
                    holdScaleTimer = setTimeout(() => {
                        objectToScale = hitObject;
                        isScalingUp = true;
                        controls.enabled = false; 
                    }, HOLD_SCALE_DELAY);
                }
            }
        });

        renderer.domElement.addEventListener('pointermove', (e) => {
            if (!e.isPrimary) return;
            const dist = pointerDownPosition.distanceTo(new THREE.Vector2(e.clientX, e.clientY));
            if (dist > MOVE_THRESHOLD) clearTimeout(holdScaleTimer);
        });

        renderer.domElement.addEventListener('pointerup', (e) => {
            if (!e.isPrimary) return;
            clearTimeout(holdScaleTimer);
            controls.enabled = true; 

            if (isScalingUp || isScalingDown) {
                isScalingUp = false; isScalingDown = false; objectToScale = null;
                return;
            }

            if (e.target.closest('.control-button, .top-control, .mode-menu-container')) return;

            const moveDistance = pointerDownPosition.distanceTo(new THREE.Vector2(e.clientX, e.clientY));
            const duration = Date.now() - pointerDownTime;

            if (moveDistance <= MOVE_THRESHOLD && duration < HOLD_SCALE_DELAY && e.button !== 2) {
                const intersects = getIntersection(e.clientX, e.clientY, interactiveObjects);
                
                if (intersects.length > 0) {
                    const hit = intersects[0];
                    if (mode === 'Delete') {
                        const pivot = hit.object.userData.parentPivot;
                        mainGroup.remove(pivot);
                        pivot.traverse((child) => {
                            const idx = interactiveObjects.indexOf(child);
                            if (idx > -1) interactiveObjects.splice(idx, 1);
                        });
                    } else if (mode === 'Build') {
                        growFromFace(hit.object, hit.face);
                    }
                } else {
                    if (mode === 'Build') {
                        const spawnPoint = getEmptySpace3DPoint(e.clientX, e.clientY);
                        createRandomObjectAt(spawnPoint);
                    }
                }
            }
            isScalingUp = false; isScalingDown = false; objectToScale = null;
        });

        document.addEventListener('contextmenu', (e) => e.preventDefault());

        // UI Listeners
        // ИСПРАВЛЕНА ЛОГИКА FLY: импульс движения и вращения
        document.getElementById('fly-btn').addEventListener('click', () => {
            isFlying = !isFlying;
            document.getElementById('fly-btn').style.color = isFlying ? '#00ffcc' : 'rgba(255, 255, 255, 0.9)';
        });

        document.querySelector('.structure-button').addEventListener('click', () => {
            currentStructure = (currentStructure === 'Hopper') ? 'Tree' : 'Hopper';
            document.querySelector('.structure-button').textContent = currentStructure.toUpperCase();
        });

        document.getElementById('mode-dropdown-toggle').addEventListener('click', (e) => {
            e.stopPropagation();
            document.getElementById('mode-menu-list').classList.toggle('show');
        });

        document.querySelectorAll('.mode-menu-item').forEach(item => {
            item.addEventListener('click', () => {
                mode = item.getAttribute('data-mode');
                document.getElementById('mode-dropdown-toggle').textContent = mode;
                document.getElementById('mode-menu-list').classList.remove('show');
            });
        });

        document.querySelector('.wire-button').addEventListener('click', () => {
            isWireframeMode = !isWireframeMode;
            document.querySelector('.wire-button').textContent = isWireframeMode ? 'Solid' : 'Wire';
            interactiveObjects.forEach(obj => {
                if (obj.material) obj.material.wireframe = isWireframeMode;
            });
        });

        // ИСПРАВЛЕНО СООТВЕТСТВИЕ НАЗНАЧЕНИЮ: Closer приближает, Further удаляет
        document.querySelector('.closer-button').addEventListener('click', () => { camera.position.z -= 5; });
        document.querySelector('.further-button').addEventListener('click', () => { camera.position.z += 5; });

        function animate() {
            requestAnimationFrame(animate);

            if (objectToScale) {
                const targetPivot = objectToScale.userData.parentPivot;
                if (isScalingUp) {
                    targetPivot.scale.multiplyScalar(SCALE_RATE);
                    if (targetPivot.scale.x > MAX_SCALE) targetPivot.scale.set(MAX_SCALE, MAX_SCALE, MAX_SCALE);
                } else if (isScalingDown) {
                    targetPivot.scale.multiplyScalar(SCALE_RATE_DOWN);
                    if (targetPivot.scale.x < MIN_SCALE) targetPivot.scale.set(MIN_SCALE, MIN_SCALE, MIN_SCALE);
                }
            }

            // Динамический расчет движения Fly
            if (isFlying) {
                mainGroup.children.forEach(pivot => {
                    if (pivot.userData.velocity) {
                        pivot.position.add(pivot.userData.velocity);
                        pivot.rotation.x += pivot.userData.rotVelocity.x;
                        pivot.rotation.y += pivot.userData.rotVelocity.y;
                        pivot.rotation.z += pivot.userData.rotVelocity.z;

                        if (pivot.position.length() > 150) {
                            pivot.userData.velocity.negate();
                        }
                    }
                });
            }

            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
