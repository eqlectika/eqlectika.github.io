<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest-jetpack.json">

    <title>Jetpack</title>
<style>
body { 
    margin: 0; 
    overflow: hidden; 
    touch-action: none; 
    user-select: none; /* <-- ДОБАВИТЬ ЭТУ СТРОКУ */
    -webkit-user-select: none; /* Для Safari */
}
    canvas { display: block; }
#controls { 
        position: fixed; 
        bottom: 50px; 
        left: 0; 
        right: 0; 
        display: none; 
        justify-content: space-between; 
        padding: 0 30px; 
        pointer-events: none;
    }
.btn { 
    width: 100px; 
    height: 100px; 
    background: rgba(255, 255, 255, 0.2); 
    border: 2px solid rgba(255, 255, 255, 0.5);
    border-radius: 50%; 
    color: white;
    pointer-events: auto; 
    touch-action: none;          
    -webkit-user-select: none;   
    user-select: none;           
    -webkit-tap-highlight-color: transparent; 
}
    @media (pointer: coarse) { #controls { display: flex; } }
    #logoLink {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1001; 
}
#btnForward {
    display: none; /* Полностью убирает кнопку Go */
}

#btnUp {
    background: transparent; /* Делает фон прозрачным */
    border: none;            /* Убирает обводку */
    color: white;            /* Оставляет надпись видимой */
    font-size: 20px;         /* Опционально: можно увеличить шрифт */
}
#throttleSlider {
    appearance: slider-vertical;
    width: 300px;
    height: 50vh;
    background: rgba(255, 255, 255, 0.1);
    pointer-events: auto;
}
</style>
</head>
<body>
    <a href="index.html" id="logoLink">
    <img src="logo.png" alt="Logo" style="width: 42px; height: 42px;">
</a>
<div id="controls">
    <input type="range" id="throttleSlider" min="0" max="1" step="0.01" value="0">
</div>

<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
    let currentThrottle = 0;
const throttleSlider = document.getElementById('throttleSlider');

throttleSlider.addEventListener('input', (e) => {
    currentThrottle = parseFloat(e.target.value);
});

throttleSlider.addEventListener('touchend', () => {
    currentThrottle = 0.382;
    throttleSlider.value = 0.382;
});
    import * as THREE from 'three';

    // ==========================================
    // 1. НАСТРОЙКИ СКОРОСТИ, ИНЕРЦИИ И КРЕНА
    // ==========================================
    const MOVE_SPEED = 0.005;       
    const FLY_SPEED = 0.01;       
    const LOOK_SPEED = 0.001;       
    const TURN_SPEED = 0.0005;      
    const TOUCH_SENSITIVITY = 0.001; 
    
    const GRAVITY = 0.008; // Чем выше значение, тем тяжелее объект
    
    const DAMPING_LOOK = 0.96; 
    const DAMPING_TURN = 0.96;
    const DAMPING_MOVE = 0.98;

    const ROLL_MAX = 0.35;        
    const ROLL_SPEED = 0.1;       

    // ==========================================
    // 2. ИНИЦИАЛИЗАЦИЯ ПЕРЕМЕННЫХ И СОСТОЯНИЙ
    // ==========================================
    const touch = { forward: false, up: false };
    let previousTouchX = 0;
    let previousTouchY = 0;
    let swipeTouchId = null; 

    let cameraVelocityY = 0; 
    let cameraVelocityX = 0; 

    if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock('landscape').catch(() => {});
    }

    // ==========================================
    // 3. ОБРАБОТЧИКИ СОБЫТИЙ И ИНТЕРФЕЙС
    // ==========================================
window.addEventListener('click', () => {
    if (!document.pointerLockElement) {
        document.body.requestPointerLock();
    }
});

    document.getElementById('btnForward').addEventListener('touchstart', () => { touch.forward = true; });
    document.getElementById('btnForward').addEventListener('touchend', () => { touch.forward = false; });

    window.addEventListener('touchstart', (e) => {
        if (swipeTouchId === null) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.target.closest('#controls')) continue; 
                
                swipeTouchId = t.identifier;
                previousTouchX = t.pageX;
                previousTouchY = t.pageY;
                break;
            }
        }
    }, { passive: false });

    window.addEventListener('touchmove', (e) => {
        if (swipeTouchId !== null) {
            let activeTouch = null;
            for (let i = 0; i < e.touches.length; i++) {
                if (e.touches[i].identifier === swipeTouchId) {
                    activeTouch = e.touches[i];
                    break;
                }
            }

            if (activeTouch) {
                const touchX = activeTouch.pageX;
                const touchY = activeTouch.pageY;
                
                const deltaX = touchX - previousTouchX;
                const deltaY = -(touchY - previousTouchY);
                
                cameraVelocityY -= deltaX * TOUCH_SENSITIVITY * 0.5;
                cameraVelocityX -= deltaY * TOUCH_SENSITIVITY * 0.5;
                
                previousTouchX = touchX;
                previousTouchY = touchY;
            }
        }
    }, { passive: false });

    window.addEventListener('touchend', (e) => {
        if (swipeTouchId !== null) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === swipeTouchId) {
                    swipeTouchId = null;
                    break;
                }
            }
        }
    });

    window.addEventListener('touchcancel', (e) => {
        if (swipeTouchId !== null) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === swipeTouchId) {
                    swipeTouchId = null;
                    break;
                }
            }
        }
    });

    // ==========================================
    // 4. СЦЕНА THREE.JS И ОБЪЕКТЫ
    // ==========================================
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a12); 
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 3000);
    camera.rotation.order = 'YXZ';
    
    const player = new THREE.Group();
    player.position.set(0, 2, 0);
    scene.add(player);
    player.add(camera);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 2.5);
    light.position.set(50, 200, 50);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x888888));

    const backLight = new THREE.DirectionalLight(0xabcdef, 0.8);
    backLight.position.set(-50, 100, -50); 
    scene.add(backLight);

    // Вектор коллизий и зона генерации объектов мира
    const collidableObjects = [];
    const WORLD_SIZE = 800; 

    function addStructure(mesh) {
        scene.add(mesh);
        collidableObjects.push(mesh);
    }

    // ==========================================
    // ОПТИМИЗИРОВАННАЯ БЕСКОНЕЧНАЯ СЕТКА
    // ==========================================
    const gridGeometry = new THREE.PlaneGeometry(10000, 10000);
    const gridMaterial = new THREE.ShaderMaterial({
        side: THREE.DoubleSide,
        transparent: true,
        uniforms: {
            uSize: { value: 10.0 },
        },
        vertexShader: `
            varying vec3 vWorldPosition;
            void main() {
                vec4 worldPosition = modelMatrix * vec4(position, 1.0);
                vWorldPosition = worldPosition.xyz;
                gl_Position = projectionMatrix * viewMatrix * worldPosition;
            }
        `,
        fragmentShader: `
            varying vec3 vWorldPosition;
            uniform float uSize;
            void main() {
                vec2 grid = abs(fract(vWorldPosition.xz / uSize - 0.5) - 0.5) / fwidth(vWorldPosition.xz / uSize);
                float line = min(grid.x, grid.y);
                float alpha = 1.0 - min(line, 1.0);
                
                float dist = length(vWorldPosition.xz);
                float fade = 1.0 - smoothstep(100.0, 800.0, dist); 
                
                if (alpha < 0.1) discard;
                
                gl_FragColor = vec4(0.26, 0.26, 1.0, alpha * fade * 0.5);
            }
        `
    });

    const infiniteGrid = new THREE.Mesh(gridGeometry, gridMaterial);
    infiniteGrid.rotation.x = -Math.PI / 2; 
    infiniteGrid.position.y = 0;
    scene.add(infiniteGrid);

    // Столбы и квадраты
    for(let i=0; i<40; i++) {
        const sizeX = 10 + Math.random() * 20;
        const sizeY = 4 + Math.random() * 15;
        const sizeZ = 10 + Math.random() * 20;

        const geometry = new THREE.BoxGeometry(sizeX, sizeY, sizeZ);
        const material = new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff });
        const box = new THREE.Mesh(geometry, material);
        
        box.position.set(
            (Math.random() - 0.5) * WORLD_SIZE,
            sizeY / 2, 
            (Math.random() - 0.5) * WORLD_SIZE
        );
        addStructure(box);
    }

    // Арки
    for(let i=0; i<25; i++) {
        const archGroup = new THREE.Group();
        const archColor = Math.random() * 0xffffff;
        const material = new THREE.MeshPhongMaterial({ color: archColor });

        const w = 4;   
        const h = 30;  
        const d = 4;   
        const span = 25; 

        const leftLeg = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
        leftLeg.position.set(-span/2, h/2, 0);
        archGroup.add(leftLeg);

        const rightLeg = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), material);
        rightLeg.position.set(span/2, h/2, 0);
        archGroup.add(rightLeg);

        const topBar = new THREE.Mesh(new THREE.BoxGeometry(span + w, w, d), material);
        topBar.position.set(0, h + w/2, 0);
        archGroup.add(topBar);

        archGroup.position.set(
            (Math.random() - 0.5) * WORLD_SIZE,
            0,
            (Math.random() - 0.5) * WORLD_SIZE
        );
        archGroup.rotation.y = Math.random() * Math.PI;

        leftLeg.updateMatrixWorld();
        rightLeg.updateMatrixWorld();
        topBar.updateMatrixWorld();
        collidableObjects.push(leftLeg, rightLeg, topBar);
        
        scene.add(archGroup);
    }

    // Мосты
    for(let i=0; i<15; i++) {
        const bridgeGroup = new THREE.Group();
        const bridgeColor = 0x555566;
        const material = new THREE.MeshPhongMaterial({ color: bridgeColor });

        const length = 80;
        const width = 12;
        const height = 15;

        const deck = new THREE.Mesh(new THREE.BoxGeometry(width, 2, length), material);
        deck.position.set(0, height, 0);
        bridgeGroup.add(deck);

        for(let j = -length/3; j <= length/3; j += length/3) {
            const pillar = new THREE.Mesh(new THREE.BoxGeometry(4, height, 4), material);
            pillar.position.set(0, height/2, j);
            bridgeGroup.add(pillar);
            pillar.updateMatrixWorld();
            collidableObjects.push(pillar);
        }

        bridgeGroup.position.set(
            (Math.random() - 0.5) * WORLD_SIZE,
            0,
            (Math.random() - 0.5) * WORLD_SIZE
        );
        bridgeGroup.rotation.y = Math.random() * Math.PI;

        deck.updateMatrixWorld();
        collidableObjects.push(deck);

        scene.add(bridgeGroup);
    }

    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);
    

    let velocity = new THREE.Vector3(0, 0, 0);
    let angularVelocity = 0;

    // ==========================================
    // 5. ИГРОВОЙ ЦИКЛ ANIMATE
    // ==========================================
    function animate() {
        requestAnimationFrame(animate);
        const raycaster = new THREE.Raycaster();
        const downVector = new THREE.Vector3(0, -1, 0);

        raycaster.set(player.position, downVector);
        const intersects = raycaster.intersectObjects(collidableObjects);

        if (velocity.y <= 0 && intersects.length > 0 && intersects[0].distance < 2.1) {
            player.position.y = intersects[0].point.y + 2; 
            velocity.y = 0; 
        }

        if (keys['ArrowLeft']) cameraVelocityY += LOOK_SPEED * 0.2;
        if (keys['ArrowRight']) cameraVelocityY -= LOOK_SPEED * 0.2;
        if (keys['ArrowUp']) cameraVelocityX -= LOOK_SPEED * 0.2;
        if (keys['ArrowDown']) cameraVelocityX += LOOK_SPEED * 0.2;
        
        camera.rotation.y += cameraVelocityY;
        camera.rotation.x += cameraVelocityX; 
        
        cameraVelocityY *= DAMPING_LOOK;
        cameraVelocityX *= DAMPING_LOOK;
        
        camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));

        if (keys['KeyA']) angularVelocity += TURN_SPEED;
        if (keys['KeyD']) angularVelocity -= TURN_SPEED;
        player.rotation.y += angularVelocity;
        angularVelocity *= DAMPING_TURN;

        const totalRotationY = player.rotation.y + camera.rotation.y;
        const forward = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(0, totalRotationY, 0));
        
        const isMovingForward = keys['KeyW'] || touch.forward;

        const isFlyingUp = keys['Space'] || currentThrottle > 0;
        
        const totalTurnSpeed = angularVelocity + cameraVelocityY;

        let targetRoll = 0;
        if (isMovingForward || (isFlyingUp && camera.rotation.x < 0)) {
            targetRoll = totalTurnSpeed * 15; 
            targetRoll = Math.max(-ROLL_MAX, Math.min(ROLL_MAX, targetRoll));
        }
        camera.rotation.z += (targetRoll - camera.rotation.z) * ROLL_SPEED;

        let addedForwardSpeed = 0;
        let currentFlySpeed = FLY_SPEED;

        if (keys['KeyW'] || touch.forward) {
            addedForwardSpeed += MOVE_SPEED;
        }

        if (camera.rotation.x < 0) {
            const pitchFactor = Math.abs(camera.rotation.x); 
            if (isFlyingUp) {
                addedForwardSpeed += pitchFactor * 0.018; 
                currentFlySpeed *= (1.0 - Math.min(pitchFactor, 0.6)); 
            }
        }

        if (addedForwardSpeed > 0) {
            velocity.add(forward.clone().multiplyScalar(addedForwardSpeed));
        }
        if (keys['KeyS']) {
            velocity.add(forward.clone().multiplyScalar(-MOVE_SPEED)); 
        }

        // ЕДИНСТВЕННЫЙ БЛОК РАСЧЕТА ВЕРТИКАЛЬНОЙ СКОРОСТИ
        if (isFlyingUp) {
            // Если тяга 0 (слайдер внизу), используем стандартный FLY_SPEED, 
            // иначе умножаем на текущее значение слайдера
            let thrust = currentThrottle > 0 ? (currentThrottle * 5) : 1.0;
            velocity.y += currentFlySpeed * thrust;
        } else {
            velocity.y -= GRAVITY;
        }

        player.position.add(velocity);
        
        velocity.multiplyScalar(DAMPING_MOVE);

        if (player.position.y < 2) {
            player.position.y = 2;
            velocity.y = Math.max(0, velocity.y * -0.3);
        }

        infiniteGrid.position.set(player.position.x, 0, player.position.z);
        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
