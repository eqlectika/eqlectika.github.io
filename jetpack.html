<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jetpack Fixed View</title>
<style>
    body { margin: 0; overflow: hidden; touch-action: none; }
    canvas { display: block; }
#controls { 
        position: fixed; 
        bottom: 50px; 
        left: 0; 
        right: 0; 
        display: none; 
        justify-content: space-between; 
        padding: 0 30px; 
        pointer-events: none; /* Чтобы не мешать другим элементам */
    }
.btn { 
    width: 100px; 
    height: 100px; 
    background: rgba(255, 255, 255, 0.2); 
    border: 2px solid rgba(255, 255, 255, 0.5);
    border-radius: 50%; 
    color: white;
    pointer-events: auto; 
    touch-action: none;          /* Отключает браузерные жесты на кнопке */
    -webkit-user-select: none;   /* Отключает выделение текста */
    user-select: none;           /* Отключает выделение текста */
    -webkit-tap-highlight-color: transparent; /* Убирает "подсветку" нажатия в iOS */
}
    @media (pointer: coarse) { #controls { display: flex; } }
    #logoLink {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1001; /* Поверх оверлея */
}
</style>
</head>
<body>
    <a href="index.html" id="logoLink">
    <img src="logo.png" alt="Logo" style="width: 50px; height: 50px;">
</a>
<div id="controls">
    <button id="btnForward" class="btn">Go</button>
    <button id="btnUp" class="btn">Up</button>
</div>
<div id="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:1000; background:#000; color:#fff; display:flex; align-items:center; justify-content:center;">
    Push to start
</div>
<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
    // Блокировка ориентации экрана
if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
}
document.getElementById('overlay').addEventListener('click', async () => {
    // 1. Запрос разрешения для iOS
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        const response = await DeviceOrientationEvent.requestPermission();
        if (response !== 'granted') return;
    }
    
    // 2. Скрытие оверлея
    document.getElementById('overlay').style.display = 'none';
    
    // 3. Захват курсора (для десктопа)
    document.body.requestPointerLock();
});

// Состояние кнопок
const touch = { forward: false, up: false };
document.getElementById('btnForward').addEventListener('touchstart', () => touch.forward = true);
document.getElementById('btnForward').addEventListener('touchend', () => touch.forward = false);
document.getElementById('btnUp').addEventListener('touchstart', () => touch.up = true);
document.getElementById('btnUp').addEventListener('touchend', () => touch.up = false);

// Гироскоп
window.addEventListener('deviceorientation', (e) => {
    // В ландшафтном режиме gamma становится наклоном вверх/вниз, 
    // а beta — поворотом влево/вправо
    camera.rotation.x = THREE.MathUtils.degToRad(e.gamma) / 2;
    camera.rotation.y = THREE.MathUtils.degToRad(e.beta - 90) / 2;
});

    import * as THREE from 'three';

    // НАСТРОЙКИ СКОРОСТИ (Изменяйте эти значения для регулировки)
    const MOVE_SPEED = 0.003;       // Было 0.01 (скорость ходьбы вперед/назад)
    const FLY_SPEED = 0.005;       // Было 0.0025 (скорость взлета на пробел/Up)
    const LOOK_SPEED = 0.002;       // Было 0.03 (скорость обзора стрелками)
    const TURN_SPEED = 0.0005;      // Было 0.001 (скорость разворота корпуса на A/D)

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    // Устанавливаем порядок вращения YXZ, чтобы избежать заклинивания осей (Gimbal Lock)
    camera.rotation.order = 'YXZ';
    
    const player = new THREE.Group();
    player.position.set(0, 2, 0);
    scene.add(player);
    player.add(camera);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    // Добавляем освещение, чтобы предметы были видны
    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    // Создаем ориентиры (столбы)
    for(let i=0; i<20; i++) {
        const geometry = new THREE.BoxGeometry(2, 10, 2);
        const material = new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff });
        const box = new THREE.Mesh(geometry, material);
        // Размещаем вокруг центра
        box.position.set((Math.random()-0.5)*100, 5, (Math.random()-0.5)*100);
        scene.add(box);
    }

    scene.add(new THREE.GridHelper(200, 40));

    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);
    
    // Поворот камеры мышью удален, оставлен только PointerLock по клику для фиксации мыши при желании
    document.body.addEventListener('click', () => document.body.requestPointerLock());

    let velocity = new THREE.Vector3(0, 0, 0);
    let angularVelocity = 0;

    function animate() {
        requestAnimationFrame(animate);
        // 1. Создаем Raycaster (вне animate)
const raycaster = new THREE.Raycaster();
const downVector = new THREE.Vector3(0, -1, 0);

// 2. Внутри animate() (перед рендером):
raycaster.set(player.position, downVector);

// Проверяем пересечения со всеми объектами сцены (кроме самого игрока)
const intersects = raycaster.intersectObjects(scene.children);

// ИСПРАВЛЕНО: Приземление срабатывает только при движении вниз (velocity.y <= 0)
if (velocity.y <= 0 && intersects.length > 0 && intersects[0].distance < 2.1) {
    player.position.y = intersects[0].point.y + 2; // Ставим на объект
    velocity.y = 0; // Останавливаем падение
}
        // Управление обзором камеры с помощью стрелок клавиатуры
        if (keys['ArrowLeft']) camera.rotation.y += LOOK_SPEED;
        if (keys['ArrowRight']) camera.rotation.y -= LOOK_SPEED;
        
        // Используем rotateX для локального наклона без крена по Z
        if (keys['ArrowUp']) camera.rotateX(-LOOK_SPEED);
        if (keys['ArrowDown']) camera.rotateX(LOOK_SPEED);
        
        // Ограничение наклона камеры вверх/вниз и сброс случайного крена Z в 0
        camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
        camera.rotation.z = 0;

        // Поворот корпуса (A/D)
        if (keys['KeyA']) angularVelocity += TURN_SPEED;
        if (keys['KeyD']) angularVelocity -= TURN_SPEED;
        player.rotation.y += angularVelocity;
        angularVelocity *= 0.92;

        // ИСПРАВЛЕНО: Расчет направления вперед с учетом поворота и тела, и камеры
        const totalRotationY = player.rotation.y + camera.rotation.y;
        const forward = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(0, totalRotationY, 0));
        
        if (keys['KeyW']) velocity.add(forward.clone().multiplyScalar(MOVE_SPEED));
        if (keys['KeyS']) velocity.add(forward.clone().multiplyScalar(-MOVE_SPEED));
        if (keys['Space']) velocity.y += FLY_SPEED;

        // Внутри animate() добавить
        if (touch.forward) velocity.add(forward.clone().multiplyScalar(MOVE_SPEED));
        if (touch.up) velocity.y += FLY_SPEED;

        velocity.y -= 0.0015;
        player.position.add(velocity);
        velocity.multiplyScalar(0.97);

        if (player.position.y < 2) {
            player.position.y = 2;
            velocity.y = Math.max(0, velocity.y * -0.3);
        }

        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
