<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jetpack Fixed View</title>
<style>
    body { margin: 0; overflow: hidden; touch-action: none; }
    canvas { display: block; }
#controls { 
        position: fixed; 
        bottom: 50px; 
        left: 0; 
        right: 0; 
        display: none; 
        justify-content: space-between; 
        padding: 0 30px; 
        pointer-events: none; /* Чтобы не мешать другим элементам */
    }
.btn { 
    width: 100px; 
    height: 100px; 
    background: rgba(255, 255, 255, 0.2); 
    border: 2px solid rgba(255, 255, 255, 0.5);
    border-radius: 50%; 
    color: white;
    pointer-events: auto; 
    touch-action: none;          /* Отключает браузерные жесты на кнопке */
    -webkit-user-select: none;   /* Отключает выделение текста */
    user-select: none;           /* Отключает выделение текста */
    -webkit-tap-highlight-color: transparent; /* Убирает "подсветку" нажатия в iOS */
}
    @media (pointer: coarse) { #controls { display: flex; } }
    #logoLink {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 1001; /* Поверх оверлея */
}
</style>
</head>
<body>
    <a href="index.html" id="logoLink">
    <img src="logo.png" alt="Logo" style="width: 50px; height: 50px;">
</a>
<div id="controls">
    <button id="btnForward" class="btn">Go</button>
    <button id="btnUp" class="btn">Up</button>
</div>
<div id="overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:1000; background:#000; color:#fff; display:flex; align-items:center; justify-content:center;">
    Push to start
</div>
<script type="importmap">
  { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
    import * as THREE from 'three';

    // Блокировка ориентации экрана
if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
}
document.getElementById('overlay').addEventListener('click', async () => {
    // 1. Запрос разрешения для iOS (оставлен для совместимости, хотя для touch не нужен)
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        const response = await DeviceOrientationEvent.requestPermission();
        if (response !== 'granted') return;
    }
    
    // 2. Скрытие оверлея
    document.getElementById('overlay').style.display = 'none';
    
    // 3. Захват курсора (для десктопа)
    document.body.requestPointerLock();
});

    // НАСТРОЙКИ СКОРОСТИ И ИНЕРЦИИ
    const MOVE_SPEED = 0.002;       
    const FLY_SPEED = 0.003;       
    const LOOK_SPEED = 0.0005;       
    const TURN_SPEED = 0.0002;      
    const TOUCH_SENSITIVITY = 0.0005; 
    
    // Коэффициенты затухания (чем ближе к 1, тем дольше инерция)
    const DAMPING_LOOK = 0.96; 
    const DAMPING_TURN = 0.96;
    const DAMPING_MOVE = 0.98;

    // Состояние кнопок
    const touch = { forward: false, up: false };
    document.getElementById('btnForward').addEventListener('touchstart', () => { touch.forward = true; });
    document.getElementById('btnForward').addEventListener('touchend', () => { touch.forward = false; });
    document.getElementById('btnUp').addEventListener('touchstart', () => { touch.up = true; });
    document.getElementById('btnUp').addEventListener('touchend', () => { touch.up = false; });

    // Переменные для хранения координат тача
    let previousTouchX = 0;
    let previousTouchY = 0;
    let swipeTouchId = null; // Идентификатор пальца, который осуществляет обзор

    // Переменные инерции для обзора камеры (мышь/свайпы/стрелки)
    let cameraVelocityY = 0; // Вращение по горизонтали
    let cameraVelocityX = 0; // Вращение по вертикали

    // Обработка начала касания (кроме кнопок управления)
    window.addEventListener('touchstart', (e) => {
        if (swipeTouchId === null) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const t = e.changedTouches[i];
                if (t.target.closest('#controls')) continue; 
                
                swipeTouchId = t.identifier;
                previousTouchX = t.pageX;
                previousTouchY = t.pageY;
                break;
            }
        }
    }, { passive: false });

    // Обработка движения пальца (Touch-Scroll обзор с накоплением инерции)
    window.addEventListener('touchmove', (e) => {
        if (swipeTouchId !== null) {
            let activeTouch = null;
            for (let i = 0; i < e.touches.length; i++) {
                if (e.touches[i].identifier === swipeTouchId) {
                    activeTouch = e.touches[i];
                    break;
                }
            }

            if (activeTouch) {
                const touchX = activeTouch.pageX;
                const touchY = activeTouch.pageY;
                
                const deltaX = touchX - previousTouchX;
                const deltaY = touchY - previousTouchY;
                
                // Вместо прямого изменения угла добавляем импульс к скорости вращения
                cameraVelocityY -= deltaX * TOUCH_SENSITIVITY * 0.5;
                cameraVelocityX -= deltaY * TOUCH_SENSITIVITY * 0.5;
                
                previousTouchX = touchX;
                previousTouchY = touchY;
            }
        }
    }, { passive: false });

    window.addEventListener('touchend', (e) => {
        if (swipeTouchId !== null) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === swipeTouchId) {
                    swipeTouchId = null;
                    break;
                }
            }
        }
    });

    window.addEventListener('touchcancel', (e) => {
        if (swipeTouchId !== null) {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === swipeTouchId) {
                    swipeTouchId = null;
                    break;
                }
            }
        }
    });

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
    camera.rotation.order = 'YXZ';
    
    const player = new THREE.Group();
    player.position.set(0, 2, 0);
    scene.add(player);
    player.add(camera);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const light = new THREE.DirectionalLight(0xffffff, 1);
    light.position.set(5, 10, 5);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    for(let i=0; i<20; i++) {
        const geometry = new THREE.BoxGeometry(2, 10, 2);
        const material = new THREE.MeshPhongMaterial({ color: Math.random() * 0xffffff });
        const box = new THREE.Mesh(geometry, material);
        box.position.set((Math.random()-0.5)*100, 5, (Math.random()-0.5)*100);
        scene.add(box);
    }

    scene.add(new THREE.GridHelper(200, 40));

    const keys = {};
    window.addEventListener('keydown', (e) => keys[e.code] = true);
    window.addEventListener('keyup', (e) => keys[e.code] = false);
    
    document.body.addEventListener('click', () => document.body.requestPointerLock());

    let velocity = new THREE.Vector3(0, 0, 0);
    let angularVelocity = 0;

    function animate() {
        requestAnimationFrame(animate);
        const raycaster = new THREE.Raycaster();
        const downVector = new THREE.Vector3(0, -1, 0);

        raycaster.set(player.position, downVector);
        const intersects = raycaster.intersectObjects(scene.children);

        if (velocity.y <= 0 && intersects.length > 0 && intersects[0].distance < 2.1) {
            player.position.y = intersects[0].point.y + 2; 
            velocity.y = 0; 
        }

        // 1. ИНЕРЦИОННЫЙ ОБЗОР КЛАВИАТУРОЙ (Стрелки добавляют скорость вращения)
        if (keys['ArrowLeft']) cameraVelocityY += LOOK_SPEED * 0.2;
        if (keys['ArrowRight']) cameraVelocityY -= LOOK_SPEED * 0.2;
        if (keys['ArrowUp']) cameraVelocityX -= LOOK_SPEED * 0.2;
        if (keys['ArrowDown']) cameraVelocityX += LOOK_SPEED * 0.2;
        
        // Применение накопленной скорости вращения к камере
        camera.rotation.y += cameraVelocityY;
        camera.rotateX(cameraVelocityX);
        
        // Гашение скорости вращения камеры (инерция обзора)
        cameraVelocityY *= DAMPING_LOOK;
        cameraVelocityX *= DAMPING_LOOK;
        
        camera.rotation.x = Math.max(-1.5, Math.min(1.5, camera.rotation.x));
        camera.rotation.z = 0;

        // 2. ИНЕРЦИОННЫЙ ПОВОРОТ КОРПУСА (A/D)
        if (keys['KeyA']) angularVelocity += TURN_SPEED;
        if (keys['KeyD']) angularVelocity -= TURN_SPEED;
        player.rotation.y += angularVelocity;
        angularVelocity *= DAMPING_TURN; // Плавное затухание поворота тела

        const totalRotationY = player.rotation.y + camera.rotation.y;
        const forward = new THREE.Vector3(0, 0, -1).applyEuler(new THREE.Euler(0, totalRotationY, 0));
        
        // 3. ИНЕРЦИОННОЕ ПЕРЕМЕЩЕНИЕ (Клавиатура + Тач)
        if (keys['KeyW']) velocity.add(forward.clone().multiplyScalar(MOVE_SPEED));
        if (keys['KeyS']) velocity.add(forward.clone().multiplyScalar(-MOVE_SPEED));
        if (keys['Space']) velocity.y += FLY_SPEED;

        if (touch.forward) velocity.add(forward.clone().multiplyScalar(MOVE_SPEED));
        if (touch.up) velocity.y += FLY_SPEED;

        // Гравитация
        velocity.y -= 0.0015;
        player.position.add(velocity);
        
        // Плавное гашение линейной скорости движения
        velocity.multiplyScalar(DAMPING_MOVE);

        if (player.position.y < 2) {
            player.position.y = 2;
            velocity.y = Math.max(0, velocity.y * -0.3);
        }

        renderer.render(scene, camera);
    }
    animate();
</script>
</body>
</html>
