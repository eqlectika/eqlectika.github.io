<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest-ranking.json">
<title>Paramount | Gossip P2P Edition</title>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/mqtt@4.3.7/dist/mqtt.min.js"></script>
<style>
body { 
    background-color: #121212; 
    color: #fff; 
    font-family: sans-serif; 
    margin: 0; 
    padding: 0; 
}

.app-container {
    max-width: 768px;
    margin: 0 auto;
    background-color: #000;
    min-height: 100vh;
    padding: 4px;
    box-sizing: border-box;
    box-shadow: 0 0 20px rgba(0,0,0,0.8);
}

.network-status { background: #111; border: 1px solid #333; padding: 10px; margin-bottom: 20px; font-size: 13px; font-family: monospace; color: #0f0; }
#versus { width: 100%; margin: 2em 0; }
.versus-wrapper { display: flex; gap: 10px; justify-content: center; }
.versus_column { flex: 1; min-width: 0; cursor: pointer; }
.versus_thumbwrapper { 
    position: relative; 
    border: 3px solid #444; 
    background-color: #333; 
    aspect-ratio: 1/1; 
    box-sizing: border-box;
}
.versus_thumbwrapper img { 
    position: absolute;
    top: 0; left: 0;
    width: 100%; 
    height: 100%; 
    object-fit: cover; 
}
.ranking-container { margin-top: 10px;}
.ranking-title { font-family: sans-serif; font-size: 20px; text-transform: uppercase; text-align: center; border-bottom: 1px solid #222; padding-bottom: 10px; margin-bottom: 20px; }
.ranking-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #222; cursor: pointer; }
.ranking-img { width: 40px; height: 40px; object-fit: cover; margin-right: 12px; border: 1px solid #444; }
.ranking-info { flex-grow: 1; display: flex; justify-content: space-between; align-items: center; }
.item-details { display: none; padding: 15px; background: #050505; border-bottom: 1px solid #222; font-size: 14px; color: #ccc; }
.external-link { color: #448aff; text-decoration: none; display: block; margin-top: 10px; font-weight: bold; }
.admin-panel { margin-top: 40px; padding: 20px; background: #333; border-radius: 8px; }
.admin-input { 
    width: 100%; 
    padding: 12px; 
    margin-bottom: 15px; 
    background: #000; 
    border: 1px solid #777; 
    font-size: 16px;
    color: #fff; 
    box-sizing: border-box; 
}
textarea.admin-input { height: 100px; resize: vertical; }
#new-img-file { display: none; }
.file-label {
    display: inline-block;
    padding: 12px;
    background: #000;
    color: #fff;
    text-align: left;
    box-sizing: border-box;
    cursor: pointer;
    margin-bottom: 20px;
    border: 2px solid #fff;
    width: 100%;
}
.admin-btn { 
    width: 100%; 
    padding: 18px; 
    background: #fff; 
    color: #000; 
    border: none; 
    font-weight: bold; 
    cursor: pointer; 
    text-transform: uppercase; 
    font-size: 16px;
}
#log { background: #050505; border: 1px dashed #333; padding: 10px; font-size: 11px; height: 100px; overflow-y: scroll; color: #888; margin-top: 20px; }

#header-link {
    display: flex;
    justify-content: center;
    margin-top: 30px;
}
#header-logo {
    max-height: 40px;
    display: block;
}.footer-credit {
    text-align: center;
    font-size: 14px;
    color: #999;
    margin: 20px 0 10px 0;
}
a {
    color: #448aff;
    text-decoration: none;
}
.footer-credit a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>
<div class="app-container">

<a href="index.html" id="logoLink" style="display: flex; justify-content: center; text-decoration: none; width: 100%; margin: 20px 0;">
    <img src="logo.png" alt="Logo" style="max-width: 48px; opacity: 0.9; display: block;">
</a>
<div class="app-container">

<div class="network-status" id="netStatus">
    🌐 P2P Status: Connecting to the network... (<span id="nodeId">...</span>)
</div>

<div id="versus">
    <div class="ranking-title">Pick Important (Gossip Consensus)</div>
    <div class="versus-wrapper">
        <div class="versus_column" id="item-left" onclick="vote('left')">
            <div class="versus_thumbwrapper"><img src="" alt=""></div>
            <h3 class="title" style="text-align:center; font-size: 14px;"></h3>
        </div>
        <div class="versus_column" id="item-right" onclick="vote('right')">
            <div class="versus_thumbwrapper"><img src="" alt=""></div>
            <h3 class="title" style="text-align:center; font-size: 14px;"></h3>
        </div>
    </div>
</div>

<div class="ranking-container">
    <div class="ranking-title">P2P Network Ranking</div>
    <div id="ranking-list"></div>
</div>

<div class="admin-panel">
    <h3>Add an ad to the general network</h3>
    <input type="text" id="new-title" class="admin-input" placeholder="Title">
    <textarea id="new-desc" class="admin-input" placeholder="Description"></textarea>
    <input type="url" id="new-url" class="admin-input" placeholder="External URL (optional)">
    <label for="new-img-file" class="file-label" id="file-label-text">Choose image file</label>
    <input type="file" id="new-img-file" accept="image/*" onchange="updateLabel(this)">
    <button class="admin-btn" onclick="addItem()">BroadCast Item (Gossip)</button>
</div>

<div style="color: #0f0; " id="log"></div>
<div class="footer-credit">
        Made by <a href="https://t.me/eugenebox" target="_blank" id="author-link">@eugenebox</a>
</div>
</div>
<script>
const myId = 'Peer-' + Math.floor(Math.random() * 9000 + 1000);
document.getElementById('nodeId').innerText = myId;

let items = JSON.parse(localStorage.getItem('gossip_versus_items')) || [];
let currentPair = [];

const client = mqtt.connect('wss://test.mosquitto.org:8081/mqtt', {
    clientId: 'paramount_gossip_' + Math.random().toString(16).substr(2, 8)
});
const TOPIC = 'paramount/p2p/network/v1';

client.on('connect', () => {
    document.getElementById('netStatus').style.color = '#0f0';
    document.getElementById('netStatus').innerHTML = `🌐 Status P2P: Connected to the network (${myId})`;
    log("Connected to the transport layer. Waiting for peers...");
    client.subscribe(TOPIC);
});

client.on('error', (err) => {
    document.getElementById('netStatus').style.color = '#f00';
    document.getElementById('netStatus').innerHTML = `🌐 Статус P2P: Ошибка сети`;
    log("Error MQTT: " + JSON.stringify(err));
});

client.on('message', (topic, payload) => {
    try {
        let packet = JSON.parse(payload.toString());
        
        if (packet.type === 'ADD_ITEM') {
            if (!items.some(i => i.id === packet.item.id)) {
                items.push(packet.item);
                saveLocal();
                log(`[Gossip] Received new item from ${packet.sender}: "${packet.item.title}"`);
                updateRankingList();
                if (items.length >= 2 && currentPair.length === 0) nextPair();
            }
        } 
        else if (packet.type === 'VOTE') {
            let winItem = items.find(i => i.id === packet.winId);
            let loseItem = items.find(i => i.id === packet.loseId);
            if (winItem && loseItem) {
                winItem.rating = packet.newWinRating;
                loseItem.rating = packet.newLoseRating;
                saveLocal();
                log(`[Gossip] Voice synchronized from ${packet.sender}`);
                updateRankingList();
            }
        }
    } catch(e) {
        log("Error processing packet: " + e.message);
    }
});

function updateLabel(input) {
    const fileName = input.files[0] ? input.files[0].name : "Choose image file";
    document.getElementById('file-label-text').innerText = fileName;
}

function saveLocal() {
    localStorage.setItem('gossip_versus_items', JSON.stringify(items));
}

async function compressImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image();
            img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const maxWidth = 400; 
                let width = img.width, height = img.height;
                if (width > maxWidth) { height = (maxWidth / width) * height; width = maxWidth; }
                canvas.width = width; canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                resolve(canvas.toDataURL('image/jpeg', 0.7));
            };
        };
    });
}

async function addItem() {
    const title = $('#new-title').val().trim();
    const desc = $('#new-desc').val().trim();
    const url = $('#new-url').val().trim();
    const file = $('#new-img-file')[0].files[0];
    if (!title || !file) return alert('Enter a title and select an image!');

    const imgData = await compressImage(file);
    const newItem = { 
        id: 'item-' + Date.now() + '-' + Math.floor(Math.random()*1000), 
        title, 
        description: desc, 
        externalUrl: url, 
        img: imgData, 
        rating: 1500 
    };

    items.push(newItem);
    saveLocal();

    client.publish(TOPIC, JSON.stringify({
        type: 'ADD_ITEM',
        sender: myId,
        item: newItem
    }));

    log(`You created and sent: "${title}"`);
    $('#new-title, #new-desc, #new-url, #new-img-file').val('');
    $('#file-label-text').text("Choose image file");
    
    updateRankingList();
    if (items.length >= 2 && currentPair.length === 0) nextPair();
}

function toggleDetails(id) { 
    $(`#details-${id}`).slideToggle(200); 
}

function updateRankingList() {
    const sorted = [...items].sort((a, b) => b.rating - a.rating);
    let html = '';
    sorted.forEach((item, index) => {
        html += `<div class="ranking-item" onclick="toggleDetails('${item.id}')">
            <img src="${item.img}" class="ranking-img">
            <div class="ranking-info"><span>${index + 1}. ${item.title}</span><strong>${Math.round(item.rating)}</strong></div>
        </div>
        <div id="details-${item.id}" class="item-details">
            <p>${item.description || 'No description.'}</p>
            ${item.externalUrl ? `<a href="${item.externalUrl}" target="_blank" class="external-link">Visit Link →</a>` : ''}
        </div>`;
    });
    $('#ranking-list').html(html || '<div style="padding:10px; color:#555;">Пока нет объявлений в сети. Добавьте первое ниже!</div>');
}

function nextPair() {
    if (items.length < 2) return;
    let i1 = Math.floor(Math.random() * items.length), i2;
    do { i2 = Math.floor(Math.random() * items.length); } while (i1 === i2);
    currentPair = [i1, i2];
    $('#item-left img').attr('src', items[i1].img);
    $('#item-left .title').text(items[i1].title);
    $('#item-right img').attr('src', items[i2].img);
    $('#item-right .title').text(items[i2].title);
}

function vote(side) {
    if (items.length < 2) return;
    const winIdx = currentPair[side === 'left' ? 0 : 1];
    const loseIdx = currentPair[side === 'left' ? 1 : 0];
    
    const winItem = items[winIdx];
    const loseItem = items[loseIdx];

    // Расчет Elo
    const rW = winItem.rating, rL = loseItem.rating;
    const expW = 1 / (1 + Math.pow(10, (rL - rW) / 400));
    const change = 32 * (1 - expW);
    
    winItem.rating += change; 
    loseItem.rating -= change;
    saveLocal();

    client.publish(TOPIC, JSON.stringify({
        type: 'VOTE',
        sender: myId,
        winId: winItem.id,
        loseId: loseItem.id,
        newWinRating: winItem.rating,
        newLoseRating: loseItem.rating
    }));

    updateRankingList();
    $('#versus').animate({ opacity: 0 }, 100, function() { 
        nextPair(); 
        $(this).animate({ opacity: 1 }, 100); 
    });
}

updateRankingList();
if (items.length >= 2) nextPair();

function log(txt) {
    let l = document.getElementById('log');
    l.innerHTML += `<div>> ${txt}</div>`;
    l.scrollTop = l.scrollHeight;
}
</script>

</body>
</html>
